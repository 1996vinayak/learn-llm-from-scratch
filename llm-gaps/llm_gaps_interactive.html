*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2e;--bg4:#16213e;--accent:#48cae4;--green:#06d6a0;--red:#e94560;--yellow:#ffd166;--blue:#00b4d8;--purple:#a855f7;--text:#e8e8f0;--dim:#6b7294;--code-bg:#0d1117;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}
.topbar{height:52px;background:var(--bg2);display:flex;align-items:center;padding:0 14px;border-bottom:1px solid rgba(255,255,255,0.05);gap:5px;z-index:100;overflow-x:auto;}
.topbar .logo{font-weight:900;font-size:15px;background:linear-gradient(135deg,#48cae4,#06d6a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:10px;white-space:nowrap;}
.tab{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .3s;color:var(--dim);white-space:nowrap;}
.tab:hover{color:var(--text);background:var(--bg3);}
.tab.active{background:var(--accent);color:#fff;}
.sc{margin-left:auto;font-size:12px;font-weight:700;color:var(--yellow);white-space:nowrap;}
.main{display:flex;height:calc(100vh - 52px);}
.cp{width:46%;background:var(--code-bg);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;}
.ch{padding:8px 14px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:8px;}
.ch .fn{font-family:'Fira Code',monospace;font-size:11px;color:var(--accent);font-weight:600;}
.ch .fd{font-size:10px;color:var(--dim);}
.cs{flex:1;overflow-y:auto;}
.cc{font-family:'Fira Code',monospace;font-size:11.5px;line-height:1.85;padding:10px 0;}
.cl{display:flex;padding:0 10px 0 0;min-height:20px;}
.cl:hover{background:rgba(255,255,255,0.02);}
.ln{min-width:36px;text-align:right;padding-right:10px;color:var(--dim);user-select:none;font-size:10px;}
.lt{white-space:pre;flex:1;}
.kw{color:#ff79c6;}.str{color:#f1fa8c;}.cm{color:#6272a4;font-style:italic;}.fn2{color:#50fa7b;}.num{color:#bd93f9;}.dec{color:#ffb86c;}

let cur=0,sc=0,mx=0,ans={};
function asc(id,p){if(ans[id])return;ans[id]=1;sc+=p;document.getElementById('ts').textContent=sc;}
function rq(id,p){if(!ans['_'+id]){ans['_'+id]=1;mx+=p;document.getElementById('ms').textContent=mx;}}
function cq(qid,el,ok){const b=document.getElementById(qid);if(b.classList.contains('ok')||b.classList.contains('no'))return;const f=document.getElementById(qid+'-f');const os=b.querySelectorAll('.qp');if(ok){el.classList.add('sc2');b.classList.add('ok');f.className='qf sh ok';f.textContent='\u2705 Correct! +10';asc(qid,10);}else{el.classList.add('sw');b.classList.add('no');f.className='qf sh no';f.textContent='\u274C Not quite!';}os.forEach(o=>{o.classList.add('dis');if(o!==el&&o.getAttribute('onclick')&&o.getAttribute('onclick').includes('true'))o.classList.add('shc');});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(l){if(l.trimStart().startsWith('#'))return'<span class="cm">'+l+'</span>';l=l.replace(/(""".*?"""|".*?"|'.*?')/g,'<span class="str">$1</span>');['def','class','return','for','in','if','import','from','self','None','True','False','super','not','and','or','range','print','with','as','else','elif','while','break','pass','assert','lambda','yield'].forEach(k=>{l=l.replace(new RegExp('\\\\b('+k+')\\\\b','g'),'<span class="kw">$1</span>');});l=l.replace(/\\b(\\d+\\.?\\d*)\\b/g,'<span class="num">$1</span>');return l;}
function rc(code){const c=document.getElementById('ccc');c.innerHTML='';code.split('\\n').forEach((l,i)=>{const d=document.createElement('div');d.className='cl';d.innerHTML='<span class="ln">'+(i+1)+'</span><span class="lt">'+hl(esc(l))+'</span>';c.appendChild(d);});}
function go(n){cur=n;const s=S[n];document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));document.getElementById('cfn').textContent=s.fn;document.getElementById('cfd').textContent=s.fd;rc(s.code);document.getElementById('gt').innerHTML=s.t;document.getElementById('gsu').textContent=s.su;const g=document.getElementById('gc');g.innerHTML='';s.gm(g);document.querySelector('.gs').scrollTop=0;document.querySelector('.cs').scrollTop=0;}
</script>
<script>
const S=[
// ═══════════════════════════════════════════
// 0: INTRO
// ═══════════════════════════════════════════
{fn:'overview',fd:'Gap Filler',t:'\u{1F9E9} Gap Filler: Missing Concepts',su:'Filling every conceptual gap across all 4 levels of the LLM curriculum',
code:`# ============================================
# LLM GAP FILLER - Missing Concepts
# ============================================
# The 4-level curriculum covers a LOT:
#   Baby:    Data, Tokenizer, Embeddings,
#            Attention, Transformer, Training,
#            Generation
#   Teenage: BPE, Dropout, GELU, LayerNorm,
#            Cosine LR, Top-p, KV-Cache
#   Adult:   RoPE, GQA, SwiGLU, Flash Attn,
#            Beam Search, RMSNorm, Mixed Prec,
#            RLHF, Weight Tying
#   Expert:  LoRA, Quantization, MoE, DPO,
#            Scaling Laws, Speculative Decoding
#
# But some KEY concepts fell through the cracks!
# This file fills ALL of them:
#
# 1. Backpropagation  (Baby gap)
# 2. Cross-Entropy    (Baby gap)
# 3. Softmax Deep Dive(Baby gap)
# 4. Overfitting      (Teenage gap)
# 5. Special Tokens   (Teenage gap)
# 6. Context Window   (Adult gap)
# 7. RAG              (Expert gap)
# 8. Hallucination    (Expert gap)
#
# After this, you'll have COMPLETE coverage
# of every concept needed to understand LLMs!`,
gm:function(c){c.innerHTML=`
<div class="s"><h3>\u{1F4CB} Curriculum Coverage Checklist</h3>
<p style="margin-bottom:8px;">What's already covered <span class="covered">\u2705 green</span> vs what this file fills <span class="gap">\u{1F7E1} yellow</span></p>
<div class="eb g"><p><strong>\u{1F37C} Baby LLM — Level 1</strong></p>
<p class="covered">\u2705 Data preparation &amp; character tokenization</p>
<p class="covered">\u2705 Embeddings (token + position)</p>
<p class="covered">\u2705 Self-attention mechanism</p>
<p class="covered">\u2705 Transformer block architecture</p>
<p class="covered">\u2705 Training loop basics</p>
<p class="covered">\u2705 Text generation (greedy, top-k)</p>
<p class="gap">\u{1F7E1} Backpropagation &amp; chain rule</p>
<p class="gap">\u{1F7E1} Cross-entropy loss function</p>
<p class="gap">\u{1F7E1} Softmax in depth (temperature)</p></div>
<div class="eb b"><p><strong>\u{1F9D1}\u200D\u{1F393} Teenage LLM — Level 2</strong></p>
<p class="covered">\u2705 BPE tokenization</p>
<p class="covered">\u2705 Dropout regularization</p>
<p class="covered">\u2705 GELU activation</p>
<p class="covered">\u2705 LayerNorm</p>
<p class="covered">\u2705 Cosine LR scheduler</p>
<p class="covered">\u2705 Top-p sampling &amp; KV-Cache</p>
<p class="gap">\u{1F7E1} Overfitting &amp; train/val/test splits</p>
<p class="gap">\u{1F7E1} Special tokens (BOS, EOS, PAD, UNK)</p></div>
<div class="eb y"><p><strong>\u{1F393} Adult LLM — Level 3</strong></p>
<p class="covered">\u2705 RoPE, GQA, SwiGLU, Flash Attention</p>
<p class="covered">\u2705 Beam Search, RMSNorm</p>

<p class="gap">\u{1F7E1} Context window &amp; sliding window attention</p></div>
<div class="eb p"><p><strong>\u{1F9E0} Expert LLM — Level 4</strong></p>
<p class="covered">\u2705 LoRA, Quantization, MoE</p>
<p class="covered">\u2705 DPO, Scaling Laws</p>
<p class="covered">\u2705 Speculative Decoding</p>
<p class="gap">\u{1F7E1} RAG (Retrieval-Augmented Generation)</p>
<p class="gap">\u{1F7E1} Hallucination &amp; Safety</p></div></div>
<div class="s"><h3><span class="bd bd-q">QUIZ</span> Readiness Check</h3>
<div class="qb" id="i-q1"><div class="qt">\u{1F914} Which of these is NOT covered in the main 4-level curriculum?</div><div class="qo">
<div class="qp" onclick="cq('i-q1',this,false)">Self-attention mechanism</div>
<div class="qp" onclick="cq('i-q1',this,false)">BPE tokenization</div>
<div class="qp" onclick="cq('i-q1',this,true)">Backpropagation and the chain rule</div>
</div><div class="qf" id="i-q1-f"></div></div>
<div class="qb" id="i-q2"><div class="qt">\u{1F914} Why is understanding loss functions important for LLMs?</div><div class="qo">
<div class="qp" onclick="cq('i-q2',this,true)">The loss function is what the model optimizes during training — it defines what "good" means</div>
<div class="qp" onclick="cq('i-q2',this,false)">Loss functions are only used during inference</div>
<div class="qp" onclick="cq('i-q2',this,false)">Loss functions determine the model's architecture</div>
</div><div class="qf" id="i-q2-f"></div></div></div>`;rq('i-q1',10);rq('i-q2',10);}},

// ═══════════════════════════════════════════
// 1: BACKPROPAGATION
// ═══════════════════════════════════════════
{fn:'backprop.py',fd:'Chain rule & gradient flow',t:'\u{1F519} Backpropagation',su:'How neural networks learn — gradients flowing backward through the chain rule',
code:`# BACKPROPAGATION
# ================
# Forward pass: compute output from input
# Backward pass: compute gradients from loss
#
# The CHAIN RULE is the key insight:
#   If y = f(g(x)), then dy/dx = dy/dg * dg/dx
#
# Example: 3-layer network
#   Input x = 2.0
#   Layer 1: h1 = x * w1     (w1 = 0.5)
#   Layer 2: h2 = h1 * w2    (w2 = -1.0)
#   Layer 3: out = h2 * w3   (w3 = 2.0)
#   Loss = (out - target)^2  (target = 1.0)
#
# FORWARD PASS:
#   h1  = 2.0 * 0.5  = 1.0
#   h2  = 1.0 * -1.0 = -1.0
#   out = -1.0 * 2.0 = -2.0
#   loss = (-2.0 - 1.0)^2 = 9.0
#
# BACKWARD PASS (chain rule):
#   dL/dout = 2*(out - target) = 2*(-3) = -6.0
#   dL/dw3  = dL/dout * h2 = -6.0 * -1.0 = 6.0
#   dL/dh2  = dL/dout * w3 = -6.0 * 2.0 = -12.0
#   dL/dw2  = dL/dh2 * h1  = -12.0 * 1.0 = -12.0
#   dL/dh1  = dL/dh2 * w2  = -12.0 * -1.0 = 12.0
#   dL/dw1  = dL/dh1 * x   = 12.0 * 2.0 = 24.0
#
# UPDATE WEIGHTS (learning rate = 0.01):
#   w1 = 0.5  - 0.01 * 24.0  = 0.26
#   w2 = -1.0 - 0.01 * -12.0 = -0.88
#   w3 = 2.0  - 0.01 * 6.0   = 1.94
#
# Gradients VANISH if they keep getting smaller
# Gradients EXPLODE if they keep getting bigger`,
gm:function(c){c.innerHTML=`
<div class="s"><h3>\u{1F519} Understanding Backpropagation</h3>
<div class="eb y"><p><strong>\u{1F4E7} Postal Analogy:</strong> Forward pass is like sending a letter through a chain of post offices. Backward pass is the complaint letter traveling back — each office passes the blame (gradient) to the previous one, multiplied by how much they contributed!</p></div>
<div class="eb b"><p><strong>Chain Rule:</strong> If y = f(g(x)), then dy/dx = dy/dg \u00D7 dg/dx. Each layer multiplies the upstream gradient by its local gradient. This is why deep networks can have vanishing or exploding gradients!</p></div></div>
<div class="s"><h3><span class="bd bd-g">GAME</span> Gradient Flow Simulator</h3>
<p>Click "Backward Pass" to watch gradients flow from loss back through each node:</p>
<div class="ia">
<div class="node-chain" id="bpChain"></div>
<div id="bpInfo" class="ob" style="min-height:40px;margin-top:8px;"></div>
<div style="display:flex;gap:6px;margin-top:8px;">
<button class="btn bp" onclick="bpStep()">Backward Step \u2B05</button>
<button class="btn br" onclick="bpReset()">Reset</button></div></div></div>
<div class="s"><h3><span class="bd bd-q">QUIZ</span> Backpropagation Challenge</h3>
<div class="qb" id="bp-q1"><div class="qt">\u{1F914} In the chain rule, if layer A multiplies by 0.01 and layer B multiplies by 0.01, what happens to the gradient after both layers?</div><div class="qo">
<div class="qp" onclick="cq('bp-q1',this,true)">It gets multiplied by 0.0001 — the gradient vanishes!</div>
<div class="qp" onclick="cq('bp-q1',this,false)">It gets added: 0.02</div>
<div class="qp" onclick="cq('bp-q1',this,false)">It stays at 0.01</div>
</div><div class="qf" id="bp-q1-f"></div></div>
<div class="qb" id="bp-q2"><div class="qt">\u{1F914} Why do gradients flow BACKWARD (from loss to input) instead of forward?</div><div class="qo">
<div class="qp" onclick="cq('bp-q2',this,false)">It's just a convention, either direction works</div>
<div class="qp" onclick="cq('bp-q2',this,true)">We need to know how each weight affects the LOSS, so we start from the loss and trace back using the chain rule</div>
<div class="qp" onclick="cq('bp-q2',this,false)">Forward gradients are too slow to compute</div>
</div><div class="qf" id="bp-q2-f"></div></div>
<div class="qb" id="bp-q3"><div class="qt">&#x1F914; Residual connections (y = f(x) + x) help backprop because:</div><div class="qo">
<div class="qp" onclick="cq('bp-q3',this,true)">The gradient of "+x" is always 1, creating a highway for gradients to flow through even in 100-layer networks</div>
<div class="qp" onclick="cq('bp-q3',this,false)">They make the model bigger</div>
<div class="qp" onclick="cq('bp-q3',this,false)">They skip the activation function</div>
</div><div class="qf" id="bp-q3-f"></div></div></div>`;
rq('bp-q1',10);rq('bp-q2',10);rq('bp-q3',10);bpReset();}},

// ═══════════════════════════════════════════
// 2: CROSS-ENTROPY LOSS
// ═══════════════════════════════════════════
{fn:'cross_entropy.py',fd:'Measuring prediction quality',t:'\u{1F4C9} Cross-Entropy Loss',su:'How we measure how wrong the model\'s predictions are',
code:`# CROSS-ENTROPY LOSS
# ====================
# The model outputs a probability distribution
# over all possible next tokens.
#
# Cross-entropy measures how "surprised" the
# model is by the correct answer.
#
# Formula:
#   L = -log(P(correct_token))
#
# If model says P("cat") = 0.9 and answer IS "cat":
#   L = -log(0.9) = 0.105  (low loss, good!)
#
# If model says P("cat") = 0.01 and answer IS "cat":
#   L = -log(0.01) = 4.605  (high loss, bad!)
#
# If model says P("cat") = 1.0 (perfect):
#   L = -log(1.0) = 0.0  (zero loss, perfect!)
#
# Key properties:
#   - Loss is ALWAYS >= 0
#   - Loss = 0 only when P(correct) = 1.0
#   - Loss -> infinity as P(correct) -> 0
#   - Penalizes confident wrong answers HEAVILY
#
# In PyTorch:
# loss = F.cross_entropy(logits, targets)
#
# This does 3 things internally:
#   1. Apply softmax to logits -> probabilities
#   2. Take log of probabilities
#   3. Pick the negative log prob of correct class
#
# For language models:
#   logits shape: (batch, seq_len, vocab_size)
#   targets shape: (batch, seq_len)
#   Each position predicts the NEXT token`,

{fn:'softmax.py',fd:'From logits to probabilities',t:'\u{1F4CA} Softmax Deep Dive',su:'How raw scores become probabilities, and how temperature controls randomness',
code:`# SOFTMAX - From Logits to Probabilities
# ========================================
# The model outputs raw scores (logits).
# Softmax converts them to probabilities.
#
# Formula:
#   P(i) = exp(x_i) / sum(exp(x_j) for all j)
#
# Example: logits = [2.0, 1.0, 0.1]
#   exp(2.0) = 7.389
#   exp(1.0) = 2.718
#   exp(0.1) = 1.105
#   sum = 11.212
#   P = [0.659, 0.242, 0.099]
#
# Properties:
#   - All outputs are between 0 and 1
#   - All outputs sum to exactly 1.0
#   - Larger logits get larger probabilities
#   - The "exp" makes differences more extreme
#
# TEMPERATURE:
#   Divide logits by temperature BEFORE softmax
#   P(i) = exp(x_i / T) / sum(exp(x_j / T))
#
#   T = 1.0: normal (default)
#   T = 0.1: very peaked (confident, deterministic)
#   T = 10:  very flat (uniform, random)
#   T -> 0:  argmax (pick the highest)
#   T -> inf: uniform distribution
#
# In code:
def softmax(logits, temperature=1.0):
    scaled = [x / temperature for x in logits]
    exps = [math.exp(x) for x in scaled]
    total = sum(exps)
    return [e / total for e in exps]

# Temperature is the "creativity dial":
#   Low temp  = predictable, repetitive
#   High temp = creative, sometimes nonsensical`,

<div class="eb b"><p><strong>Temperature:</strong> Think of it as a "creativity dial." Low temperature = the model is very sure and picks the obvious answer. High temperature = the model considers all options more equally, leading to more surprising outputs.</p></div></div>

{fn:'overfitting.py',fd:'Train/Val/Test & early stopping',t:'\u{1F4C8} Overfitting & Splits',su:'Why your model might memorize instead of learn, and how to detect it',
code:`# OVERFITTING & DATA SPLITS
# ===========================
# Overfitting = model memorizes training data
#   instead of learning general patterns.
#
# Like a student who memorizes answers to
# practice tests but can't solve new problems!
#
# SOLUTION: Split your data!
#   Train set (80%): model learns from this
#   Val set   (10%): check during training
#   Test set  (10%): final evaluation (once!)
#
# The model NEVER sees val/test during training.
# If train_loss goes down but val_loss goes UP,
# the model is overfitting!

def split_data(data, train=0.8, val=0.1):
    n = len(data)
    train_end = int(n * train)
    val_end = int(n * (train + val))
    return (data[:train_end],
            data[train_end:val_end],
            data[val_end:])

# EARLY STOPPING:
# Stop training when val_loss stops improving
best_val_loss = float('inf')
patience = 5  # wait 5 epochs before stopping
wait = 0

for epoch in range(max_epochs):
    train_loss = train_one_epoch(model, train_data)
    val_loss = evaluate(model, val_data)

    if val_loss < best_val_loss:
        best_val_loss = val_loss
        wait = 0
        save_checkpoint(model)  # save best!
    else:
        wait += 1
        if wait >= patience:
            print("Early stopping!")
            break  # stop before overfitting!

# SIGNS OF OVERFITTING:
#   - Train loss: keeps going down
#   - Val loss: goes down, then UP
#   - Gap between train and val loss grows
#
# SIGNS OF UNDERFITTING:
#   - Both train and val loss are HIGH
#   - Model is too simple for the data`,

{fn:'special_tokens.py',fd:'BOS, EOS, PAD, UNK',t:'\u{1F3F7} Special Tokens',su:'The invisible tokens that tell the model where things start, end, and what to ignore',
code:`# SPECIAL TOKENS
# ================
# LLMs use special tokens to structure input:
#

#

#   Marks the end of generation
#   Model generates this to say "I'm done"
#
# [PAD] - Padding
#   Fills shorter sequences in a batch
#   Model learns to IGNORE these
#   Needed because batches must be same length
#
# [UNK] - Unknown Token
#   Replaces tokens not in vocabulary
#   Rare with BPE (can handle any input)
#
# [SEP] - Separator

#   e.g., prompt [SEP] response
#
# Example: Batch of 2 sequences

# Seq 2: "Hi"           (1 token)
#

#

# [ASSISTANT] 2+2 is 4. [EOS]
#
# The attention mask tells the model
# which tokens to attend to (1) and
# which to ignore (0 = PAD tokens):

{fn:'context_window.py',fd:'What the model can see',t:'\u{1F50D} Context Window',su:'The limited window of text the model can process at once — and why it matters',
code:`# CONTEXT WINDOW
# ================
# Every LLM has a maximum context length.
# It can only "see" this many tokens at once.
#
# GPT-3:     2,048 tokens
# GPT-3.5:   4,096 tokens
# GPT-4:     8,192 / 32,768 tokens
# GPT-4o:    128,000 tokens
# Claude 3:  200,000 tokens
# Gemini 1.5: 1,000,000 tokens
#
# WHY LIMITED?
# Self-attention is O(N^2) in memory!
#   N = 2K:   4M operations
#   N = 32K:  1B operations
#   N = 128K: 16B operations!
#
# In code, this is "block_size":
class TransformerBlock:
    def __init__(self, block_size=2048):
        # Causal mask: can only see past tokens
        self.mask = torch.tril(
            torch.ones(block_size, block_size)
        )

# SLIDING WINDOW ATTENTION (Mistral):
# Instead of attending to ALL previous tokens,
# each token only attends to the last W tokens.
#
# Window size W = 4096
# Token at position 5000 can see: 901-5000
# Token at position 5001 can see: 902-5001
#
# Benefits:
#   - O(N * W) instead of O(N^2)
#   - Can process longer sequences
#   - Info still flows through layers!
#
# With 32 layers and W=4096:
#   Effective context = 32 * 4096 = 131,072!
#   Because layer 2 sees layer 1's output,
#   which already incorporated W tokens.
#
# Think of it like a game of telephone:
#   Each person (layer) passes info forward,
#   so the last person knows about everyone!`,
gm:function(c){c.innerHTML=`
<div class="s"><h3>\u{1F50D} Understanding Context Windows</h3>

<div class="eb b"><p><strong>O(N\u00B2) Problem:</strong> Self-attention compares every token to every other token. Double the context = 4x the memory. This is why context length is limited!</p></div></div>

<div class="qp" onclick="cq('cw-q3',this,false)">Uses approximation that loses accuracy</div>
<div class="qp" onclick="cq('cw-q3',this,false)">Skips attention for some tokens</div>
</div><div class="qf" id="cw-q3-f"></div></div></div>`;

{fn:'rag_pipeline.py',fd:'Retrieval-Augmented Generation',t:'\u{1F4DA} RAG',su:'Giving LLMs access to external knowledge to reduce hallucination',
code:`# RAG - Retrieval-Augmented Generation
# ======================================
# Problem: LLMs only know what they were
# trained on. They can't access new info!
#
# Solution: RETRIEVE relevant documents,
# then GENERATE using them as context.
#
# Pipeline:
#   1. User asks a question
#   2. RETRIEVE: search a knowledge base
#      for relevant documents
#   3. AUGMENT: add retrieved docs to prompt
#   4. GENERATE: LLM answers using the docs
#
# Step 1: Index documents (offline)
def build_index(documents):
    embeddings = []
    for doc in documents:
        # Convert each doc to a vector
        emb = embed_model.encode(doc)
        embeddings.append(emb)
    return vector_store.add(embeddings)

# Step 2: Retrieve (at query time)
def retrieve(query, top_k=3):
    query_emb = embed_model.encode(query)
    # Find most similar documents
    results = vector_store.search(
        query_emb, top_k=top_k
    )
    return results

# Step 3: Augment prompt
def augment_prompt(query, retrieved_docs):
    context = "\\n".join(retrieved_docs)
    return f"""Use the following context to
answer the question. If the answer is not
in the context, say "I don't know."

Context: {context}

Question: {query}
Answer:"""

# Step 4: Generate
def rag_answer(query):
    docs = retrieve(query)
    prompt = augment_prompt(query, docs)
    return llm.generate(prompt)

# WHY RAG WORKS:
# - LLM sees relevant facts IN the prompt
# - Can cite sources
# - Easy to update (just update the docs!)
# - Reduces hallucination dramatically`,

// ─── BACKPROPAGATION GAME ───
let bpNodes=[
  {name:'Input',val:2.0,grad:null,w:null},
  {name:'h1',val:1.0,grad:null,w:0.5},
  {name:'h2',val:-1.0,grad:null,w:-1.0},
  {name:'Output',val:-2.0,grad:null,w:2.0},
  {name:'Loss',val:9.0,grad:1.0,w:null}
];
let bpStep_i=4;
function bpReset(){
  bpNodes=[
    {name:'Input',val:2.0,grad:null,w:null},
    {name:'h1',val:1.0,grad:null,w:0.5},
    {name:'h2',val:-1.0,grad:null,w:-1.0},
    {name:'Output',val:-2.0,grad:null,w:2.0},
    {name:'Loss',val:9.0,grad:1.0,w:null}
  ];
  bpStep_i=4;
  renderBP();
  const info=document.getElementById('bpInfo');
  if(info)info.innerHTML='<span style="color:var(--dim);">Forward pass complete. Loss = 9.0. Click "Backward Step" to see gradients flow back!</span>';
}
function bpStep(){
  if(bpStep_i<=0)return;
  bpStep_i--;
  const n=bpNodes[bpStep_i];
  if(bpStep_i===3){n.grad=-6.0;}// dL/dout = 2*(out-target) = 2*(-2-1)=-6
  else if(bpStep_i===2){n.grad=-12.0;}// dL/dh2 = dL/dout * w3 = -6*2=-12
  else if(bpStep_i===1){n.grad=12.0;}// dL/dh1 = dL/dh2 * w2 = -12*-1=12
  else if(bpStep_i===0){n.grad=24.0;}// dL/dx = dL/dh1 * w1... but we show dL/dw1
  renderBP();
  const info=document.getElementById('bpInfo');
  const explanations=[
    '<span style="color:var(--yellow);">dL/dw1 = dL/dh1 \u00D7 x = 12.0 \u00D7 2.0 = <strong>24.0</strong></span> \u2014 Gradient reached the first weight! Update: w1 = 0.5 - 0.01\u00D724 = 0.26',
    '<span style="color:var(--yellow);">dL/dh1 = dL/dh2 \u00D7 w2 = -12.0 \u00D7 -1.0 = <strong>12.0</strong></span> \u2014 Chain rule: multiply upstream gradient by local weight',
    '<span style="color:var(--yellow);">dL/dh2 = dL/dout \u00D7 w3 = -6.0 \u00D7 2.0 = <strong>-12.0</strong></span> \u2014 Gradient flows through w3',
    '<span style="color:var(--yellow);">dL/dout = 2\u00D7(out - target) = 2\u00D7(-2.0 - 1.0) = <strong>-6.0</strong></span> \u2014 Starting from the loss!'
  ];
  if(info)info.innerHTML=explanations[bpStep_i];
  if(bpStep_i===0)asc('bp-game',15);
}
function renderBP(){
  const el=document.getElementById('bpChain');if(!el)return;
  let html='';
  bpNodes.forEach((n,i)=>{
    const cls=n.grad!==null?(bpStep_i===i?'active':'done'):'';
    html+=`<div class="node-box ${cls}">
      <div style="font-size:10px;color:var(--dim);">${n.name}</div>
      <div style="font-size:14px;font-weight:900;">${n.val.toFixed(1)}</div>
      ${n.grad!==null?'<div style="font-size:10px;color:var(--green);">\u2207 '+n.grad.toFixed(1)+'</div>':'<div style="font-size:10px;color:var(--dim);">\u2207 ?</div>'}
      ${n.w!==null?'<div style="font-size:9px;color:var(--accent);">w='+n.w+'</div>':''}
    </div>`;
    if(i<bpNodes.length-1)html+='<span class="node-arrow">\u2192</span>';
  });
  el.innerHTML=html;
  rq('bp-game',15);
}

// ─── CROSS-ENTROPY GAME ───
function updateCE(){
  const pct=parseInt(document.getElementById('ceSlider').value);
  const p=pct/100;
  document.getElementById('ceProb').textContent=p.toFixed(2);
  const loss=-Math.log(Math.max(p,0.001));
  document.getElementById('ceLoss').textContent=loss.toFixed(3);
  document.getElementById('ceLoss').style.color=loss<0.5?'var(--green)':loss<2?'var(--yellow)':'var(--red)';
  let verdict='',color='';
  if(loss<0.1){verdict='\u{1F389} Perfect!';color='var(--green)';}
  else if(loss<0.5){verdict='\u{1F44D} Good';color='var(--green)';}
  else if(loss<1.5){verdict='\u{1F914} Okay';color='var(--yellow)';}
  else if(loss<3){verdict='\u{1F61F} Bad';color='var(--red)';}
  else{verdict='\u{1F4A5} Terrible!';color='var(--red)';}
  document.getElementById('ceVerdict').textContent=verdict;
  document.getElementById('ceVerdict').style.color=color;
  // Bar chart
  const chart=document.getElementById('ceChart');
  const labels=['the','cat','sat','on','mat'];
  const correctIdx=1;// "cat" is correct
  const remaining=1-p;
  const others=labels.map((_,i)=>i===correctIdx?p:remaining/(labels.length-1));
  let html='';
  labels.forEach((l,i)=>{
    const h=Math.max(2,others[i]*100);
    const col=i===correctIdx?'var(--green)':'var(--bg3)';
    const border=i===correctIdx?'2px solid var(--green)':'1px solid rgba(255,255,255,0.1)';
    html+=`<div class="bar-col"><div class="bar-val">${others[i].toFixed(2)}</div><div class="bar" style="height:${h}%;background:${col};border:${border};"></div><div class="bar-label">${l}${i===correctIdx?' \u2705':''}</div></div>`;
  });
  chart.innerHTML=html;
  document.getElementById('ceExplain').textContent=`Loss = -log(${p.toFixed(2)}) = ${loss.toFixed(3)}. ${p>0.8?'High confidence on correct answer = low loss!':p>0.4?'Moderate confidence = moderate loss.':'Low confidence on correct answer = high loss!'}`;
}

// ─── SOFTMAX GAME ───
function updateSM(){
  const logits=[];
  for(let i=0;i<5;i++){
    const v=parseInt(document.getElementById('sm'+i).value)/10;
    logits.push(v);
    document.getElementById('smv'+i).textContent=v.toFixed(1);
  }
  const temp=parseInt(document.getElementById('smTemp').value)/10;
  document.getElementById('smTempV').textContent=temp.toFixed(1);
  const scaled=logits.map(x=>x/temp);
  const maxS=Math.max(...scaled);
  const exps=scaled.map(x=>Math.exp(x-maxS));
  const sum=exps.reduce((a,b)=>a+b,0);
  const probs=exps.map(e=>e/sum);
  const labels=['A','B','C','D','E'];
  const colors=['var(--accent)','var(--green)','var(--purple)','var(--yellow)','var(--red)'];
  const chart=document.getElementById('smChart');
  let html='';
  labels.forEach((l,i)=>{
    const h=Math.max(2,probs[i]*100);
    html+=`<div class="bar-col"><div class="bar-val">${probs[i].toFixed(3)}</div><div class="bar" style="height:${h}%;background:${colors[i]};border-radius:4px 4px 0 0;"></div><div class="bar-label">${l} (${logits[i].toFixed(1)})</div></div>`;
  });
  chart.innerHTML=html;
  const maxP=Math.max(...probs);
  const entropy=-probs.reduce((s,p)=>s+(p>0.001?p*Math.log(p):0),0);
  document.getElementById('smInfo').innerHTML=`Temperature: ${temp.toFixed(1)} | Max prob: ${maxP.toFixed(3)} | Entropy: ${entropy.toFixed(3)} | ${temp<0.5?'\u2744\uFE0F Very peaked (deterministic)':temp<1.5?'\u{1F321}\uFE0F Normal':'\u{1F525} Very flat (random)'}`;
}

// ─── OVERFITTING GAME ───
let ofData={train:[],val:[],type:'overfit',clicked:false};
function ofScenario(type){
  ofData.type=type;ofData.clicked=false;
  ofData.train=[];ofData.val=[];
  for(let i=0;i<30;i++){
    const t=i/30;
    if(type==='overfit'){
      ofData.train.push(2.5*Math.exp(-3*t)+0.05+Math.random()*0.05);
      ofData.val.push(t<0.4?2.5*Math.exp(-3*t)+0.1+Math.random()*0.08:0.4+1.8*(t-0.4)+Math.random()*0.1);
    }else if(type==='underfit'){
      ofData.train.push(2.0-0.3*t+Math.random()*0.08);
      ofData.val.push(2.2-0.25*t+Math.random()*0.1);
    }else{
      ofData.train.push(2.5*Math.exp(-3*t)+0.15+Math.random()*0.05);
      ofData.val.push(2.5*Math.exp(-2.8*t)+0.25+Math.random()*0.06);
    }
  }
  drawOF();
  const r=document.getElementById('ofResult');
  if(r)r.innerHTML=type==='overfit'?'<span style="color:var(--accent);">Click on the chart where overfitting begins!</span>':type==='underfit'?'<span style="color:var(--yellow);">\u26A0 Underfitting: both losses are high. Model is too simple!</span>':'<span style="color:var(--green);">\u2705 Good fit: both losses are low and close together!</span>';
}
function drawOF(){
  const canvas=document.getElementById('ofCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const pad={l:40,r:10,t:10,b:30};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  const maxY=3.0;
  const mapX=i=>pad.l+(i/(ofData.train.length-1))*pw;
  const mapY=v=>pad.t+(1-v/maxY)*ph;
  // Axes
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  ctx.fillStyle='var(--dim)';ctx.font='10px Fira Code';ctx.textAlign='right';
  [0,1,2,3].forEach(v=>{ctx.fillText(v.toFixed(0),pad.l-4,mapY(v)+3);});
  ctx.textAlign='center';ctx.fillText('Epoch',W/2,H-4);
  // Train loss
  ctx.strokeStyle='var(--blue)';ctx.lineWidth=2;ctx.beginPath();
  ofData.train.forEach((v,i)=>{i===0?ctx.moveTo(mapX(i),mapY(v)):ctx.lineTo(mapX(i),mapY(v));});ctx.stroke();
  // Val loss
  ctx.strokeStyle='var(--red)';ctx.lineWidth=2;ctx.beginPath();
  ofData.val.forEach((v,i)=>{i===0?ctx.moveTo(mapX(i),mapY(v)):ctx.lineTo(mapX(i),mapY(v));});ctx.stroke();
}
function ofClick(e){
  if(ofData.type!=='overfit'||ofData.clicked)return;
  ofData.clicked=true;
  const canvas=document.getElementById('ofCanvas');
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(canvas.width/rect.width);
  const pad={l:40,r:10};
  const pw=canvas.width-pad.l-pad.r;
  const epoch=Math.round(((x-pad.l)/pw)*(ofData.train.length-1));
  const correctEpoch=12;// around 40% of 30
  const diff=Math.abs(epoch-correctEpoch);
  const r=document.getElementById('ofResult');
  if(diff<=3){
    r.innerHTML=`<span style="color:var(--green);">\u2705 Great! You clicked epoch ~${epoch}. Overfitting starts around epoch ${correctEpoch} where val loss begins rising while train loss keeps falling!</span>`;
    asc('of-game',15);
  }else{
    r.innerHTML=`<span style="color:var(--yellow);">\u{1F914} You clicked epoch ~${epoch}. Look for where the red line (val loss) starts going UP while the blue line (train loss) keeps going down. That's around epoch ${correctEpoch}.</span>`;
  }
  rq('of-game',15);
}

// ─── SPECIAL TOKENS GAME ───
let tokenPieces=[];
let tokenTarget=[];
function resetTokens(){
  tokenPieces=[
    {id:'t-bos',text:'[BOS]',type:'special',placed:false},
    {id:'t-sep',text:'[SEP]',type:'special',placed:false},
    {id:'t-eos',text:'[EOS]',type:'special',placed:false},
    {id:'t-pad1',text:'[PAD]',type:'special',placed:false},
    {id:'t-pad2',text:'[PAD]',type:'special',placed:false},
    {id:'t-q',text:'What is Python?',type:'normal',placed:false},
    {id:'t-a',text:'Python is a programming language.',type:'normal',placed:false}
  ];
  tokenTarget=[];
  renderTokenBank();
  renderTokenTarget();
  const r=document.getElementById('tokenResult');if(r)r.innerHTML='';
}
function renderTokenBank(){
  const bank=document.getElementById('tokenBank');if(!bank)return;
  bank.innerHTML='';
  tokenPieces.forEach(p=>{
    if(!p.placed){
      const chip=document.createElement('div');
      chip.className='token-chip '+(p.type==='special'?'special':'normal');
      chip.textContent=p.text;
      chip.draggable=true;
      chip.setAttribute('data-id',p.id);
      chip.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',p.id);});
      chip.addEventListener('click',()=>{
        p.placed=true;
        tokenTarget.push(p);
        renderTokenBank();
        renderTokenTarget();
      });
      bank.appendChild(chip);
    }
  });
}
function renderTokenTarget(){
  const tgt=document.getElementById('tokenTarget');if(!tgt)return;
  tgt.innerHTML='';
  tokenTarget.forEach((p,i)=>{
    const chip=document.createElement('div');
    chip.className='token-chip '+(p.type==='special'?'special':'normal');
    chip.textContent=p.text;
    chip.style.cursor='pointer';
    chip.title='Click to remove';
    chip.addEventListener('click',()=>{
      p.placed=false;
      tokenTarget.splice(i,1);
      renderTokenBank();
      renderTokenTarget();
    });
    tgt.appendChild(chip);
  });
  // Drop zone
  tgt.addEventListener('dragover',e=>{e.preventDefault();tgt.classList.add('over');});
  tgt.addEventListener('dragleave',()=>{tgt.classList.remove('over');});
  tgt.addEventListener('drop',e=>{
    e.preventDefault();tgt.classList.remove('over');
    const id=e.dataTransfer.getData('text/plain');
    const piece=tokenPieces.find(p=>p.id===id);
    if(piece&&!piece.placed){piece.placed=true;tokenTarget.push(piece);renderTokenBank();renderTokenTarget();}
  });
}
function checkTokens(){
  const correct=['[BOS]','What is Python?','[SEP]','Python is a programming language.','[EOS]','[PAD]','[PAD]'];
  const user=tokenTarget.map(t=>t.text);
  const r=document.getElementById('tokenResult');
  if(user.length!==correct.length){r.innerHTML='<span style="color:var(--yellow);">\u{1F914} You have '+user.length+' tokens, expected '+correct.length+'. Keep going!</span>';return;}
  let match=true;
  for(let i=0;i<correct.length;i++){if(user[i]!==correct[i]){match=false;break;}}
  if(match){
    r.innerHTML='<span style="color:var(--green);">\u2705 Perfect! [BOS] starts the sequence, [SEP] separates prompt from response, [EOS] marks the end, and [PAD] fills the remaining space!</span>';
    asc('st-game',15);
  }else{
    r.innerHTML='<span style="color:var(--red);">\u274C Not quite. Expected: [BOS] Question [SEP] Answer [EOS] [PAD] [PAD]. Click Reset to try again!</span>';
  }
  rq('st-game',15);
}

// ─── CONTEXT WINDOW GAME ───
function updateCW(){
  const wSize=parseInt(document.getElementById('cwSize').value);
  const pos=parseInt(document.getElementById('cwPos').value);
  document.getElementById('cwSizeV').textContent=wSize;
  document.getElementById('cwPosV').textContent=pos;
  const totalTokens=20;
  const words=['The','quick','brown','fox','jumps','over','the','lazy','dog','and','then','runs','back','to','its','cozy','warm','little','den','today'];
  const viz=document.getElementById('cwViz');
  let html='<div style="display:flex;flex-wrap:wrap;gap:3px;">';
  for(let i=0;i<totalTokens;i++){
    const inWindow=i>=Math.max(0,pos-wSize+1)&&i<=pos;
    const isCurrent=i===pos;
    const bg=isCurrent?'var(--accent)':inWindow?'rgba(72,202,228,0.2)':'var(--bg4)';
    const border=isCurrent?'2px solid var(--accent)':inWindow?'1px solid var(--accent)':'1px solid rgba(255,255,255,0.05)';
    const color=isCurrent?'#fff':inWindow?'var(--accent)':'var(--dim)';
    html+=`<div style="padding:4px 8px;border-radius:6px;background:${bg};border:${border};font-size:11px;font-weight:600;color:${color};">${i}:${words[i]}</div>`;
  }
  html+='</div>';
  viz.innerHTML=html;
  // Memory comparison
  const N=totalTokens;
  const fullMem=N*N;
  const slideMem=N*wSize;
  document.getElementById('cwFull').textContent=fullMem+' ops';
  document.getElementById('cwSlide').textContent=slideMem+' ops';
  const saving=((1-slideMem/fullMem)*100).toFixed(0);
  document.getElementById('cwInfo').innerHTML=`Window covers tokens ${Math.max(0,pos-wSize+1)} to ${pos} (${Math.min(wSize,pos+1)} tokens visible) | Sliding window saves ${saving}% memory vs full attention`;
}

// ─── RAG GAME ───
const ragData={
  questions:[
    {q:'What is the population of Tokyo in 2024?',relevant:[0,2],answer:'Based on the retrieved documents, Tokyo\'s metropolitan area has approximately 37.4 million people as of 2024, making it the world\'s most populous metropolitan area.'},
    {q:'How does photosynthesis work?',relevant:[1],answer:'Based on the retrieved documents, photosynthesis converts CO2 and water into glucose and oxygen using sunlight. The process occurs in chloroplasts and involves light-dependent reactions and the Calvin cycle.'},
    {q:'What programming language is best for AI?',relevant:[2,0],answer:'Based on the retrieved documents, Python is the most popular language for AI/ML due to its rich ecosystem (PyTorch, TensorFlow, scikit-learn) and readable syntax, though performance-critical components often use C++.'}
  ],
  docs:[
    {title:'World Population Report 2024',text:'Tokyo metropolitan area: 37.4M people. Delhi: 32.9M. Shanghai: 29.2M. Python is used by 67% of data scientists worldwide.'},
    {title:'Biology Textbook Ch.5',text:'Photosynthesis occurs in chloroplasts. Light reactions split water molecules. The Calvin cycle fixes CO2 into glucose. 6CO2 + 6H2O → C6H12O6 + 6O2.'},
    {title:'Tech Industry Survey 2024',text:'Python leads AI/ML with 78% adoption. Tokyo hosts 3 major AI research labs. JavaScript dominates web development. Rust is growing for systems programming.'}
  ],
  currentQ:0,
  selectedDocs:new Set()
};
function initRAG(){
  ragData.currentQ=0;ragData.selectedDocs=new Set();
  renderRAG();
}
function renderRAG(){
  const qDiv=document.getElementById('ragQuestions');
  const dDiv=document.getElementById('ragDocs');
  if(!qDiv||!dDiv)return;
  qDiv.innerHTML='';
  ragData.questions.forEach((q,i)=>{
    const active=i===ragData.currentQ;
    qDiv.innerHTML+=`<div style="padding:8px 12px;border-radius:8px;background:${active?'rgba(72,202,228,0.15)':'var(--bg4)'};border:2px solid ${active?'var(--accent)':'transparent'};cursor:pointer;font-size:12px;font-weight:${active?'700':'600'};" onclick="ragData.currentQ=${i};ragData.selectedDocs=new Set();renderRAG();document.getElementById('ragOutput').innerHTML='';">${q.q}</div>`;
  });
  dDiv.innerHTML='';
  ragData.docs.forEach((d,i)=>{
    const sel=ragData.selectedDocs.has(i);
    dDiv.innerHTML+=`<div style="padding:8px 12px;border-radius:8px;background:${sel?'rgba(6,214,160,0.15)':'var(--bg4)'};border:2px solid ${sel?'var(--green)':'transparent'};cursor:pointer;font-size:12px;transition:all .2s;" onclick="ragToggleDoc(${i})">
    <strong style="color:${sel?'var(--green)':'var(--accent)'};">${sel?'\u2705 ':'\u{1F4C4} '}${d.title}</strong><br>
    <span style="color:var(--dim);font-size:11px;">${d.text}</span></div>`;
  });
}
function ragToggleDoc(i){
  if(ragData.selectedDocs.has(i))ragData.selectedDocs.delete(i);
  else ragData.selectedDocs.add(i);
  renderRAG();
  document.getElementById('ragOutput').innerHTML='';
}
function ragGenerate(){
  const q=ragData.questions[ragData.currentQ];
  const out=document.getElementById('ragOutput');
  if(ragData.selectedDocs.size===0){out.innerHTML='<div class="eb r"><p>\u26A0 Select at least one document to retrieve!</p></div>';return;}
  // Check if user picked the right docs
  const correct=new Set(q.relevant);
  const picked=ragData.selectedDocs;
  const allCorrect=[...correct].every(d=>picked.has(d));
  const noExtra=[...picked].every(d=>correct.has(d));
  let html='<div class="ob" style="margin-top:8px;"><strong style="color:var(--accent);">Augmented Prompt:</strong><br><br>';
  html+='<span style="color:var(--dim);">System: Use the following context to answer. If the answer is not in the context, say "I don\'t know."</span><br><br>';
  html+='<span style="color:var(--green);">Context:</span><br>';
  [...picked].forEach(i=>{html+='<span style="color:var(--yellow);">[Doc '+i+']</span> '+ragData.docs[i].text+'<br>';});
  html+='<br><span style="color:var(--accent);">Question:</span> '+q.q+'<br>';
  html+='<br><span style="color:var(--green);">Answer:</span> '+q.answer+'</div>';
  if(allCorrect&&noExtra){
    html+='<div style="color:var(--green);font-size:12px;margin-top:6px;">\u2705 Perfect document selection! You picked exactly the relevant documents.</div>';
    asc('rag-game',15);
  }else if(allCorrect){
    html+='<div style="color:var(--yellow);font-size:12px;margin-top:6px;">\u{1F914} You got the relevant docs but also included some irrelevant ones. Extra docs waste context window space!</div>';
  }else{
    html+='<div style="color:var(--red);font-size:12px;margin-top:6px;">\u274C You missed some relevant documents. Try again!</div>';
  }
  out.innerHTML=html;
  rq('rag-game',15);
}

// ─── HALLUCINATION GAME ───
const halItems=[
  {text:'The Great Wall of China is visible from space with the naked eye. It was built over 2,000 years ago during the Qin Dynasty to protect against invasions from the north.',
   hallucinated:true,
   explanation:'The Great Wall is NOT visible from space with the naked eye — this is a common myth. Astronauts have confirmed it\'s too narrow to see. The model generated this because it\'s a widely repeated "fact" in training data.',
   highlight:'visible from space with the naked eye'},
  {text:'Python was created by Guido van Rossum and first released in 1991. It emphasizes code readability and uses significant whitespace indentation.',
   hallucinated:false,
   explanation:'This is entirely correct! Python was indeed created by Guido van Rossum, released in 1991, and is known for its readability and whitespace-based indentation.',
   highlight:''},
  {text:'According to a 2023 study by Dr. James Mitchell published in the Journal of Computational Linguistics, transformer models achieve 99.7% accuracy on all natural language tasks when scaled beyond 100B parameters.',
   hallucinated:true,
   explanation:'This citation is completely fabricated! The author, journal reference, and statistic are all made up. LLMs frequently generate plausible-sounding but fake citations because the PATTERN of "Author et al., Journal Name" has high probability.',
   highlight:'Dr. James Mitchell published in the Journal of Computational Linguistics'}
];
let halIdx=0,halScore=0;
function initHal(){
  halIdx=0;halScore=0;showHal();
}
function showHal(){
  const g=document.getElementById('halGame');if(!g)return;
  if(halIdx>=halItems.length){
    g.innerHTML=`<div style="text-align:center;padding:16px;">
    <div style="font-size:24px;">${halScore>=2?'\u{1F389}':'\u{1F914}'}</div>
    <p style="font-size:14px;font-weight:700;">You spotted ${halScore}/${halItems.length} correctly!</p>
    <p style="font-size:12px;color:var(--dim);margin-top:4px;">Remember: LLMs predict likely tokens, not true facts. Always verify important claims!</p></div>`;
    if(halScore>=2)asc('hal-game',15);
    return;
  }
  const item=halItems[halIdx];
  g.innerHTML=`<h4>LLM Output ${halIdx+1}/${halItems.length}:</h4>
  <div class="ob" style="margin:8px 0;font-size:13px;line-height:1.7;">${esc(item.text)}</div>
  <p style="font-size:12px;margin-bottom:6px;">Is this output factually correct or does it contain hallucination?</p>
  <div style="display:flex;gap:8px;">
  <button class="btn bg" onclick="halPick(false)" style="flex:1;">\u2705 Factually Correct</button>
  <button class="btn" onclick="halPick(true)" style="flex:1;background:var(--red);color:#fff;">\u{1F6A8} Contains Hallucination</button></div>
  <div id="halFb" style="margin-top:8px;font-size:12px;"></div>`;
  rq('hal-game',15);
}
function halPick(userSaysHallucinated){
  const item=halItems[halIdx];
  const correct=userSaysHallucinated===item.hallucinated;
  if(correct)halScore++;
  const fb=document.getElementById('halFb');
  fb.innerHTML=`<div class="eb ${correct?'g':'r'}">
  <p><strong>${correct?'\u2705 Correct!':'\u274C Wrong!'}</strong></p>
  <p style="margin-top:4px;">${item.explanation}</p>
  ${item.highlight?'<p style="margin-top:4px;color:var(--yellow);">Key issue: "'+esc(item.highlight)+'"</p>':''}
  </div>`;
  setTimeout(()=>{halIdx++;showHal();},3000);
}
