{fn:'vectors.py',fd:'Level 1 — Numbers That Mean Things',t:'<span class="level-badge lb1">L1</span> Vectors — Numbers With Meaning',su:'A vector is a list of numbers. In LLMs, every word IS a vector. Similar words = similar vectors.',
code:`# ============================================
# VECTORS — The Language of AI
# ============================================
# A vector is just a LIST OF NUMBERS.
# But in AI, those numbers have MEANING.
#
# WHAT IS A VECTOR?
# =================
# Think of it as coordinates.
# A point on a map has 2 numbers: (x, y)
# A point in 3D space has 3: (x, y, z)
# A word in an LLM has 768 numbers!
#
# Example: 2D vector
point = [3, 4]  # x=3, y=4

# Example: word embedding (simplified to 4D)
cat  = [0.9, 0.1, 0.8, 0.2]  # furry, small
dog  = [0.8, 0.2, 0.7, 0.3]  # furry, medium
car  = [0.1, 0.9, 0.1, 0.8]  # not furry, big

# Notice: cat and dog are SIMILAR vectors!
# car is very DIFFERENT from both.

# ── VECTOR OPERATIONS ──

# 1. ADDITION: combine vectors
a = [1, 2, 3]
b = [4, 5, 6]
# a + b = [1+4, 2+5, 3+6] = [5, 7, 9]
# Each element added separately!

# 2. SCALAR MULTIPLICATION: scale a vector
a = [1, 2, 3]
# 2 * a = [2, 4, 6]  (each element × 2)

# 3. DOT PRODUCT: multiply pairs, then sum
a = [1, 2, 3]
b = [4, 5, 6]
# a · b = 1*4 + 2*5 + 3*6 = 4 + 10 + 18 = 32
#
# WHY THIS MATTERS:
# Dot product measures SIMILARITY!
# High dot product = vectors point same direction
# Low/zero = vectors are unrelated
# Negative = vectors point opposite directions

# 4. MAGNITUDE (LENGTH): how "big" is the vector?
import math
a = [3, 4]
length = math.sqrt(3**2 + 4**2)  # = 5.0
# This is the Pythagorean theorem!

# 5. COSINE SIMILARITY: similarity ignoring length
# cos(θ) = (a · b) / (|a| × |b|)
# Range: -1 (opposite) to +1 (identical direction)
# This is how LLMs measure word similarity!

def cosine_similarity(a, b):
    dot = sum(x*y for x, y in zip(a, b))
    mag_a = math.sqrt(sum(x**2 for x in a))
    mag_b = math.sqrt(sum(x**2 for x in b))
    return dot / (mag_a * mag_b)

# cat vs dog: cosine_sim ≈ 0.97 (very similar!)

{fn:'matrices.py',fd:'Level 1 — The Core Operation of Neural Networks',t:'<span class="level-badge lb1">L1</span> Matrices — Grids of Numbers',su:'Every neural network layer is a matrix multiplication. Master this and you understand 80% of what happens inside an LLM.',
code:`# ============================================
# MATRICES — The Core of Neural Networks
# ============================================
# A matrix is a 2D grid of numbers.
# Think of it as a spreadsheet or table.
#
# WHY MATRICES MATTER:
# Every single layer in a neural network does:
#   output = input_vector @ weight_matrix + bias
# That "@" is matrix multiplication!

import numpy as np

# ── CREATING MATRICES ──
# A 2×3 matrix (2 rows, 3 columns)
A = np.array([
    [1, 2, 3],    # row 0
    [4, 5, 6]     # row 1
])
# Shape: (2, 3) — always (rows, columns)

# ── MATRIX MULTIPLICATION ──
# THE most important operation in all of AI!
#
# Rule: (a, b) @ (b, c) = (a, c)
# Inner dimensions MUST match!
#
# How it works:
# Each output cell = dot product of a ROW from A
# with a COLUMN from B.

A = np.array([[1, 2],     # (2, 2)
              [3, 4]])
B = np.array([[5, 6],     # (2, 2)
              [7, 8]])

C = A @ B
# C[0,0] = 1*5 + 2*7 = 5 + 14 = 19
# C[0,1] = 1*6 + 2*8 = 6 + 16 = 22
# C[1,0] = 3*5 + 4*7 = 15 + 28 = 43
# C[1,1] = 3*6 + 4*8 = 18 + 32 = 50
# C = [[19, 22],
#      [43, 50]]

# ── TRANSPOSE ──
# Flip rows and columns
A = np.array([[1, 2, 3],
              [4, 5, 6]])  # (2, 3)
A_T = A.T
# [[1, 4],
#  [2, 5],
#  [3, 6]]  # (3, 2)

# ── SHAPES IN A TRANSFORMER ──
# Input: (batch_size, seq_len, embed_dim)
# Example: (32, 128, 768)
#   32 sentences, each 128 tokens, each 768-dim
#
# Weight matrix W_query: (768, 64)
# Q = input @ W_query
# Shape: (32, 128, 768) @ (768, 64) = (32, 128, 64)
#
# Attention: Q @ K^T
# (32, 128, 64) @ (32, 64, 128) = (32, 128, 128)
# This 128×128 matrix = attention scores!
# Each token's attention to every other token.

# ── BROADCASTING ──
# NumPy can add different-shaped arrays!
matrix = np.array([[1, 2], [3, 4]])  # (2, 2)
vector = np.array([10, 20])          # (2,)
result = matrix + vector
# [[11, 22],   ← [10,20] added to row 0
#  [13, 24]]   ← [10,20] added to row 1
# The vector is "broadcast" to each row!`,

{fn:'derivatives.py',fd:'Level 1 — Slopes, Rates of Change',t:'<span class="level-badge lb1">L1</span> Derivatives — How Models Learn',su:'A derivative = the slope of a curve at a point. It tells the model "which direction to adjust weights to reduce error."',
code:`# ============================================
# DERIVATIVES — The Math of Learning
# ============================================
# A derivative answers: "If I nudge x a tiny bit,
# how much does y change?"
#
# INTUITION:
# You're on a hill. The derivative tells you
# how STEEP the hill is and which DIRECTION
# is downhill. Go downhill = reduce error!

# ── BASIC DERIVATIVES ──
# f(x) = x²     → f'(x) = 2x
# f(x) = x³     → f'(x) = 3x²
# f(x) = 5x     → f'(x) = 5
# f(x) = 7      → f'(x) = 0 (constant!)
# f(x) = x^n    → f'(x) = n * x^(n-1)  [POWER RULE]
#
# RULES:
# Sum:     (f + g)' = f' + g'
# Product: (f * g)' = f'g + fg'
# Chain:   (f(g(x)))' = f'(g(x)) * g'(x)

# ── WHAT DOES THE DERIVATIVE MEAN? ──
def f(x):
    return x ** 2

# At x = 3:
# f(3) = 9
# f'(3) = 2*3 = 6
# Meaning: if x increases by 0.01,
# f(x) increases by about 0.01 * 6 = 0.06
# Verify: f(3.01) = 9.0601 ≈ 9 + 0.06 ✓

# At x = 0:
# f'(0) = 0
# Meaning: the curve is FLAT here.
# This is the MINIMUM! (slope = 0)

# At x = -2:
# f'(-2) = -4
# Meaning: slope is negative = going downhill
# To find the minimum, go in the POSITIVE direction

# ── GRADIENT DESCENT ──
# The algorithm that trains ALL neural networks:
#
# 1. Compute the loss (how wrong are we?)
# 2. Compute the derivative of loss w.r.t. each weight
# 3. Nudge each weight in the opposite direction
#
# weight = weight - learning_rate * derivative
#
# If derivative is positive: weight is too high → decrease
# If derivative is negative: weight is too low → increase
# If derivative is zero: we're at the minimum! Stop.

def gradient_descent(start_x, learning_rate=0.1, steps=20):
    x = start_x
    for step in range(steps):
        gradient = 2 * x          # derivative of x²
        x = x - learning_rate * gradient  # step downhill
        print(f"Step {step}: x={x:.4f}, f(x)={x**2:.4f}")
    return x

# gradient_descent(5.0)
# Step 0: x=4.0000, f(x)=16.0000
# Step 1: x=3.2000, f(x)=10.2400
# Step 2: x=2.5600, f(x)=6.5536
# ...
# Step 19: x=0.0072, f(x)=0.0001  ← near minimum!

# ── PARTIAL DERIVATIVES ──
# When f depends on MULTIPLE variables:
# f(x, y) = x² + y²
# ∂f/∂x = 2x  (treat y as constant)
# ∂f/∂y = 2y  (treat x as constant)
#
# In neural networks, we compute partial derivatives
# for EVERY weight. Millions of them!`,

{fn:'probability.py',fd:'Level 1 — How Models Predict',t:'<span class="level-badge lb1">L1</span> Probability — How LLMs Choose Words',su:'LLMs output probabilities for every possible next word. Softmax, temperature, cross-entropy — all explained here.',
code:`# ============================================
# PROBABILITY — How LLMs Predict
# ============================================
# An LLM doesn't output ONE word.
# It outputs a PROBABILITY for every word!
#
# "The cat sat on the ___"
#   mat:   35%    ← most likely
#   floor: 20%
#   bed:   15%
#   roof:  10%
#   ...
# Then it SAMPLES from this distribution.

# ── WHAT IS PROBABILITY? ──
# Probability = how likely something is
# Range: 0 (impossible) to 1 (certain)
# All probabilities must sum to 1.0
#
# Example: rolling a fair die
# P(1) = P(2) = ... = P(6) = 1/6 ≈ 0.167
# Sum: 6 × 1/6 = 1.0 ✓

# ── SOFTMAX ──
# The neural network outputs raw scores (logits).
# Softmax converts them to probabilities.
#
# softmax(x_i) = e^(x_i) / Σ e^(x_j)
#
# Properties:
# 1. All outputs are positive (e^x > 0 always)
# 2. All outputs sum to 1.0
# 3. Larger input → larger probability
# 4. Preserves ordering

import numpy as np

def softmax(logits):
    # Subtract max for numerical stability
    shifted = logits - np.max(logits)
    exp_vals = np.exp(shifted)
    return exp_vals / exp_vals.sum()

logits = np.array([2.0, 1.0, 0.5])
probs = softmax(logits)
# [0.659, 0.242, 0.099]
# Highest logit (2.0) → highest prob (65.9%)

# ── TEMPERATURE ──
# Controls how "confident" the distribution is.
# softmax(logits / temperature)
#
# temp = 0.1: very peaked (almost greedy)
#   → [0.999, 0.001, 0.000]
# temp = 1.0: normal
#   → [0.659, 0.242, 0.099]
# temp = 5.0: very flat (almost uniform)
#   → [0.389, 0.332, 0.279]

def softmax_temp(logits, temperature):
    scaled = logits / temperature
    shifted = scaled - np.max(scaled)
    exp_vals = np.exp(shifted)
    return exp_vals / exp_vals.sum()

# ── CROSS-ENTROPY LOSS ──
# Measures how wrong our predictions are.
# loss = -log(probability of correct answer)
#
# If we predict 0.9 for the right word:
#   loss = -log(0.9) = 0.105  (low = good!)
# If we predict 0.01 for the right word:
#   loss = -log(0.01) = 4.605 (high = bad!)
#
# The model trains to MINIMIZE this loss.

def cross_entropy(probs, correct_index):
    return -np.log(probs[correct_index])

# ── SAMPLING STRATEGIES ──
# Greedy: always pick highest probability
# Top-k:  only consider top k tokens
# Top-p:  only consider tokens summing to p%
# Temperature: scale logits before softmax

# Greedy (temp→0): "The cat sat on the mat"
# Creative (temp=1.2): "The cat sat on the rainbow"
# Wild (temp=2.0): "The cat sat on the quantum"`,

{fn:'backprop.py',fd:'Level 2 — Chain Rule Through Layers',t:'<span class="level-badge lb2">L2</span> Backpropagation — How Networks Learn',su:'The chain rule applied through every layer. This is THE algorithm that makes deep learning possible.',
code:`# ============================================
# BACKPROPAGATION
# ============================================
# "How does the model know which weights to change?"
#
# Answer: BACKPROPAGATION
# = chain rule applied backwards through layers
#
# FORWARD PASS: input → layer1 → layer2 → loss
# BACKWARD PASS: loss → layer2 → layer1 → gradients!

# ── THE CHAIN RULE ──
# If y = f(g(x)), then:
#   dy/dx = dy/dg × dg/dx
#
# In words: multiply the derivatives along the chain.
#
# Example: y = (3x + 2)²
# Let u = 3x + 2, y = u²
# dy/du = 2u
# du/dx = 3
# dy/dx = 2u × 3 = 6(3x + 2)

# ── SIMPLE NEURAL NETWORK ──
# Input: x
# Layer 1: h = w1 * x + b1
# Activation: a = relu(h)
# Layer 2: y = w2 * a + b2
# Loss: L = (y - target)²

# FORWARD PASS (compute output):
x = 2.0
w1, b1 = 0.5, 0.1
w2, b2 = 0.8, -0.2
target = 1.0

h = w1 * x + b1        # h = 0.5*2 + 0.1 = 1.1
a = max(0, h)           # a = relu(1.1) = 1.1
y = w2 * a + b2         # y = 0.8*1.1 - 0.2 = 0.68
L = (y - target) ** 2   # L = (0.68-1)² = 0.1024

# BACKWARD PASS (compute gradients):
# Start from loss, work backwards!

# dL/dy = 2(y - target) = 2(0.68-1) = -0.64
dL_dy = 2 * (y - target)

# dy/dw2 = a = 1.1
# dL/dw2 = dL/dy × dy/dw2 = -0.64 × 1.1 = -0.704
dL_dw2 = dL_dy * a

# dy/da = w2 = 0.8
# da/dh = 1 (relu derivative, since h > 0)
# dh/dw1 = x = 2.0
# dL/dw1 = dL/dy × dy/da × da/dh × dh/dw1
#        = -0.64 × 0.8 × 1 × 2.0 = -1.024
dL_dw1 = dL_dy * w2 * 1 * x

# UPDATE WEIGHTS:
lr = 0.1
w1 = w1 - lr * dL_dw1  # 0.5 - 0.1*(-1.024) = 0.6024
w2 = w2 - lr * dL_dw2  # 0.8 - 0.1*(-0.704) = 0.8704

# After update, the prediction will be CLOSER to target!

# ── IN REAL NETWORKS ──
# PyTorch does this AUTOMATICALLY!
# loss.backward()  ← computes ALL gradients
# optimizer.step() ← updates ALL weights
# That's it! But understanding the math helps debug.

# ── VANISHING/EXPLODING GRADIENTS ──
# If gradients get multiplied many times:
# 0.5 × 0.5 × 0.5 × ... = vanishes to 0!
# 2.0 × 2.0 × 2.0 × ... = explodes to infinity!
# Solutions: ReLU, residual connections, gradient clipping`,

{fn:'neurons.py',fd:'Level 2 — Perceptrons, Activations, Loss',t:'<span class="level-badge lb2">L2</span> Neurons & Layers',su:'The building blocks of neural networks — neurons, activation functions, layers, and loss functions.',
code:`# ============================================
# NEURONS & LAYERS
# ============================================
# A neuron: output = activation(w·x + b)
# A layer: many neurons in parallel
# A network: many layers stacked

import numpy as np

# ── SINGLE NEURON ──
# inputs: [x1, x2, x3]
# weights: [w1, w2, w3]
# bias: b
# output = activation(x1*w1 + x2*w2 + x3*w3 + b)

def neuron(inputs, weights, bias):
    z = np.dot(inputs, weights) + bias
    return relu(z)

# ── ACTIVATION FUNCTIONS ──
# Without activations, stacking layers is useless!
# (linear(linear(x)) = still linear)

def relu(x):
    """max(0, x) — kills negatives, passes positives"""
    return np.maximum(0, x)
    # x = -3 → 0
    # x = 0  → 0
    # x = 5  → 5
    # Derivative: 0 if x<0, 1 if x>0

def sigmoid(x):
    """Squashes to (0, 1) — used for probabilities"""
    return 1 / (1 + np.exp(-x))
    # x = -10 → 0.00005
    # x = 0   → 0.5
    # x = 10  → 0.99995
    # Problem: gradient max = 0.25 (vanishing!)

def gelu(x):
    """Used in GPT, BERT — smooth version of ReLU"""
    return 0.5 * x * (1 + np.tanh(
        np.sqrt(2/np.pi) * (x + 0.044715*x**3)))
    # Like ReLU but smooth at x=0
    # Allows small negative values through

def swiglu(x, gate):
    """Used in LLaMA, PaLM — gated activation"""
    return x * sigmoid(gate) * gate
    # Combines gating with activation
    # State-of-the-art for modern LLMs

# ── A LAYER = MANY NEURONS ──
class LinearLayer:
    def __init__(self, in_dim, out_dim):
        # Xavier initialization
        scale = np.sqrt(2.0 / in_dim)
        self.W = np.random.randn(in_dim, out_dim) * scale
        self.b = np.zeros(out_dim)
        # W shape: (in_dim, out_dim)
        # Parameters: in_dim × out_dim + out_dim

    def forward(self, x):
        # x: (batch, in_dim)
        # output: (batch, out_dim)
        return x @ self.W + self.b

# ── LOSS FUNCTIONS ──
# MSE: for regression (predict a number)
def mse_loss(pred, target):
    return np.mean((pred - target) ** 2)

# Cross-Entropy: for classification (predict a class)
# Used in ALL language models!
def cross_entropy(logits, target_idx):
    probs = softmax(logits)
    return -np.log(probs[target_idx])

# ── PUTTING IT TOGETHER ──
# A 2-layer network:
# input(4) → Linear(4,8) → ReLU → Linear(8,3) → softmax
# Parameters: 4×8+8 + 8×3+3 = 67
# This tiny network can classify inputs into 3 classes!`,

<div class="eb r"><p><strong>&#x1F525; Why activations matter:</strong> Without them, 100 layers = 1 layer (linear functions compose into linear functions). Activations add non-linearity, letting networks learn curves, edges, and complex patterns.</p></div></div>

code:`# ============================================
# NLP — Natural Language Processing
# ============================================
# Computers only understand numbers.
# NLP = converting text into numbers and back.
#
# THE PIPELINE:
# "The cat" → tokenize → ["The"," cat"]
#           → encode   → [464, 3797]
#           → embed    → [[0.1,0.3,...], [0.2,0.7,...]]
#           → model    → logits for next token
#           → softmax  → probabilities
#           → sample   → next token ID
#           → decode   → "sat"

# ── TOKENIZATION TYPES ──

# 1. CHARACTER-LEVEL: each letter is a token
text = "cat"
tokens = list(text)  # ['c', 'a', 't']
# Vocab size: ~100 (letters + punctuation)
# Pro: tiny vocabulary
# Con: sequences are very long

# 2. WORD-LEVEL: each word is a token
text = "The cat sat"
tokens = text.split()  # ['The', 'cat', 'sat']
# Vocab size: ~100,000+
# Pro: short sequences
# Con: can't handle new/rare words ("ChatGPT"?)

# 3. SUBWORD (BPE): the sweet spot!
text = "unhappiness"
tokens = ["un", "happiness"]  # or ["un","happ","iness"]
# Vocab size: ~32,000-50,000
# Pro: handles any word by breaking into known pieces
# Con: slightly longer than word-level
# GPT-2/3/4, LLaMA, Mistral ALL use BPE!

# ── HOW BPE WORKS ──
# 1. Start with individual characters
# 2. Find the most frequent pair (e.g., "t"+"h")
# 3. Merge them into a new token ("th")
# 4. Repeat until vocab_size reached
#
# "the cat" → ['t','h','e',' ','c','a','t']
# Most frequent pair: ('t','h') → merge!
# → ['th','e',' ','c','a','t']
# Next: ('th','e') → merge!
# → ['the',' ','c','a','t']
# Next: ('c','a') → merge!
# → ['the',' ','ca','t']
# And so on...

# ── EMBEDDINGS ──
# Each token ID maps to a learned vector.
import numpy as np

vocab_size = 50000
embed_dim = 768  # GPT-2

# Embedding table: (50000, 768)
# = 50000 × 768 = 38.4 MILLION parameters!
embedding_table = np.random.randn(vocab_size, embed_dim)

# Look up: token_id → vector
token_id = 3797  # "cat"
cat_vector = embedding_table[token_id]  # shape: (768,)

# ── POSITIONAL ENCODING ──
# "The cat ate the fish" ≠ "The fish ate the cat"
# Same tokens, different meaning!
# Position encoding tells the model WHERE each token is.
#
# Sinusoidal (original Transformer):
#   PE(pos, 2i)   = sin(pos / 10000^(2i/d))
#   PE(pos, 2i+1) = cos(pos / 10000^(2i/d))
#
# Learned (GPT-2): just another embedding table!
#   position_embedding = Embedding(max_seq_len, embed_dim)
#
# RoPE (LLaMA): rotates vectors based on position
#   Encodes RELATIVE position, not absolute

# ── LANGUAGE MODELING OBJECTIVE ──
# Given context, predict the NEXT token.
# "The cat sat on" → predict "the"
# "The cat sat on the" → predict "mat"
#
# This is CAUSAL (autoregressive) modeling:
# Can only see PAST tokens, never future ones.
# Enforced by a causal MASK in attention.`,

code:`# ============================================
# PYTORCH — The LLM Framework
# ============================================
# PyTorch = NumPy + GPU + Automatic Gradients
# GPT, LLaMA, Mistral, Claude — all PyTorch!

import torch
import torch.nn as nn

# ── TENSORS (like NumPy arrays, but better) ──
a = torch.tensor([1.0, 2.0, 3.0])
b = torch.zeros(3, 4)         # 3×4 of zeros
c = torch.randn(2, 3)         # random normal
d = torch.ones(5)              # [1,1,1,1,1]

# Key properties:
print(a.shape)    # torch.Size([3])
print(a.dtype)    # torch.float32
print(a.device)   # cpu (or cuda:0 for GPU)

# Move to GPU:
if torch.cuda.is_available():
    a = a.to('cuda')  # now on GPU!

# Operations (same as NumPy):
x = torch.randn(3, 4)
y = torch.randn(4, 2)
z = x @ y              # matrix multiply → (3,2)
z = x + 1              # broadcast add
z = x * 2              # scalar multiply
z = x.sum()            # sum all elements
z = x.mean(dim=1)      # mean along columns

# ── AUTOGRAD (automatic differentiation) ──
# PyTorch tracks operations and computes
# gradients AUTOMATICALLY!

x = torch.tensor(3.0, requires_grad=True)
y = x ** 2 + 2 * x + 1   # y = x² + 2x + 1
y.backward()               # compute dy/dx
print(x.grad)              # tensor(8.0)
# dy/dx = 2x + 2 = 2(3) + 2 = 8 ✓

# This works for MILLIONS of parameters!
# PyTorch builds a computation graph and
# applies the chain rule automatically.

# ── nn.Module (building models) ──
class BabyLLM(nn.Module):
    def __init__(self, vocab_size, embed_dim, hidden):
        super().__init__()
        # Layers are registered as attributes
        self.embedding = nn.Embedding(vocab_size, embed_dim)
        self.linear1 = nn.Linear(embed_dim, hidden)
        self.linear2 = nn.Linear(hidden, vocab_size)
        self.relu = nn.ReLU()

    def forward(self, x):
        # x: (batch, seq_len) — token IDs
        emb = self.embedding(x)          # (B, S, E)
        h = self.relu(self.linear1(emb)) # (B, S, H)
        logits = self.linear2(h)         # (B, S, V)
        return logits

model = BabyLLM(50000, 768, 2048)

# Count parameters:
total = sum(p.numel() for p in model.parameters())
print(f"{total:,} parameters")

# ── TRAINING LOOP ──
optimizer = torch.optim.AdamW(model.parameters(), lr=3e-4)
criterion = nn.CrossEntropyLoss()

for batch in dataloader:
    # 1. Forward pass
    logits = model(batch['input_ids'])

    # 2. Compute loss
    loss = criterion(
        logits.view(-1, vocab_size),
        batch['labels'].view(-1)
    )

    # 3. Backward pass (compute gradients)
    loss.backward()

    # 4. Update weights
    optimizer.step()

    # 5. Reset gradients
    optimizer.zero_grad()

    # That's it! 5 lines to train any model.`,

# weight = weight - lr * gradient  ← that's SGD
# But we can do MUCH better!

import torch

# ── SGD (Stochastic Gradient Descent) ──
# The simplest optimizer.
# weight -= lr * gradient
#
# Problems:
# 1. Same LR for all parameters (some need more!)
# 2. Oscillates in steep dimensions
# 3. Gets stuck in saddle points

# ── SGD + Momentum ──
# Add "velocity" — like a ball rolling downhill
# velocity = 0.9 * velocity + gradient
# weight -= lr * velocity
#
# The 0.9 means: "remember 90% of previous direction"
# This smooths out oscillations and speeds up!

# ── Adam (Adaptive Moment Estimation) ──
# THE standard optimizer for deep learning.
# Tracks TWO things per parameter:
#   m = running average of gradients (momentum)
#   v = running average of gradient² (variance)
#
# Update: weight -= lr * m / (sqrt(v) + eps)
#
# Why this works:
# - Parameters with large gradients get SMALLER steps
# - Parameters with small gradients get LARGER steps
# - Automatically adapts learning rate per parameter!

# m_t = β1 * m_{t-1} + (1-β1) * gradient
# v_t = β2 * v_{t-1} + (1-β2) * gradient²
# m_hat = m_t / (1 - β1^t)   # bias correction
# v_hat = v_t / (1 - β2^t)
# weight -= lr * m_hat / (sqrt(v_hat) + eps)
#
# Default: β1=0.9, β2=0.999, eps=1e-8

# ── AdamW (Adam + Weight Decay) ──
# Standard for ALL modern LLMs!
# Adds weight decay DIRECTLY to weights:
# weight -= lr * (m_hat/(sqrt(v_hat)+eps) + wd*weight)
#
# Weight decay = "prefer smaller weights"
# Prevents overfitting, improves generalization

optimizer = torch.optim.AdamW(
    model.parameters(),
    lr=3e-4,           # peak learning rate
    betas=(0.9, 0.95), # momentum parameters
    weight_decay=0.1,  # regularization strength
    eps=1e-8
)

# ── LEARNING RATE SCHEDULE ──
# Don't use a fixed LR! Change it during training.
#
# Warmup: start low, increase linearly
#   Why? Random weights → large gradients → instability
#   Warmup lets the model "settle" first.
#
# Cosine Decay: after warmup, decrease smoothly
#   lr = max_lr * 0.5 * (1 + cos(π * progress))
#
# GPT-3 recipe: 375M warmup steps, then cosine decay

import math
def get_lr(step, total_steps, warmup, max_lr, min_lr):
    if step < warmup:
        return max_lr * step / warmup
    progress = (step - warmup) / (total_steps - warmup)
    return min_lr + (max_lr - min_lr) * 0.5 * (
        1 + math.cos(math.pi * progress))

# ── GRADIENT CLIPPING ──
# If gradients are too large → training explodes!
# Solution: cap the gradient magnitude.
torch.nn.utils.clip_grad_norm_(
    model.parameters(), max_norm=1.0
)
# If total gradient norm > 1.0, scale ALL gradients
# down proportionally. Simple and effective!`,

{fn:'attention.py',fd:'Level 3 — The Key Innovation',t:'<span class="level-badge lb3">L3</span> Attention — The Heart of LLMs',su:'THE breakthrough that made Transformers possible. Q, K, V matrices, scaled dot-product, multi-head attention, causal masking.',
code:`# ============================================
# ATTENTION MECHANISM
# ============================================
# "Attention Is All You Need" (2017)
# The paper that started the LLM revolution!
#
# CORE IDEA:
# For each token, compute how much it should
# "attend to" (look at) every other token.
#
# "The cat sat on the mat"
# When processing "sat", attention might focus
# heavily on "cat" (who sat?) and "on" (sat where?)

import torch
import torch.nn as nn
import math

# ── Q, K, V — The Three Matrices ──
# For each token, we compute three vectors:
#   Q (Query):  "What am I looking for?"
#   K (Key):    "What do I contain?"
#   V (Value):  "What information do I provide?"
#
# Analogy: Library search
#   Q = your search query
#   K = book titles (what each book is about)
#   V = book contents (the actual information)
#   Attention = match query to titles, read matching books

# Input: (batch, seq_len, embed_dim)
# W_q, W_k, W_v: (embed_dim, head_dim)

embed_dim = 768
head_dim = 64  # 768 / 12 heads = 64

W_q = nn.Linear(embed_dim, head_dim, bias=False)
W_k = nn.Linear(embed_dim, head_dim, bias=False)
W_v = nn.Linear(embed_dim, head_dim, bias=False)

# For input x: (batch, seq_len, 768)
Q = W_q(x)  # (batch, seq_len, 64)
K = W_k(x)  # (batch, seq_len, 64)
V = W_v(x)  # (batch, seq_len, 64)

# ── SCALED DOT-PRODUCT ATTENTION ──
# Step 1: Compute attention scores
# scores = Q @ K^T / sqrt(head_dim)
scores = Q @ K.transpose(-2, -1) / math.sqrt(head_dim)
# Shape: (batch, seq_len, seq_len)
# scores[i][j] = how much token i attends to token j

# Step 2: Apply causal mask (for autoregressive LLMs)
# Token i can only attend to tokens 0..i (not future!)
mask = torch.triu(torch.ones(seq_len, seq_len), diagonal=1)
scores = scores.masked_fill(mask == 1, float('-inf'))

# Step 3: Softmax → probabilities
weights = torch.softmax(scores, dim=-1)
# Each row sums to 1.0
# weights[i][j] = probability that token i looks at token j

# Step 4: Weighted sum of values
output = weights @ V  # (batch, seq_len, head_dim)
# Each token's output = weighted average of all V vectors

# ── MULTI-HEAD ATTENTION ──
# Instead of one attention, run 12 in parallel!
# Each head can learn different patterns:
#   Head 1: subject-verb relationships
#   Head 2: adjective-noun relationships
#   Head 3: positional patterns
#   ...
# Then concatenate and project back.

class MultiHeadAttention(nn.Module):
    def __init__(self, embed_dim, n_heads):
        super().__init__()
        self.n_heads = n_heads
        self.head_dim = embed_dim // n_heads
        self.W_qkv = nn.Linear(embed_dim, 3*embed_dim)
        self.W_out = nn.Linear(embed_dim, embed_dim)

    def forward(self, x):
        B, S, E = x.shape
        qkv = self.W_qkv(x)  # (B, S, 3*E)
        qkv = qkv.reshape(B, S, 3, self.n_heads, self.head_dim)
        qkv = qkv.permute(2, 0, 3, 1, 4)
        Q, K, V = qkv[0], qkv[1], qkv[2]
        # Each: (B, n_heads, S, head_dim)

        scores = Q @ K.transpose(-2,-1) / math.sqrt(self.head_dim)
        # Causal mask
        mask = torch.triu(torch.ones(S,S,device=x.device),1).bool()
        scores.masked_fill_(mask, float('-inf'))
        weights = torch.softmax(scores, dim=-1)
        out = weights @ V  # (B, n_heads, S, head_dim)
        out = out.transpose(1,2).reshape(B, S, E)
        return self.W_out(out)`,

{fn:'transformer.py',fd:'Level 3 — The Full Architecture',t:'<span class="level-badge lb3">L3</span> Transformer Architecture',su:'The complete stack: embedding → N × (attention + FFN + LayerNorm + residual) → output. Every LLM is this.',
code:`# ============================================
# TRANSFORMER ARCHITECTURE
# ============================================
# Every LLM (GPT, LLaMA, Mistral, Claude) is
# a stack of Transformer DECODER blocks.
#
# FULL ARCHITECTURE:
# ==================
# 1. Token Embedding + Position Embedding
# 2. N × Transformer Block:
#    a. LayerNorm
#    b. Multi-Head Self-Attention
#    c. Residual Connection (add input back)
#    d. LayerNorm
#    e. Feed-Forward Network (FFN)
#    f. Residual Connection
# 3. Final LayerNorm
# 4. Linear → logits (vocab_size)

import torch
import torch.nn as nn

class TransformerBlock(nn.Module):
    def __init__(self, embed_dim, n_heads, ff_dim, dropout=0.1):
        super().__init__()
        self.ln1 = nn.LayerNorm(embed_dim)
        self.attn = MultiHeadAttention(embed_dim, n_heads)
        self.ln2 = nn.LayerNorm(embed_dim)
        self.ffn = nn.Sequential(
            nn.Linear(embed_dim, ff_dim),
            nn.GELU(),
            nn.Linear(ff_dim, embed_dim),
            nn.Dropout(dropout)
        )

    def forward(self, x):
        # Pre-norm architecture (used by GPT-2+)
        # Residual + Attention
        x = x + self.attn(self.ln1(x))
        # Residual + FFN
        x = x + self.ffn(self.ln2(x))
        return x

# ── LAYER NORM ──
# Normalizes activations to mean=0, std=1
# Then scales and shifts with learned params
# WHY: stabilizes training, prevents values
# from growing too large or too small
#
# For each token vector [x1, x2, ..., xd]:
#   mean = average of all xi
#   std = standard deviation
#   x_norm = (x - mean) / (std + eps)
#   output = gamma * x_norm + beta
# gamma and beta are LEARNED parameters

# ── RESIDUAL CONNECTIONS ──
# output = layer(x) + x  ← add input back!
#
# WHY: gradient highway!
# d(x + f(x))/dx = 1 + f'(x)
# The "1" means gradients always flow through.
# Without residuals, 100-layer networks can't train.

# ── FEED-FORWARD NETWORK ──
# Two linear layers with activation in between.
# FFN(x) = Linear2(GELU(Linear1(x)))
#
# Linear1: (embed_dim → 4*embed_dim)  expand
# GELU: activation
# Linear2: (4*embed_dim → embed_dim)  compress
#
# This is where the model "thinks" about each token.
# Attention = communication between tokens
# FFN = computation within each token

# ── FULL GPT MODEL ──
class GPT(nn.Module):
    def __init__(self, vocab_size, embed_dim, n_heads,
                 n_layers, max_seq_len, ff_dim):
        super().__init__()
        self.tok_emb = nn.Embedding(vocab_size, embed_dim)
        self.pos_emb = nn.Embedding(max_seq_len, embed_dim)
        self.blocks = nn.ModuleList([
            TransformerBlock(embed_dim, n_heads, ff_dim)
            for _ in range(n_layers)
        ])
        self.ln_f = nn.LayerNorm(embed_dim)
        self.head = nn.Linear(embed_dim, vocab_size, bias=False)

    def forward(self, idx):
        B, S = idx.shape
        tok = self.tok_emb(idx)                    # (B,S,E)
        pos = self.pos_emb(torch.arange(S, device=idx.device))
        x = tok + pos                              # (B,S,E)
        for block in self.blocks:
            x = block(x)                           # (B,S,E)
        x = self.ln_f(x)                           # (B,S,E)
        logits = self.head(x)                      # (B,S,V)
        return logits

# GPT-2 Small: vocab=50257, embed=768, heads=12,
#              layers=12, ff=3072
# Parameters: ~124 million`,

tokens = tokenizer.encode(text)  # [464, 3797, ...]

# Create input-target pairs (sliding window)
# Input:  [The, cat, sat, on]
# Target: [cat, sat, on, the]  ← shifted by 1!
seq_len = 128
def get_batch(data, batch_size, seq_len):
    ix = torch.randint(len(data)-seq_len, (batch_size,))
    x = torch.stack([data[i:i+seq_len] for i in ix])
    y = torch.stack([data[i+1:i+seq_len+1] for i in ix])
    return x, y  # both (batch_size, seq_len)

    embed_dim=768,

    n_layers=12,

    ff_dim=3072
)

# ── STEP 3: OPTIMIZER + SCHEDULE ──

    model.parameters(),
    lr=6e-4,
    betas=(0.9, 0.95),
    weight_decay=0.1
)

    loss = nn.CrossEntropyLoss()(
        logits.view(-1, 50257),  # (64*128, 50257)
        y.view(-1)               # (64*128,)
    )

    # Backward pass
    loss.backward()

    # Gradient clipping
    torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)

    # Update learning rate
    lr = get_lr(step, total_steps, warmup_steps, 6e-4, 6e-5)

        pg['lr'] = lr

    # Update weights
    optimizer.step()
    optimizer.zero_grad()

    if step % 100 == 0:
        print(f"Step {step}, Loss: {loss.item():.4f}, LR: {lr:.6f}")

# ── STEP 5: EVALUATION ──
# Perplexity = e^(average loss)
# Lower = better. Random = vocab_size (50257)

    perplexity = math.exp(avg_loss)

# ── STEP 6: GENERATION ──
def generate(model, prompt_ids, max_new_tokens, temperature=0.8):
    model.eval()
    ids = prompt_ids.clone()
    for _ in range(max_new_tokens):
        # Only use last max_seq_len tokens
        context = ids[:, -1024:]
        logits = model(context)
        # Get logits for last position only
        next_logits = logits[:, -1, :] / temperature
        probs = torch.softmax(next_logits, dim=-1)
        next_id = torch.multinomial(probs, 1)
        ids = torch.cat([ids, next_id], dim=1)
