// 1: RoPE
{fn:'rope.py',fd:'Rotary Position Embeddings',t:'\u{1F504} RoPE',su:'Position encoding through rotation \u2014 used by LLaMA',
code:`# RoPE - Rotary Position Embeddings
# ==================================
# Baby/Teen: LEARNED position embeddings
#   - A lookup table: position -> vector
#   - Fixed max length!
#
# Adult: RoPE (mathematical rotation)
#   - ROTATES Q,K vectors by position angle
#   - Can extrapolate to longer sequences!
#   - Used by LLaMA, GPT-NeoX, Mistral
#
# HOW IT WORKS:
#   Think of a clock:
#     Position 0 = 12 o'clock (0 degrees)
#     Position 1 = rotated slightly (57 degrees)
#     Position 2 = rotated more (114 degrees)
#
#   The ANGLE between positions encodes their
#   RELATIVE distance. Key insight!

def precompute_rope_frequencies(dim, max_len):
    # Each dimension pair rotates at different speed
    freqs = 1.0 / (10000 ** (
        torch.arange(0, dim, 2).float() / dim
    ))
    positions = torch.arange(max_len).float()
    angles = torch.outer(positions, freqs)
    return torch.cos(angles), torch.sin(angles)

def apply_rope(x, cos, sin):
    # Split into pairs of dimensions
    x_even = x[..., 0::2]  # dims 0,2,4,...
    x_odd  = x[..., 1::2]  # dims 1,3,5,...

    # 2D rotation for each pair:
    # [x0,x1] -> [x0*cos-x1*sin, x0*sin+x1*cos]
    rotated_even = x_even * cos - x_odd * sin
    rotated_odd  = x_even * sin + x_odd * cos

    return interleave(rotated_even, rotated_odd)

# Position 0: 0 degrees
# Position 1: 57.3 degrees
# Position 2: 114.6 degrees
# Nearby = small angle difference
# Far apart = large angle difference`,
gm:function(c){c.innerHTML=`

<div class="eb b"><p><strong>Why better than learned?</strong> Learned embeddings have a fixed max length (e.g., 2048). RoPE uses math, so it can extrapolate to longer sequences it's never seen!</p></div></div>

// 2: GQA
{fn:'multi_query_attention.py',fd:'Shared K,V heads for efficiency',t:'\u{1F465} Grouped-Query Attention',su:'Share K,V across heads to save memory \u2014 used by LLaMA-2, Mistral',
code:`# GQA - Grouped-Query Attention
# ==============================
# Standard MHA: 4 Q heads, 4 K heads, 4 V heads
#   = 12 projection matrices
#
# MQA: 4 Q heads, 1 K head, 1 V head
#   = 6 matrices (50% less!)
#
# GQA: 4 Q heads, 2 K heads, 2 V heads
#   = 8 matrices (middle ground)
#
# WHY? KV-Cache is the memory bottleneck!
# Fewer K,V heads = smaller cache = more tokens

class GroupedQueryAttention(nn.Module):
    def __init__(self, n_embd, n_heads, n_kv_heads,
                 block_size, dropout=0.1):
        # Q has full heads
        self.q_proj = nn.Linear(
            n_embd, n_heads * head_size)
        # K,V have FEWER heads
        self.k_proj = nn.Linear(
            n_embd, n_kv_heads * head_size)
        self.v_proj = nn.Linear(
            n_embd, n_kv_heads * head_size)

    def _repeat_kv(self, x):
        # Repeat K,V to match Q head count
        # If 4 Q heads and 2 KV heads:
        #   KV head 0 serves Q heads 0,1
        #   KV head 1 serves Q heads 2,3
        return x.repeat(1, 1, n_rep, 1)

# Memory savings for KV-Cache:
# MHA (4 KV heads): 100% memory
# GQA (2 KV heads): 50% memory
# MQA (1 KV head):  25% memory
# Quality barely drops!`,

// 3: SwiGLU
{fn:'swiglu.py',fd:'Gated activation used by LLaMA',t:'\u{1F6AA} SwiGLU Activation',su:'A gated activation that outperforms ReLU and GELU',
code:`# SwiGLU - Gated Activation
# ==========================
# ReLU:   max(0, x)
# GELU:   x * Phi(x)
# Swish:  x * sigmoid(x)
# SwiGLU: Swish(x*W1) * (x*W2)  <-- GATED!
#
# The "gate" decides what info passes through.
# Like a bouncer at a club!

class SwiGLUFeedForward(nn.Module):
    def __init__(self, n_embd, dropout=0.1):
        hidden = int(2 * (4 * n_embd) / 3)

        # TWO parallel projections
        self.w_gate = nn.Linear(n_embd, hidden)
        self.w_up   = nn.Linear(n_embd, hidden)
        self.w_down = nn.Linear(hidden, n_embd)

    def forward(self, x):
        # Gate: decides what passes through
        gate = F.silu(self.w_gate(x))  # Swish

        # Value: the actual information
        value = self.w_up(x)

        # Gating: gate * value
        x = gate * value  # <-- the magic!

        return self.w_down(x)

# Swish(x) = x * sigmoid(x)
# sigmoid(x) = 1 / (1 + exp(-x))
#
# x=-3: Swish=-0.14 (small negative OK!)
# x= 0: Swish= 0.00
# x= 3: Swish= 2.86`,
gm:function(c){c.innerHTML=`
<div class="s"><h3>\u{1F6AA} Understanding SwiGLU</h3>
<div class="eb p"><p><strong>\u{1F6AA} Bouncer Analogy:</strong> SwiGLU has TWO paths: a "gate" (bouncer) and a "value" (guests). The bouncer decides which guests get in. This lets the network learn WHAT information to keep!</p></div></div>
<div class="s"><h3><span class="bd bd-g">GAME</span> Activation Comparison!</h3>

// 5: Beam Search
{fn:'beam_search.py',fd:'Deterministic generation',t:'\u{1F4A1} Beam Search',su:'Finding the best sequence, not just the best next token',
code:`# BEAM SEARCH
# ============
# Greedy: pick best token at each step
#   "The" -> "little" -> "cat" -> ...
#   (locally optimal, globally maybe not)
#
# Beam Search: keep TOP B candidates
#   beam_width=3: keep 3 best sequences
#
# Step 1: "The" -> expand:
#   Beam 1: "The little" (0.9)
#   Beam 2: "The cat"    (0.7)
#   Beam 3: "The big"    (0.5)
#
# Step 2: expand ALL beams, keep top 3:
#   Beam 1: "The little cat"  (0.85)
#   Beam 2: "The little dog"  (0.80)
#   Beam 3: "The cat sat"     (0.65)

def beam_search(model, start, beam_width=3):
    beams = [(start_tokens, 0.0)]

    for step in range(max_tokens):
        candidates = []
        for seq, score in beams:
            logits = model(seq)
            log_probs = log_softmax(logits[-1])
            top = topk(log_probs, beam_width)

            for token, prob in top:
                candidates.append(
                    (seq + [token], score + prob)
                )

        # Keep only top beam_width
        candidates.sort(reverse=True)
        beams = candidates[:beam_width]

    return beams[0]  # Best sequence!`,

// 6: RMSNorm
{fn:'adult_model.py',fd:'Simpler normalization',t:'\u{1F4CF} RMSNorm',su:'Simpler and faster than LayerNorm \u2014 used by LLaMA',
code:`# RMSNorm vs LayerNorm
# =====================
# LayerNorm (Baby/Teen):
#   1. Compute mean
#   2. Compute variance
#   3. Normalize: (x - mean) / sqrt(var)
#   4. Scale and shift: gamma * x + beta
#
# RMSNorm (Adult/LLaMA):
#   1. Compute RMS (root mean square)
#   2. Normalize: x / RMS
#   3. Scale only: gamma * x (no shift!)
#
# RMSNorm is simpler:
#   - No mean computation
#   - No shift parameter (beta)
#   - ~10% faster in practice

class RMSNorm(nn.Module):
    def __init__(self, dim, eps=1e-6):
        super().__init__()
        self.eps = eps
        self.weight = nn.Parameter(torch.ones(dim))

    def forward(self, x):
        # RMS = sqrt(mean(x^2))
        rms = torch.sqrt(
            torch.mean(x ** 2, dim=-1,
                       keepdim=True) + self.eps
        )
        # Normalize and scale
        return x / rms * self.weight

# LayerNorm: 2*dim parameters (gamma + beta)
# RMSNorm:   1*dim parameters (gamma only)
# Same quality, fewer params, faster!`,

{fn:'adult_model.py',fd:'Sharing embedding and output weights',t:'\u{1F517} Weight Tying',su:'A simple trick that saves parameters and improves quality',
code:`# WEIGHT TYING
# ==============
# The embedding layer converts token IDs
# to vectors: (vocab_size, n_embd)
#
# The output layer converts vectors back
# to token probabilities: (n_embd, vocab_size)
#
# Notice: they're TRANSPOSES of each other!
# Embedding:  token -> vector
# Output:     vector -> token
#
# Weight Tying: SHARE the same weight matrix!
#
# self.output_head.weight = \\
#     self.token_embedding.weight
#
# Benefits:
#   - Fewer parameters (saves vocab_size * n_embd)
#   - Better generalization
#   - Used by GPT-2, LLaMA, most modern LLMs
#
# For our model:
#   vocab_size=100, n_embd=256
#   Savings: 100 * 256 = 25,600 parameters!
#
# For GPT-3:
#   vocab_size=50257, n_embd=12288
#   Savings: 617 MILLION parameters!

class AdultLLM(nn.Module):
    def __init__(self, vocab_size, n_embd=256):
        self.token_embedding = nn.Embedding(
            vocab_size, n_embd
        )
        self.output_head = nn.Linear(
            n_embd, vocab_size, bias=False
        )
        # TIE THE WEIGHTS!
        self.output_head.weight = \\
            self.token_embedding.weight`,

function drawRope(){
  const canvas=document.getElementById('ropeCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,r=Math.min(W,H)*0.38;
  const pos=parseInt(document.getElementById('ropePos').value);
  document.getElementById('ropePosVal').textContent=pos;
  // Draw circle
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  // Draw positions
  for(let p=0;p<32;p++){
    const angle=p*0.1-Math.PI/2;
    const x=cx+r*Math.cos(angle),y=cy+r*Math.sin(angle);
    const isCur=p===pos;
    ctx.fillStyle=isCur?'var(--accent)':p<pos?'rgba(6,214,160,0.5)':'rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.arc(x,y,isCur?8:4,0,Math.PI*2);ctx.fill();
    if(isCur){ctx.fillStyle='#fff';ctx.font='bold 10px Nunito';ctx.textAlign='center';ctx.fillText(p,x,y+3);}
  }
  // Draw arrow for current position
  const angle=pos*0.1-Math.PI/2;
  ctx.strokeStyle='var(--accent)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,cy);
  ctx.lineTo(cx+r*0.8*Math.cos(angle),cy+r*0.8*Math.sin(angle));ctx.stroke();
  // Arrow head
  const ax=cx+r*0.8*Math.cos(angle),ay=cy+r*0.8*Math.sin(angle);
  ctx.fillStyle='var(--accent)';ctx.beginPath();ctx.arc(ax,ay,5,0,Math.PI*2);ctx.fill();
  // Info
  const deg=(pos*0.1*180/Math.PI).toFixed(1);
  document.getElementById('ropeInfo').innerHTML=`Position ${pos}: rotated ${deg}\u00B0 | Each position rotates by ~5.7\u00B0 | Nearby positions = similar angles`;
}

// GQA visualization
function updateGQA(){
  const nkv=parseInt(document.getElementById('gqaSlider').value);
  document.getElementById('gqaVal').textContent=nkv;
  const nq=8,hs=32;
  const name=nkv===nq?'Standard MHA':nkv===1?'MQA':'GQA ('+nkv+' groups)';
  const qParams=nq*hs*256,kvParams=nkv*hs*256*2;
  const stdKV=nq*hs*256*2;
  const saving=((1-kvParams/stdKV)*100).toFixed(0);
  const viz=document.getElementById('gqaViz');
  let html='<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">';
  for(let i=0;i<nq;i++){
    const kvGroup=Math.floor(i/(nq/nkv));
    const colors=['var(--accent)','var(--green)','var(--blue)','var(--purple)','var(--yellow)','var(--red)','#ec4899','#8b5cf6'];
    html+=`<div style="text-align:center;"><div style="width:28px;height:28px;border-radius:6px;background:rgba(0,180,216,0.2);border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;">Q${i}</div><div style="font-size:8px;color:var(--dim);">\u2193</div><div style="width:28px;height:28px;border-radius:6px;background:${colors[kvGroup]}30;border:2px solid ${colors[kvGroup]};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;">KV${kvGroup}</div></div>`;
  }
  html+='</div>';viz.innerHTML=html;
  document.getElementById('gqaStats').innerHTML=`<strong>${name}</strong> | KV heads: ${nkv} | KV cache savings: <span style="color:var(--green);">${saving}%</span> | ${nkv===nq?'No savings':'Fewer KV heads = smaller cache!'}`;
}

// SwiGLU
function swish(x){return x/(1+Math.exp(-x));}
function gelu2(x){return 0.5*x*(1+Math.tanh(Math.sqrt(2/Math.PI)*(x+0.044715*x*x*x)));}
function updateSw(){
  const x=parseInt(document.getElementById('swSlider').value)/10;
  document.getElementById('swIn').textContent=x.toFixed(1);
  document.getElementById('swR').textContent=Math.max(0,x).toFixed(2);
  document.getElementById('swG').textContent=gelu2(x).toFixed(2);
  document.getElementById('swS').textContent=swish(x).toFixed(2);
  drawSw(x);
}
function drawSw(cx){
  const canvas=document.getElementById('swCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const mapX=x=>(x+3)/6*W,mapY=y=>H-(y+1)/4*H;
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(mapX(-3),mapY(0));ctx.lineTo(mapX(3),mapY(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(mapX(0),0);ctx.lineTo(mapX(0),H);ctx.stroke();
  [[Math.max,'var(--blue)'],[gelu2,'var(--purple)'],[swish,'var(--accent)']].forEach(([fn,col])=>{
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();
    for(let x=-3;x<=3;x+=0.05){const y=typeof fn==='function'?fn(x):Math.max(0,x);const px=mapX(x),py=mapY(y);x===-3?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.stroke();
  });
  if(cx!==undefined){ctx.fillStyle='var(--yellow)';ctx.beginPath();ctx.arc(mapX(cx),mapY(swish(cx)),5,0,Math.PI*2);ctx.fill();}
}

// Flash Attention
function updateFlash(){
  const n=parseInt(document.getElementById('flashSlider').value)*1024;
  document.getElementById('flashLen').textContent=n;
  const std=n*n,fl=n*64;
  function fmt(v){if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return v;}
  document.getElementById('flashStd').textContent=fmt(std);
  document.getElementById('flashFl').textContent=fmt(fl);
  document.getElementById('flashSave').textContent=`\u26A1 Flash uses ${(fl/std*100).toFixed(2)}% of the memory! (${(std/fl).toFixed(0)}x savings)`;
}

const beamWords={
  'The':[[' little',0.4],[' cat',0.3],[' big',0.2],[' happy',0.08],[' old',0.02]],
  ' little':[[' cat',0.5],[' dog',0.25],[' bird',0.15],[' fish',0.08],[' mouse',0.02]],
  ' cat':[[' sat',0.35],[' loved',0.3],[' would',0.2],[' was',0.1],[' ran',0.05]],
  ' big':[[' tree',0.4],[' cat',0.3],[' dog',0.2],[' house',0.08],[' bird',0.02]],
  ' happy':[[' cat',0.5],[' day',0.3],[' little',0.15],[' dog',0.04],[' bird',0.01]],
  ' dog':[[' sat',0.3],[' ran',0.3],[' loved',0.2],[' was',0.15],[' would',0.05]],
  ' sat':[[' on',0.5],[' in',0.3],[' down',0.15],[' up',0.04],[' by',0.01]],
  ' loved':[[' to',0.5],[' the',0.3],[' his',0.1],[' her',0.08],[' it',0.02]],
};
function beamReset(){
  beamState=[{seq:'The',score:0,display:'The'}];beamStep=0;renderBeam();
}
function beamExpand(){
  if(beamStep>=4)return;
  const bw=parseInt(document.getElementById('beamW').value);
  let all=[];
  beamState.forEach(b=>{
    const lastWord=b.seq.split(/(?= )/).pop();
    const nexts=beamWords[lastWord]||beamWords[' cat'];
    nexts.slice(0,bw).forEach(([w,p])=>{
      all.push({seq:b.seq+w,score:b.score+Math.log(p),display:b.display+`<span style="color:var(--accent);">${w}</span>`});
    });
  });
  all.sort((a,b)=>b.score-a.score);
  beamState=all.slice(0,bw);beamStep++;renderBeam();
}
function renderBeam(){
  const v=document.getElementById('beamViz');
  v.innerHTML=`<div style="font-size:11px;color:var(--dim);margin-bottom:6px;">Step ${beamStep}/4</div>`;
  beamState.forEach((b,i)=>{
    const barW=Math.max(5,Math.min(100,(b.score+10)*10));
    v.innerHTML+=`<div style="padding:6px 10px;background:var(--bg4);border-radius:6px;margin:4px 0;display:flex;align-items:center;gap:8px;border-left:3px solid ${i===0?'var(--green)':'var(--bg4)'};">
    <span style="color:var(--dim);font-size:10px;width:16px;">#${i+1}</span>
    <span style="flex:1;font-size:12px;">${b.display}</span>
    <span style="font-family:'Fira Code',monospace;font-size:10px;color:var(--yellow);">${b.score.toFixed(2)}</span></div>`;
  });
}

// RMSNorm calculator
function calcNorms(){
  const x=[2.0,-1.0,0.5,3.0];
  const mean=x.reduce((a,b)=>a+b)/x.length;
  const variance=x.reduce((a,b)=>a+(b-mean)**2,0)/x.length;
  const ln=x.map(v=>(v-mean)/Math.sqrt(variance+1e-6));
  const rms=Math.sqrt(x.reduce((a,b)=>a+b*b,0)/x.length+1e-6);
  const rn=x.map(v=>v/rms);
  document.getElementById('normResult').innerHTML=`
  <div><strong>Input:</strong> [${x.join(', ')}]</div>
  <div style="margin-top:6px;"><strong style="color:var(--blue);">LayerNorm:</strong></div>
  <div>  Mean=${mean.toFixed(2)}, Var=${variance.toFixed(2)}</div>
  <div>  Result: [${ln.map(v=>v.toFixed(3)).join(', ')}]</div>
  <div>  Params: gamma (scale) + beta (shift) = 2\u00D7dim</div>
  <div style="margin-top:6px;"><strong style="color:var(--accent);">RMSNorm:</strong></div>
  <div>  RMS=${rms.toFixed(3)}</div>
  <div>  Result: [${rn.map(v=>v.toFixed(3)).join(', ')}]</div>
  <div>  Params: gamma (scale) only = 1\u00D7dim</div>
  <div style="margin-top:6px;color:var(--green);">\u2705 RMSNorm: simpler (no mean), fewer params, ~10% faster!</div>`;
}

// RLHF game
const rlhfPairs=[
  {prompt:'Explain gravity to a 5-year-old.',
   a:'Gravity is the force of attraction between two masses proportional to the product of their masses and inversely proportional to the square of the distance between them.',
   b:'Gravity is like an invisible hand that pulls everything down to the ground! That\'s why when you throw a ball up, it always comes back down.',
   better:'b',reason:'Response B is better because it uses simple language and a relatable analogy for a 5-year-old.'},
  {prompt:'Write a poem about the ocean.',
   a:'The ocean is big. It has water. Fish live there. The end.',
   b:'Beneath the waves of sapphire blue, a world of wonder waits for you. Where dolphins dance and corals sway, in the ocean\'s gentle ballet.',
   better:'b',reason:'Response B is more creative, poetic, and engaging.'},
  {prompt:'How do I pick a lock?',
   a:'Here are the steps to pick a lock: First get a tension wrench and a pick...',
   b:'I can\'t help with lock picking as it could be used for illegal entry. If you\'re locked out, I\'d suggest calling a licensed locksmith.',
   better:'b',reason:'Response B is safer and more responsible, declining a potentially harmful request.'},
];
let rlhfIdx=0,rlhfScore=0;
function initRLHF(){
  rlhfIdx=0;rlhfScore=0;showRLHF();
}
function showRLHF(){
  const g=document.getElementById('rlhfGame');
  if(rlhfIdx>=rlhfPairs.length){g.innerHTML=`<div style="text-align:center;padding:16px;"><div style="font-size:20px;">\u{1F389}</div><p>Done! You rated ${rlhfScore}/${rlhfPairs.length} correctly.</p><p style="font-size:12px;color:var(--dim);">This is exactly what human raters do for RLHF!</p></div>`;if(rlhfScore>=2)asc('rlhf-game',15);return;}
  const p=rlhfPairs[rlhfIdx];
  g.innerHTML=`<h4>Prompt: "${p.prompt}"</h4>
  <div style="display:flex;gap:8px;margin:8px 0;">
  <div id="rlA" style="flex:1;padding:10px;background:var(--bg4);border-radius:8px;cursor:pointer;border:2px solid transparent;font-size:12px;transition:all .2s;" onclick="pickRLHF('a')"><strong>Response A:</strong><br>${esc(p.a)}</div>
  <div id="rlB" style="flex:1;padding:10px;background:var(--bg4);border-radius:8px;cursor:pointer;border:2px solid transparent;font-size:12px;transition:all .2s;" onclick="pickRLHF('b')"><strong>Response B:</strong><br>${esc(p.b)}</div></div>
  <div id="rlFb" style="font-size:12px;margin-top:4px;"></div>
  <div style="font-size:11px;color:var(--dim);margin-top:4px;">${rlhfIdx+1}/${rlhfPairs.length}</div>`;
}
function pickRLHF(choice){
  const p=rlhfPairs[rlhfIdx];
  const correct=choice===p.better;
  if(correct)rlhfScore++;
  document.getElementById('rl'+(p.better==='a'?'A':'B')).style.borderColor='var(--green)';
  if(!correct)document.getElementById('rl'+(choice==='a'?'A':'B')).style.borderColor='var(--red)';
  document.getElementById('rlFb').innerHTML=(correct?'\u2705 ':'\u274C ')+p.reason;
  document.getElementById('rlFb').style.color=correct?'var(--green)':'var(--yellow)';
  setTimeout(()=>{rlhfIdx++;showRLHF();},2500);
}

  const v=parseInt(document.getElementById('wtVocab').value);
  const e=parseInt(document.getElementById('wtEmbd').value);
  document.getElementById('wtVV').textContent=v.toLocaleString();
  document.getElementById('wtEV').textContent=e.toLocaleString();

  <div style="font-size:14px;">Output:    <strong>${e.toLocaleString()} \u00D7 ${v.toLocaleString()}</strong> = ${saved.toLocaleString()} params</div>
  <div style="font-size:20px;font-weight:900;color:var(--green);margin-top:8px;">Saved: ${saved.toLocaleString()} parameters (${savedMB} MB)</div>

}
