<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby LLM Interactive - Learn by Playing!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2e;--bg4:#16213e;
  --accent:#00b4d8;--green:#06d6a0;--red:#e94560;--yellow:#ffd166;--purple:#a855f7;--orange:#f97316;
  --text:#e8e8f0;--dim:#6b7294;--code-bg:#0d1117;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}

/* ═══ TOP NAV ═══ */
.topbar{height:52px;background:var(--bg2);display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,0.05);gap:8px;z-index:100;}
.topbar .logo{font-weight:900;font-size:18px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:16px;}
.step-tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s;background:transparent;border:1px solid transparent;color:var(--dim);}
.step-tab:hover{color:var(--text);background:var(--bg3);}
.step-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.step-tab .tab-check{display:none;margin-left:4px;}
.step-tab.completed .tab-check{display:inline;}
.score-display{margin-left:auto;font-size:14px;font-weight:700;color:var(--yellow);display:flex;align-items:center;gap:6px;}

/* ═══ MAIN LAYOUT ═══ */
.main{display:flex;height:calc(100vh - 52px);}

/* LEFT: CODE PANEL */
.code-panel{width:50%;background:var(--code-bg);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;overflow:hidden;}
.code-header{padding:12px 20px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:12px;}
.code-header .filename{font-family:'Fira Code',monospace;font-size:13px;color:var(--accent);font-weight:600;}
.code-header .filedesc{font-size:12px;color:var(--dim);}
.code-scroll{flex:1;overflow-y:auto;padding:0;}
.code-content{font-family:'Fira Code',monospace;font-size:13px;line-height:1.9;padding:16px 0;counter-reset:line;}
.code-line{display:flex;padding:0 16px 0 0;min-height:24px;transition:background .3s;}
.code-line:hover{background:rgba(255,255,255,0.02);}
.code-line.highlighted{background:rgba(0,180,216,0.08);border-left:3px solid var(--accent);}
.line-num{min-width:48px;text-align:right;padding-right:16px;color:var(--dim);user-select:none;font-size:12px;}
.line-text{white-space:pre;flex:1;}
.kw{color:#ff79c6;} .str{color:#f1fa8c;} .cm{color:#6272a4;font-style:italic;} .fn{color:#50fa7b;} .num{color:#bd93f9;} .op{color:#ff79c6;} .cls{color:#8be9fd;} .dec{color:#ffb86c;}

/* RIGHT: GAME PANEL */
.game-panel{width:50%;display:flex;flex-direction:column;overflow:hidden;}
.game-header{padding:14px 24px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.05);}
.game-header h2{font-size:20px;font-weight:800;}
.game-header p{font-size:13px;color:var(--dim);margin-top:2px;}
.game-scroll{flex:1;overflow-y:auto;padding:24px;}

/* ═══ GAME COMPONENTS ═══ */
.section{margin-bottom:28px;}
.section h3{font-size:17px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section p,.section li{font-size:15px;line-height:1.7;color:var(--text);}
.explain-box{background:var(--bg3);border-radius:12px;padding:16px 20px;margin:10px 0;border-left:4px solid var(--accent);}
.explain-box.green{border-left-color:var(--green);}
.explain-box.yellow{border-left-color:var(--yellow);}
.explain-box.red{border-left-color:var(--red);}
.explain-box.purple{border-left-color:var(--purple);}

/* Quiz */
.quiz-box{background:var(--bg3);border-radius:14px;padding:20px;margin:14px 0;border:2px solid var(--bg4);}
.quiz-box.correct{border-color:var(--green);background:rgba(6,214,160,0.05);}
.quiz-box.wrong{border-color:var(--red);background:rgba(233,69,96,0.05);}
.quiz-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{padding:10px 16px;border-radius:10px;background:var(--bg4);cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;border:2px solid transparent;}
.quiz-opt:hover{background:rgba(0,180,216,0.1);border-color:var(--accent);}
.quiz-opt.selected-correct{background:rgba(6,214,160,0.15);border-color:var(--green);color:var(--green);}
.quiz-opt.selected-wrong{background:rgba(233,69,96,0.15);border-color:var(--red);color:var(--red);}
.quiz-opt.disabled{pointer-events:none;opacity:0.6;}
.quiz-opt.show-correct{border-color:var(--green);opacity:1 !important;}
.quiz-feedback{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;display:none;}
.quiz-feedback.show{display:block;}
.quiz-feedback.correct{background:rgba(6,214,160,0.1);color:var(--green);}
.quiz-feedback.wrong{background:rgba(233,69,96,0.1);color:var(--red);}

/* Interactive widgets */
.interactive-area{background:var(--bg3);border-radius:14px;padding:20px;margin:14px 0;border:2px solid var(--bg4);}
.interactive-area h4{font-size:15px;font-weight:800;margin-bottom:12px;}
.token-input-row{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;align-items:center;}
.char-box{width:44px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-family:'Fira Code',monospace;transition:all .3s;cursor:pointer;}
.char-box .ch{font-size:20px;font-weight:800;}
.char-box .id{font-size:11px;font-weight:700;margin-top:2px;}
.drag-item{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:700;cursor:grab;user-select:none;transition:all .2s;}
.drag-item:active{cursor:grabbing;transform:scale(1.05);}
.drop-zone{min-height:48px;border:2px dashed var(--dim);border-radius:10px;padding:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;transition:all .3s;}
.drop-zone.over{border-color:var(--accent);background:rgba(0,180,216,0.05);}
.drop-zone.correct-zone{border-color:var(--green);background:rgba(6,214,160,0.05);}
.btn{padding:10px 20px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-1px);}
.btn-primary{background:var(--accent);color:#000;}
.btn-success{background:var(--green);color:#000;}
.btn-reset{background:var(--bg4);color:var(--text);}
.slider-row{display:flex;align-items:center;gap:12px;margin:10px 0;}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);}
.slider-val{font-family:'Fira Code',monospace;font-size:16px;font-weight:700;color:var(--yellow);min-width:40px;}
.output-box{background:var(--code-bg);border-radius:10px;padding:14px 18px;font-family:'Fira Code',monospace;font-size:14px;line-height:1.7;margin:10px 0;min-height:40px;border:1px solid rgba(255,255,255,0.05);}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.badge-game{background:rgba(168,85,247,0.15);color:var(--purple);}
.badge-quiz{background:rgba(249,115,22,0.15);color:var(--orange);}
.badge-code{background:rgba(0,180,216,0.15);color:var(--accent);}

/* Attention grid game */
.attn-game-grid{display:grid;gap:3px;margin:10px auto;}
.attn-game-cell{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;font-weight:700;}
.attn-game-cell.header{background:transparent;color:var(--accent);cursor:default;font-family:'Fira Code',monospace;font-size:14px;}
.attn-game-cell.clickable{background:var(--bg4);border:2px solid transparent;}
.attn-game-cell.clickable:hover{border-color:var(--accent);}
.attn-game-cell.marked-yes{background:rgba(6,214,160,0.2);border-color:var(--green);color:var(--green);}
.attn-game-cell.marked-no{background:rgba(233,69,96,0.2);border-color:var(--red);color:var(--red);}
.attn-game-cell.revealed-correct{background:rgba(6,214,160,0.3);border-color:var(--green);}
.attn-game-cell.revealed-wrong{background:rgba(233,69,96,0.3);border-color:var(--red);}

/* Training game */
.training-viz{display:flex;align-items:flex-end;gap:4px;height:120px;margin:10px 0;padding:10px;background:var(--bg4);border-radius:10px;}
.train-bar{width:6px;border-radius:3px 3px 0 0;transition:height .3s;background:var(--red);}
.epoch-counter{font-size:36px;font-weight:900;text-align:center;margin:10px 0;}
.epoch-counter span{background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* Generation game */
.gen-display{font-family:'Fira Code',monospace;font-size:16px;background:var(--code-bg);padding:16px 20px;border-radius:10px;min-height:60px;line-height:1.8;border:1px solid rgba(255,255,255,0.05);}
.gen-cursor{border-right:2px solid var(--accent);animation:blink .8s step-end infinite;padding-right:2px;}
@keyframes blink{50%{border-color:transparent;}}
.prob-bar-row{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:13px;}
.prob-bar-row .char-label{width:30px;font-family:'Fira Code',monospace;font-weight:700;text-align:center;}
.prob-bar-track{flex:1;height:20px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.prob-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.prob-bar-row .pct{width:40px;text-align:right;font-family:'Fira Code',monospace;font-size:12px;color:var(--dim);}

/* Progress */
.step-progress{display:flex;align-items:center;gap:6px;margin:16px 0;}
.progress-dot{width:10px;height:10px;border-radius:50%;background:var(--bg4);transition:all .3s;}
.progress-dot.done{background:var(--green);}
.progress-dot.current{background:var(--accent);box-shadow:0 0 8px var(--accent);}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--dim);}
</style>
</head>
<body>
<!-- ═══ TOP BAR ═══ -->
<div class="topbar">
  <div class="logo">&#x1F37C; Baby LLM Interactive</div>
  <div class="step-tab active" onclick="goStep(0)">Intro</div>
  <div class="step-tab" onclick="goStep(1)">1.Data</div>
  <div class="step-tab" onclick="goStep(2)">2.Tokenizer</div>
  <div class="step-tab" onclick="goStep(3)">3.Embeddings</div>
  <div class="step-tab" onclick="goStep(4)">4.Attention</div>
  <div class="step-tab" onclick="goStep(5)">5.Transformer</div>
  <div class="step-tab" onclick="goStep(6)">6.Training</div>
  <div class="step-tab" onclick="goStep(7)">7.Generate</div>
  <div class="score-display">&#x2B50; Score: <span id="totalScore">0</span> / <span id="maxScore">0</span></div>
</div>

<!-- ═══ MAIN SPLIT ═══ -->
<div class="main">
  <!-- LEFT: CODE -->
  <div class="code-panel">
    <div class="code-header">
      <span class="filename" id="codeFilename">welcome.py</span>
      <span class="filedesc" id="codeFiledesc">Introduction</span>
    </div>
    <div class="code-scroll">
      <div class="code-content" id="codeContent"></div>
    </div>
  </div>

  <!-- RIGHT: GAME -->
  <div class="game-panel">
    <div class="game-header" id="gameHeader">
      <h2 id="gameTitle">Welcome!</h2>
      <p id="gameSubtitle">Learn by playing</p>
    </div>
    <div class="game-scroll">
      <div id="gameContent"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentStep = 0;
let score = 0;
let maxScore = 0;
let answeredQuizzes = {};
let completedSteps = {};

function addScore(quizId, pts) {
  if (answeredQuizzes[quizId]) return;
  answeredQuizzes[quizId] = true;
  score += pts;
  document.getElementById('totalScore').textContent = score;
}

function registerQuiz(quizId, pts) {
  if (!answeredQuizzes['_reg_' + quizId]) {
    answeredQuizzes['_reg_' + quizId] = true;
    maxScore += pts;
    document.getElementById('maxScore').textContent = maxScore;
  }
}

function completeStep(n) {
  completedSteps[n] = true;
  const tabs = document.querySelectorAll('.step-tab');
  tabs[n].classList.add('completed');
}

// ═══════════════════════════════════════════════════════════
// STEP DATA
// ═══════════════════════════════════════════════════════════
const STEPS = [

// ── STEP 0: INTRO ──
{
  filename: 'welcome.py', filedesc: 'What is an LLM?',
  title: '&#x1F37C; Welcome to Baby LLM!',
  subtitle: 'Learn how ChatGPT works — by building one yourself',
  code: `# ============================================
# Welcome to Baby LLM!
# ============================================
# You're about to build a LANGUAGE MODEL
# from scratch — the same kind of AI that
# powers ChatGPT, Claude, and Gemini.
#
# But ours is tiny — a "Baby" LLM!
#
# What does an LLM do?
# ====================
# It reads text, learns patterns, and then
# PREDICTS what comes next.
#
# Example:
#   Input:  "The cat sat on the ___"
#   Output: "mat" (most likely next word!)
#
# That's the ENTIRE idea. Seriously.
# Everything else is just making this
# prediction really, really good.
#
# ============================================
# THE 7 STEPS WE'LL BUILD:
# ============================================
#
# Step 1: Training Data    → What it reads
# Step 2: Tokenizer        → Cut text into pieces
# Step 3: Embeddings       → Turn pieces into numbers
# Step 4: Self-Attention   → Find important patterns
# Step 5: Transformer      → The complete "brain"
# Step 6: Training         → Practice makes perfect
# Step 7: Generation       → Write new text!
#
# Each step has:
#   - Code on the LEFT (you're reading it!)
#   - Interactive game on the RIGHT →→→
#
# Let's go! Click "Step 1: Data" above ↑`,
  game: function(container) {
    container.innerHTML = `
      <div class="section">
        <h3>&#x1F9E0; What is a Language Model?</h3>
        <div class="explain-box">
          <p>Imagine a <strong>super smart parrot</strong> &#x1F99C;</p>
          <p style="margin-top:8px;">It listens to millions of sentences, learns patterns like
          "after <em>hel</em> usually comes <em>lo</em>", and then it can <strong>predict</strong> what comes next!</p>
        </div>
      </div>

      <div class="section">
        <h3><span class="badge badge-game">GAME</span> Predict the Next Word!</h3>
        <p>Can YOU predict like an LLM? Fill in the blank:</p>

        <div class="quiz-box" id="intro-q1">
          <div class="quiz-title">&#x1F914; "The cat sat on the ___"</div>
          <div class="quiz-options">
            <div class="quiz-opt" onclick="checkQuiz('intro-q1',this,false)">&#x1F1E6; banana</div>
            <div class="quiz-opt" onclick="checkQuiz('intro-q1',this,true)">&#x1F1E7; mat</div>
            <div class="quiz-opt" onclick="checkQuiz('intro-q1',this,false)">&#x1F1E8; rocket</div>
          </div>
          <div class="quiz-feedback" id="intro-q1-fb"></div>
        </div>

        <div class="quiz-box" id="intro-q2">
          <div class="quiz-title">&#x1F914; "Once upon a ___"</div>
          <div class="quiz-options">
            <div class="quiz-opt" onclick="checkQuiz('intro-q2',this,false)">&#x1F1E6; potato</div>
            <div class="quiz-opt" onclick="checkQuiz('intro-q2',this,false)">&#x1F1E7; Tuesday</div>
            <div class="quiz-opt" onclick="checkQuiz('intro-q2',this,true)">&#x1F1E8; time</div>
          </div>
          <div class="quiz-feedback" id="intro-q2-fb"></div>
        </div>

        <div class="explain-box green" style="margin-top:16px;">
          <p>&#x1F3AF; <strong>You just did what an LLM does!</strong> You used your knowledge of language patterns to predict the next word. An LLM does the same thing — but with math!</p>
        </div>
      </div>

      <div class="section">
        <h3>&#x1F5FA; The 7 Steps We'll Build</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="explain-box" style="border-left-color:var(--yellow);">&#x1F4D6; 1. Training Data</div>
          <div class="explain-box" style="border-left-color:var(--accent);">&#x1F524; 2. Tokenizer</div>
          <div class="explain-box" style="border-left-color:var(--green);">&#x1F4CA; 3. Embeddings</div>
          <div class="explain-box" style="border-left-color:var(--red);">&#x1F440; 4. Self-Attention</div>
          <div class="explain-box" style="border-left-color:var(--purple);">&#x1F9E0; 5. Transformer</div>
          <div class="explain-box" style="border-left-color:var(--orange);">&#x1F3CB; 6. Training</div>
          <div class="explain-box green" style="grid-column:span 2;text-align:center;">&#x270D;&#xFE0F; 7. Generate Text!</div>
        </div>
        <p style="margin-top:12px;color:var(--dim);font-size:13px;">Click the step tabs above to begin! &#x2191;</p>
      </div>`;
    registerQuiz('intro-q1', 10);
    registerQuiz('intro-q2', 10);
  }
},

// ── STEP 1: TRAINING DATA ──
{
  filename: 'step1_data.py', filedesc: 'The text our model learns from',
  title: '&#x1F4D6; Step 1: Training Data',
  subtitle: 'The "recipe book" our model reads over and over',
  code: `# ============================================
# STEP 1: TRAINING DATA
# "The Recipe Book for Our Baby LLM"
# ============================================
#
# Training data = the TEXT the model learns from.
# Think of it like a recipe book:
#   - Read it over and over
#   - Learn the patterns
#   - Then cook (generate) something new!

def get_training_data():
    """
    Returns the text our model will learn from.
    In real LLMs, this would be terabytes of
    text from the internet!
    """

    text = """
    Once upon a time there was a little cat.
    The little cat loved to play in the garden.
    Every day the little cat would chase
    butterflies.
    The butterflies would fly high in the sky.
    The little cat would jump and jump.
    But the butterflies were too high.
    So the little cat would sit and watch.
    The garden was full of flowers and trees.
    The little cat loved the flowers.
    Every day was a happy day for the cat.
    """

    return text

# Let's explore our data!
text = get_training_data()

print(f"Characters: {len(text)}")
# Output: Characters: 1042

print(f"Words: {len(text.split())}")
# Output: Words: 186

unique = sorted(set(text))
print(f"Unique chars: {len(unique)}")
# Output: Unique chars: 34

# KEY INSIGHT:
# Our model will learn from just 1042 characters.
# GPT-4 learned from ~13 TRILLION tokens!
# But the CONCEPT is identical.`,
  game: function(container) {
    container.innerHTML = `
      <div class="section">
        <h3>&#x1F4D6; Understanding Training Data</h3>
        <div class="explain-box yellow">
          <p><strong>&#x1F373; Cooking Analogy:</strong> Training data is like a recipe book. If you give the model Italian recipes, it learns Italian cooking. If you give it cat stories, it learns to write about cats!</p>
        </div>
        <div class="explain-box">
          <p><strong>&#x1F4A1; Key Rule:</strong> "Garbage in, garbage out" — the quality of training data determines the quality of the model's output!</p>
        </div>
      </div>

      <div class="section">
        <h3><span class="badge badge-game">GAME</span> Data Detective &#x1F50D;</h3>
        <p>Look at our training text and answer these questions:</p>

        <div class="interactive-area">
          <h4>Our Training Story:</h4>
          <div class="output-box" style="font-size:13px;max-height:120px;overflow-y:auto;">Once upon a time there was a little cat.
The little cat loved to play in the garden.
Every day the little cat would chase butterflies.
The butterflies would fly high in the sky.
The little cat would jump and jump and jump.</div>
        </div>

        <div class="quiz-box" id="data-q1">
          <div class="quiz-title">&#x1F50D; What is the MOST repeated phrase in our story?</div>
          <div class="quiz-options">
            <div class="quiz-opt" onclick="checkQuiz('data-q1',this,false)">&#x1F1E6; "the garden"</div>
            <div class="quiz-opt" onclick="checkQuiz('data-q1',this,true)">&#x1F1E7; "the little cat"</div>
            <div class="quiz-opt" onclick="checkQuiz('data-q1',this,false)">&#x1F1E8; "butterflies"</div>
          </div>
          <div class="quiz-feedback" id="data-q1-fb"></div>
        </div>

        <div class="quiz-box" id="data-q2">
          <div class="quiz-title">&#x1F914; Why do we use a REPETITIVE story for our tiny model?</div>
          <div class="quiz-options">
            <div class="quiz-opt" onclick="checkQuiz('data-q2',this,false)">&#x1F1E6; Because we're lazy</div>
            <div class="quiz-opt" onclick="checkQuiz('data-q2',this,true)">&#x1F1E7; Small models need simple, repeated patterns to learn</div>
            <div class="quiz-opt" onclick="checkQuiz('data-q2',this,false)">&#x1F1E8; It doesn't matter what data we use</div>
          </div>
          <div class="quiz-feedback" id="data-q2-fb"></div>
        </div>

# STEP 2: TOKENIZER
# "Cutting Text Into Pieces"
# ============================================
#
# Computers don't understand letters!
# They only understand NUMBERS.
#
# A tokenizer does TWO things:
#   ENCODE: text -> numbers  "cat" -> [13,11,29]
#   DECODE: numbers -> text  [13,11,29] -> "cat"
#
# Types of tokenizers:
#   Character-level: each LETTER is a token
#   Word-level:      each WORD is a token
#   Subword (BPE):   chunks of letters (GPT uses this)
#
# We use CHARACTER-LEVEL (simplest!)

class BabyTokenizer:
    def __init__(self, text):
        # Find all unique characters
        self.chars = sorted(set(text))
        self.vocab_size = len(self.chars)

        # Create lookup tables
        # char -> number
        self.char_to_idx = {
            ch: i for i, ch in enumerate(self.chars)
        }
        # number -> char
        self.idx_to_char = {
            i: ch for i, ch in enumerate(self.chars)
        }

    def encode(self, text):
        """Text -> Numbers"""
        # "cat" -> [13, 11, 29]
        return [self.char_to_idx[ch]
                for ch in text]

    def decode(self, indices):
        """Numbers -> Text"""
        # [13, 11, 29] -> "cat"
        return "".join(
            [self.idx_to_char[i]
             for i in indices]
        )

# Example usage:
tokenizer = BabyTokenizer(text)
print(tokenizer.vocab_size)  # 34

encoded = tokenizer.encode("the cat")

# STEP 3: EMBEDDINGS
# "Giving Characters a Personality"
# ============================================
#
# Token ID "5" is just a label (like a name tag)
# Embedding [0.2, -0.5, 0.8, ...] is a
# PERSONALITY PROFILE with 64 numbers!
#
# Like RGB for colors:
#   "Red" = just a word
#   [255, 0, 0] = exact shade!

import torch
import torch.nn as nn

class BabyEmbedding(nn.Module):
    def __init__(self, vocab_size, n_embd, block_size):
        super().__init__()

        # TOKEN embedding: "What character am I?"
        # Shape: (vocab_size, n_embd)
        # e.g., (34, 64) = 34 chars, 64 nums each
        self.token_embedding = nn.Embedding(
            vocab_size, n_embd
        )

        # POSITION embedding: "Where am I?"
        # Shape: (block_size, n_embd)
        # e.g., (32, 64) = 32 positions, 64 nums
        self.position_embedding = nn.Embedding(
            block_size, n_embd
        )

    def forward(self, token_indices):
        B, T = token_indices.shape

        # Look up token embeddings
        tok_emb = self.token_embedding(token_indices)

        # Create position indices [0, 1, 2, ...]
        positions = torch.arange(T)

        # Look up position embeddings
        pos_emb = self.position_embedding(positions)

        # ADD them together!
        # "What I am" + "Where I am"
        x = tok_emb + pos_emb

        return x  # Shape: (B, T, n_embd)

# Each character is now a RICH vector of 64
# numbers instead of just a single ID!

        self.value = nn.Linear(n_embd, head_size,

        # Lower triangular matrix:

        #  [1, 1, 1, 0],

        # Attention + residual connection
        x = x + self.attention(self.ln1(x))
        # Feed-forward + residual connection
        x = x + self.feed_forward(self.ln2(x))
        return x

class BabyLLM(nn.Module):
    """The complete Baby LLM!"""
    def __init__(self, vocab_size, n_embd=64,
                 n_heads=4, n_layers=4,
                 block_size=32):
        super().__init__()
        self.embeddings = BabyEmbedding(...)
        self.blocks = nn.Sequential(*[
            TransformerBlock(...)
            for _ in range(n_layers)  # 4 blocks
        ])
        self.ln_final = nn.LayerNorm(n_embd)
        self.output_head = nn.Linear(
            n_embd, vocab_size  # 64 -> 34
        )

    def forward(self, idx, targets=None):
        x = self.embeddings(idx)    # (B,T,64)
        x = self.blocks(x)          # (B,T,64)
        x = self.ln_final(x)        # (B,T,64)
        logits = self.output_head(x) # (B,T,34)

        loss = None
        if targets is not None:
            loss = F.cross_entropy(
                logits.view(-1, vocab_size),
                targets.view(-1)

def get_batch(data, block_size, batch_size):
    """Get random chunks of text for training"""
    # Pick random starting positions
    max_start = len(data) - block_size - 1
    starts = torch.randint(0, max_start,
                           (batch_size,))

    # Input: characters [0..block_size-1]
    x = torch.stack(
        [data[s:s+block_size] for s in starts]
    )
    # Target: characters [1..block_size]
    # (shifted by 1 - predict NEXT char!)
    y = torch.stack(
        [data[s+1:s+block_size+1] for s in starts]
    )
    return x, y

# Create optimizer (the "coach")
# AdamW: smart coach that adapts learning speed
optimizer = torch.optim.AdamW(
    model.parameters(),

# STEP 7: TEXT GENERATION
# "The Model Writes Its Own Story!"
# ============================================
#
# Generate one character at a time:
#   1. Start with some text (prompt)
#   2. Model predicts next character
#   3. Add it to the text
#   4. Repeat!
#
# This is "AUTOREGRESSIVE" generation.

@torch.no_grad()  # No gradients needed!
def generate(model, tokenizer,
             start_text="The ",
             max_new_chars=200,
             temperature=0.8,
             top_k=None):

    model.eval()  # Evaluation mode

    # Encode starting text
    tokens = tokenizer.encode(start_text)
    tokens = torch.tensor([tokens])

    for _ in range(max_new_chars):
        # Crop to last block_size chars
        context = tokens[:, -model.block_size:]

        # Get predictions
        logits, _ = model(context)

        # Only care about LAST position
        logits = logits[:, -1, :]

        # Apply temperature
        # Low  (0.3) = safe, predictable
        # Med  (0.8) = balanced
        # High (1.5) = creative, wild
        logits = logits / temperature

        # Apply top-k (optional)
        if top_k is not None:
            top_vals, _ = torch.topk(logits, top_k)
            logits[logits < top_vals[:, [-1]]] = \\
                float("-inf")

        # Softmax -> probabilities
        probs = F.softmax(logits, dim=-1)

        # Sample next character
        next_token = torch.multinomial(
            probs, num_samples=1
        )

        # Append to sequence
        tokens = torch.cat(
            [tokens, next_token], dim=1
        )

    return tokenizer.decode(tokens[0].tolist())

// ═══════════════════════════════════════════════════════════
// CODE RENDERER with syntax highlighting
// ═══════════════════════════════════════════════════════════
function renderCode(code) {
  const container = document.getElementById('codeContent');
  const lines = code.split('\n');
  container.innerHTML = '';

  lines.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'code-line';
    const highlighted = highlightSyntax(escapeHtml(line));
    div.innerHTML = `<span class="line-num">${i + 1}</span><span class="line-text">${highlighted}</span>`;
    container.appendChild(div);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightSyntax(line) {
  // Comments
  if (line.trimStart().startsWith('#')) return `<span class="cm">${line}</span>`;

  // Strings
  line = line.replace(/(""".*?"""|".*?"|'.*?'|f".*?")/g, '<span class="str">$1</span>');

  // Keywords
  const kws = ['def','class','return','for','in','if','import','from','self','None','True','False','super','not','and','or','range','print','with','as','else','elif','while','break','continue','lambda','yield','try','except','finally','raise','pass'];
  kws.forEach(kw => {
    const re = new RegExp('\\b(' + kw + ')\\b', 'g');
    line = line.replace(re, '<span class="kw">$1</span>');
  });

  // Numbers
  line = line.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');

  // Decorators
  line = line.replace(/(@\w+)/g, '<span class="dec">$1</span>');

  return line;
}

  const box = document.getElementById(quizId);
  if (box.classList.contains('correct') || box.classList.contains('wrong')) return;

  const fb = document.getElementById(quizId + '-fb');
  const opts = box.querySelectorAll('.quiz-opt');

  if (isCorrect) {
    el.classList.add('selected-correct');
    box.classList.add('correct');
    fb.className = 'quiz-feedback show correct';
    fb.textContent = '✅ Correct! +10 points';
    addScore(quizId, 10);
  } else {
    el.classList.add('selected-wrong');
    box.classList.add('wrong');
    fb.className = 'quiz-feedback show wrong';
    fb.textContent = '❌ Not quite! The correct answer is highlighted.';
  }

  opts.forEach(o => {
    o.classList.add('disabled');
    if (o !== el && o.onclick) {
      // Find the correct one
      const onclickStr = o.getAttribute('onclick');
      if (onclickStr && onclickStr.includes('true')) {
        o.classList.add('show-correct');
      }
    }
  });
}

const VOCAB = {'\n':0,' ':1,'.':2,'A':3,'B':4,'E':5,'H':6,'O':7,'S':8,'T':9,'W':10,'a':11,'b':12,'c':13,'d':14,'e':15,'f':16,'g':17,'h':18,'i':19,'j':20,'k':21,'l':22,'m':23,'n':24,'o':25,'p':26,'r':27,'s':28,'t':29,'u':30,'v':31,'w':32,'y':33};

const TOKEN_COLORS = ['#e94560','#ff6b6b','#ffd166','#48cae4','#06d6a0','#a855f7','#f97316','#ec4899'];

    const box = document.createElement('div');
    box.className = 'char-box';

    if (id !== undefined) {
      ids.push(id);
      box.style.cssText = `background:${color}15;border:2px solid ${color};`;
      box.innerHTML = `<span class="ch" style="color:${color};">${ch === ' ' ? '&#x2423;' : escapeHtml(ch)}</span><span class="id" style="color:${color};">${id}</span>`;
    } else {
      valid = false;
      box.style.cssText = 'background:rgba(233,69,96,0.1);border:2px solid var(--red);';
      box.innerHTML = `<span class="ch" style="color:var(--red);">${escapeHtml(ch)}</span><span class="id" style="color:var(--red);">?</span>`;
    }
    result.appendChild(box);
  });

  encoded.style.display = 'block';
  if (valid) {
    encoded.innerHTML = `<span style="color:var(--dim);">Encoded:</span> <span style="color:var(--yellow);">[${ids.join(', ')}]</span>`;
  } else {
    encoded.innerHTML = `<span style="color:var(--red);">&#x26A0; Some characters not in our vocabulary! Our model only knows 34 characters from the training text.</span>`;
  }
}

function checkDecode() {
  const input = document.getElementById('decodeInput').value.toLowerCase();
  const fb = document.getElementById('decodeFeedback');
  if (input === 'hello') {
    fb.innerHTML = '&#x2705; Correct! [18,15,22,22,25] = h,e,l,l,o = "hello"! +15 points';
    fb.style.color = 'var(--green)';
    addScore('tok-decode', 15);
  } else if (input.length >= 3) {
    fb.innerHTML = '&#x1F914; Not quite... Hint: 18=h, 15=e, 22=l, 25=o';
    fb.style.color = 'var(--yellow)';
  } else {
    fb.innerHTML = '';
  }
}

// ═══════════════════════════════════════════════════════════
// EMBEDDING VIZ (Step 3)
// ═══════════════════════════════════════════════════════════
function updateEmbedViz() {
  const sliders = document.querySelectorAll('.slider-row input[type=range]');
  if (sliders.length < 4) return;

  const vals = [];
  sliders.forEach((s, i) => {
    const v = (parseInt(s.value) / 100).toFixed(2);
    vals.push(parseFloat(v));
    const label = document.getElementById('emb-d' + (i + 1));
    if (label) label.textContent = v;
  });

  const result = document.getElementById('embVizResult');
  if (!result) return;

  const magnitude = Math.sqrt(vals.reduce((a, v) => a + v * v, 0)).toFixed(2);
  const hue = Math.abs(Math.round((vals[0] + 1) * 180));
  const sat = Math.abs(Math.round((vals[1] + 1) * 50));
  const light = Math.round(40 + (vals[2] + 1) * 20);

  result.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;">
      <div style="width:50px;height:50px;border-radius:12px;background:hsl(${hue},${sat}%,${light}%);"></div>
      <div style="text-align:left;">
        <div style="font-family:'Fira Code',monospace;color:var(--accent);">[${vals.join(', ')}]</div>
        <div style="font-size:12px;color:var(--dim);">Magnitude: ${magnitude}</div>
        <div style="font-size:12px;color:var(--dim);">This is the "personality" of character "a"!</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// MASK GAME (Step 4)
// ═══════════════════════════════════════════════════════════
let maskState = [];
const MASK_SIZE = 5;
const MASK_LABELS = ['t','h','e',' ','c'];

function initMaskGame() {
  const grid = document.getElementById('maskGame');
  if (!grid) return;
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${MASK_SIZE + 1}, 42px)`;
  maskState = Array.from({length: MASK_SIZE}, () => Array(MASK_SIZE).fill(0));

  // Corner
  const corner = document.createElement('div');
  corner.className = 'attn-game-cell header';
  grid.appendChild(corner);

  // Column headers
  MASK_LABELS.forEach(l => {
    const h = document.createElement('div');
    h.className = 'attn-game-cell header';
    h.textContent = l;
    grid.appendChild(h);
  });

  // Rows
  for (let i = 0; i < MASK_SIZE; i++) {
    const rh = document.createElement('div');
    rh.className = 'attn-game-cell header';
    rh.textContent = MASK_LABELS[i];
    grid.appendChild(rh);

    for (let j = 0; j < MASK_SIZE; j++) {
      const cell = document.createElement('div');
      cell.className = 'attn-game-cell clickable';
      cell.dataset.row = i;
      cell.dataset.col = j;
      cell.textContent = '?';
      cell.onclick = function() {
        const r = parseInt(this.dataset.row);
        const c = parseInt(this.dataset.col);
        maskState[r][c] = maskState[r][c] === 0 ? 1 : (maskState[r][c] === 1 ? -1 : 0);
        if (maskState[r][c] === 1) {
          this.className = 'attn-game-cell clickable marked-yes';
          this.textContent = '✓';
        } else if (maskState[r][c] === -1) {
          this.className = 'attn-game-cell clickable marked-no';
          this.textContent = '✗';
        } else {
          this.className = 'attn-game-cell clickable';
          this.textContent = '?';
        }
      };
      grid.appendChild(cell);
    }
  }
}

function checkMaskGame() {
  let correct = 0;
  const total = MASK_SIZE * MASK_SIZE;
  const grid = document.getElementById('maskGame');
  const cells = grid.querySelectorAll('.clickable');

  cells.forEach(cell => {
    const r = parseInt(cell.dataset.row);
    const c = parseInt(cell.dataset.col);
    const shouldBe = c <= r; // lower triangular
    const userSays = maskState[r][c] === 1;
    const userBlocked = maskState[r][c] === -1;

    if ((shouldBe && userSays) || (!shouldBe && userBlocked)) {
      correct++;
      cell.classList.add('revealed-correct');
    } else {
      cell.classList.add('revealed-wrong');
      cell.textContent = shouldBe ? '✓' : '✗';
    }
    cell.onclick = null;
  });

  const fb = document.getElementById('maskFeedback');
  if (correct === total) {
    fb.innerHTML = '&#x2705; Perfect! You built the causal mask correctly! +20 points';
    fb.style.color = 'var(--green)';
    addScore('mask-game', 20);
  } else {
    fb.innerHTML = `Got ${correct}/${total}. The lower triangle should be ✓ (can see), upper triangle ✗ (blocked).`;
    fb.style.color = 'var(--yellow)';
  }
}

function resetMaskGame() {
  document.getElementById('maskFeedback').innerHTML = '';
  initMaskGame();
}

// ═══════════════════════════════════════════════════════════
// PIPELINE GAME (Step 5)
// ═══════════════════════════════════════════════════════════
const PIPELINE_CORRECT = [
  {label: '&#x1F524; Token + Position Embeddings', id: 'emb'},
  {label: '&#x1F440; Self-Attention (Multi-Head)', id: 'attn'},
  {label: '&#x2795; Residual Connection + LayerNorm', id: 'res1'},
  {label: '&#x1F9E0; Feed-Forward Network', id: 'ff'},
  {label: '&#x2795; Residual Connection + LayerNorm', id: 'res2'},
  {label: '&#x1F504; Repeat x4 (Transformer Blocks)', id: 'repeat'},
  {label: '&#x1F3AF; Output Head (predict next char)', id: 'out'},
];
let pipelineOrder = [];

function initPipelineGame() {
  const opts = document.getElementById('pipelineOptions');
  const result = document.getElementById('pipelineResult');
  if (!opts) return;
  opts.innerHTML = '';
  result.innerHTML = '<div style="color:var(--dim);font-size:13px;text-align:center;padding:20px;">Click components above to add them here...</div>';
  pipelineOrder = [];

  const shuffled = [...PIPELINE_CORRECT].sort(() => Math.random() - 0.5);
  shuffled.forEach((item, i) => {
    const btn = document.createElement('div');
    btn.className = 'drag-item';
    btn.style.cssText = `background:var(--bg4);color:var(--text);border:2px solid var(--bg4);`;
    btn.innerHTML = item.label;
    btn.dataset.id = item.id;
    btn.onclick = function() {
      if (this.classList.contains('used')) return;
      this.classList.add('used');
      this.style.opacity = '0.3';
      pipelineOrder.push(item.id);

      const entry = document.createElement('div');
      entry.style.cssText = 'padding:8px 14px;background:var(--bg4);border-radius:8px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;';
      entry.innerHTML = `<span style="color:var(--accent);font-weight:800;">${pipelineOrder.length}.</span> ${item.label}`;
      if (result.querySelector('div[style*="text-align:center"]')) result.innerHTML = '';
      result.appendChild(entry);
    };
    opts.appendChild(btn);
  });
}

function checkPipeline() {
  const fb = document.getElementById('pipelineFeedback');
  if (pipelineOrder.length < PIPELINE_CORRECT.length) {
    fb.innerHTML = '&#x26A0; Place all components first!';
    fb.style.color = 'var(--yellow)';
    return;
  }

  let correct = 0;
  const entries = document.getElementById('pipelineResult').children;
  for (let i = 0; i < PIPELINE_CORRECT.length; i++) {
    if (pipelineOrder[i] === PIPELINE_CORRECT[i].id) {
      correct++;
      entries[i].style.borderLeft = '3px solid var(--green)';
    } else {
      entries[i].style.borderLeft = '3px solid var(--red)';
    }
  }

  if (correct === PIPELINE_CORRECT.length) {
    fb.innerHTML = '&#x2705; Perfect order! You understand the Transformer pipeline! +20 points';
    fb.style.color = 'var(--green)';
    addScore('pipeline-game', 20);
  } else {
    fb.innerHTML = `${correct}/${PIPELINE_CORRECT.length} correct. The correct order starts with Embeddings, then Attention, Residual, Feed-Forward...`;
    fb.style.color = 'var(--yellow)';
  }
}

function resetPipeline() {
  document.getElementById('pipelineFeedback').innerHTML = '';
  initPipelineGame();
}

// ═══════════════════════════════════════════════════════════
// TRAINING GAME (Step 6)
// ═══════════════════════════════════════════════════════════
let trainStep = 0;
let trainLoss = 3.65;
let trainHistory = [];
let trainAutoInterval = null;

function resetTraining() {
  trainStep = 0;
  trainLoss = 3.65;
  trainHistory = [3.65];
  if (trainAutoInterval) { clearInterval(trainAutoInterval); trainAutoInterval = null; }
  updateTrainUI();
  renderTrainViz();
}

function doTrainStep() {
  if (trainStep >= 2000) return;
  trainStep += 10;
  // Simulate loss curve: exponential decay with noise
  const progress = trainStep / 2000;
  trainLoss = 3.65 * Math.exp(-4.5 * progress) + 0.15 + (Math.random() - 0.5) * 0.05 * (1 - progress);
  trainLoss = Math.max(0.12, trainLoss);
  trainHistory.push(trainLoss);
  updateTrainUI();
  renderTrainViz();
}

function autoTrain() {
  if (trainAutoInterval) { clearInterval(trainAutoInterval); trainAutoInterval = null; return; }
  let count = 0;
  trainAutoInterval = setInterval(() => {
    doTrainStep();
    count++;
    if (count >= 50 || trainStep >= 2000) {
      clearInterval(trainAutoInterval);
      trainAutoInterval = null;
    }
  }, 80);
}

function updateTrainUI() {
  document.getElementById('trainStepNum').textContent = trainStep;
  const pct = Math.min(91, (trainLoss / 4) * 100);
  const bar = document.getElementById('trainLossBar');
  bar.style.width = pct + '%';
  bar.textContent = trainLoss.toFixed(2);

  // Color gradient based on loss
  const r = Math.round(233 * (trainLoss / 3.65));
  const g = Math.round(214 * (1 - trainLoss / 3.65));
  bar.style.background = `linear-gradient(90deg, rgb(${r},${Math.round(g*0.5)},50), rgb(${r},${g},80))`;

  document.getElementById('trainLossVal').textContent = trainLoss.toFixed(2);

  const msg = document.getElementById('trainMessage');
  if (trainStep === 0) msg.innerHTML = '&#x1F449; Click "Train Step" to begin!';
  else if (trainLoss > 2.5) msg.innerHTML = '&#x1F914; Model is still guessing randomly...';
  else if (trainLoss > 1.5) msg.innerHTML = '&#x1F4C8; Starting to learn some patterns!';
  else if (trainLoss > 0.5) msg.innerHTML = '&#x1F525; Getting much better! Patterns emerging!';
  else if (trainLoss > 0.25) msg.innerHTML = '&#x1F31F; Almost there! Loss is very low!';
  else msg.innerHTML = '&#x1F389; Excellent! Model has learned the patterns! Loss: ' + trainLoss.toFixed(2);
}

function renderTrainViz() {
  const viz = document.getElementById('trainViz');
  if (!viz) return;
  viz.innerHTML = '';
  const maxBars = 80;
  const data = trainHistory.slice(-maxBars);
  data.forEach((loss, i) => {
    const bar = document.createElement('div');
    bar.className = 'train-bar';
    const h = Math.max(4, (loss / 4) * 110);
    bar.style.height = h + 'px';
    const ratio = loss / 3.65;
    const r = Math.round(233 * ratio);
    const g = Math.round(214 * (1 - ratio));
    bar.style.background = `rgb(${r},${g},80)`;
    viz.appendChild(bar);
  });
}

// ═══════════════════════════════════════════════════════════
// GENERATION GAME (Step 7)
// ═══════════════════════════════════════════════════════════
const GEN_SEQUENCE = [
  {context: 'The little ', choices: ['c','d','b','w'], correct: 'c', explain: 'In our story, "The little c" starts "The little cat" — the most common phrase!'},
  {context: 'The little c', choices: ['a','o','e','u'], correct: 'a', explain: '"ca" is the start of "cat" — the model learned this pattern!'},
  {context: 'The little ca', choices: ['t','r','n','s'], correct: 't', explain: '"cat" is complete! The model knows "ca" is followed by "t".'},
  {context: 'The little cat ', choices: ['w','l','s','i'], correct: 'w', explain: '"The little cat w..." — "would" is the most common next word in our story!'},
  {context: 'The little cat w', choices: ['o','a','e','i'], correct: 'o', explain: '"wo" starts "would" — the model learned this from many repetitions!'},
];
let genGameIdx = 0;
let genGameCorrect = 0;

function initGenGame() {
  genGameIdx = 0;
  genGameCorrect = 0;
  showGenGameStep();
}

function showGenGameStep() {
  if (genGameIdx >= GEN_SEQUENCE.length) {
    const fb = document.getElementById('genGameFeedback');
    fb.innerHTML = `&#x1F389; Done! You predicted ${genGameCorrect}/${GEN_SEQUENCE.length} correctly!`;
    fb.style.color = 'var(--green)';
    if (genGameCorrect >= 3) addScore('gen-predict', 20);
    document.getElementById('genGameOptions').innerHTML = '';
    document.getElementById('genGameScore').textContent = `Score: ${genGameCorrect}/${GEN_SEQUENCE.length}`;
    return;
  }

  const step = GEN_SEQUENCE[genGameIdx];
  const display = document.getElementById('genGameDisplay');
  display.innerHTML = `<span style="color:var(--green);">${escapeHtml(step.context)}</span><span class="gen-cursor"></span>`;

  const opts = document.getElementById('genGameOptions');
  opts.innerHTML = '';
  step.choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.style.cssText = 'background:var(--bg4);color:var(--text);min-width:50px;font-family:"Fira Code",monospace;font-size:18px;';
    btn.textContent = ch === ' ' ? '␣' : ch;
    btn.onclick = function() {
      const isCorrect = ch === step.correct;
      if (isCorrect) {
        genGameCorrect++;
        btn.style.background = 'rgba(6,214,160,0.2)';
        btn.style.color = 'var(--green)';
      } else {
        btn.style.background = 'rgba(233,69,96,0.2)';
        btn.style.color = 'var(--red)';
      }
      document.getElementById('genGameFeedback').innerHTML = (isCorrect ? '&#x2705; ' : '&#x274C; ') + step.explain;
      document.getElementById('genGameFeedback').style.color = isCorrect ? 'var(--green)' : 'var(--yellow)';
      opts.querySelectorAll('button').forEach(b => b.disabled = true);

      setTimeout(() => {
        genGameIdx++;
        document.getElementById('genGameFeedback').innerHTML = '';
        showGenGameStep();
      }, 2000);
    };
    opts.appendChild(btn);
  });

  document.getElementById('genGameScore').textContent = `Progress: ${genGameIdx + 1}/${GEN_SEQUENCE.length} | Correct: ${genGameCorrect}`;
}

// ═══════════════════════════════════════════════════════════
// TEMPERATURE DEMO (Step 7)
// ═══════════════════════════════════════════════════════════
function updateTempDemo() {
  const slider = document.getElementById('tempSlider');
  if (!slider) return;
  const temp = parseInt(slider.value) / 10;
  document.getElementById('tempVal').textContent = temp.toFixed(1);

  // Simulate logits for next char after "The little ca"
  const rawLogits = {t: 4.5, s: 1.2, n: 0.8, r: 0.5, b: 0.2};
  const chars = Object.keys(rawLogits);
  const logits = chars.map(c => rawLogits[c] / temp);

  // Softmax
  const maxL = Math.max(...logits);
  const exps = logits.map(l => Math.exp(l - maxL));
  const sumExp = exps.reduce((a, b) => a + b, 0);
  const probs = exps.map(e => e / sumExp);

  const container = document.getElementById('tempProbBars');
  if (!container) return;
  container.innerHTML = '';

  const colors = ['var(--green)', 'var(--accent)', 'var(--yellow)', 'var(--orange)', 'var(--red)'];
  chars.forEach((ch, i) => {
    const pct = (probs[i] * 100).toFixed(1);
    container.innerHTML += `
      <div class="prob-bar-row">
        <span class="char-label" style="color:${colors[i]};">"${ch}"</span>
        <div class="prob-bar-track">
          <div class="prob-bar-fill" style="width:${pct}%;background:${colors[i]};"></div>
        </div>
        <span class="pct">${pct}%</span>
      </div>`;
  });

  const explain = document.getElementById('tempExplain');
  if (!explain) return;
  if (temp <= 0.3) {
    explain.innerHTML = '&#x1F9CA; <strong>Very cold:</strong> Almost always picks "t" (the most likely). Output is predictable and repetitive.';
  } else if (temp <= 0.8) {
    explain.innerHTML = '&#x2600;&#xFE0F; <strong>Balanced:</strong> Usually picks "t" but sometimes tries other characters. Natural-sounding output.';
  } else if (temp <= 1.2) {
    explain.innerHTML = '&#x1F321; <strong>Warm:</strong> More variety in choices. Output gets more creative but still mostly coherent.';
  } else {
    explain.innerHTML = '&#x1F525; <strong>Hot:</strong> All characters become nearly equally likely. Output gets wild and often nonsensical!';
  }
}
