function softmax(a,t){const s=a.map(x=>x/(t||1));const m=Math.max(...s);const e=s.map(x=>Math.exp(x-m));const sm=e.reduce((a,b)=>a+b,0);return e.map(x=>x/sm);}

{fn:'step1_vectors.py',fd:'Phase 1 — Words as Numbers',t:'<span class="lb lb1">P1</span> Step 1: Vectors & Embeddings',su:'Every word in our story generator is a vector. Similar words (cat/dog) have similar vectors. This is how the model understands meaning.',
code:`# ============================================
# STEP 1: VECTORS & EMBEDDINGS
# ============================================
# Our story generator needs to understand words.
# But computers only understand numbers!
# Solution: represent each word as a VECTOR.

import numpy as np

# A vector = list of numbers
cat = np.array([0.9, 0.1, 0.8, 0.2])  # furry, small
dog = np.array([0.8, 0.2, 0.7, 0.3])  # furry, medium
car = np.array([0.1, 0.9, 0.1, 0.8])  # not furry, big

# DOT PRODUCT = similarity measure
# Multiply pairs, then sum
def dot_product(a, b):
    return sum(x*y for x,y in zip(a, b))

# cat·dog = 0.9*0.8 + 0.1*0.2 + 0.8*0.7 + 0.2*0.3
#         = 0.72 + 0.02 + 0.56 + 0.06 = 1.36 (similar!)
# cat·car = 0.09 + 0.09 + 0.08 + 0.16 = 0.42 (different!)

# COSINE SIMILARITY: -1 to +1, ignores magnitude
import math
def cosine_sim(a, b):
    dot = sum(x*y for x,y in zip(a, b))
    mag_a = math.sqrt(sum(x**2 for x in a))
    mag_b = math.sqrt(sum(x**2 for x in b))
    return dot / (mag_a * mag_b)

# EMBEDDING TABLE: maps token IDs to vectors
# In GPT-2: 50257 tokens × 768 dimensions = 38.6M params!
class Embedding:
    def __init__(self, vocab_size, embed_dim):
        self.table = np.random.randn(vocab_size, embed_dim) * 0.02
    
    def lookup(self, token_id):
        return self.table[token_id]  # shape: (embed_dim,)

# For our story generator:
embed = Embedding(vocab_size=1000, embed_dim=64)
# "once" → embed.lookup(42) → [0.01, -0.03, 0.05, ...]`,

{fn:'step3_gradients.py',fd:'Phase 1 — How the Model Learns',t:'<span class="lb lb1">P1</span> Step 3: Derivatives & Gradients',su:'The derivative tells our model "which direction to adjust each weight to reduce error." Gradient descent = rolling a ball downhill.',
code:`# ============================================
# STEP 3: DERIVATIVES & GRADIENTS
# ============================================
# Our story generator learns by adjusting weights.
# But HOW MUCH to adjust? Derivatives tell us!
#
# f(x) = x²  →  f'(x) = 2x  (power rule)
# At x=3: slope = 6 (steep uphill)
# At x=0: slope = 0 (flat = minimum!)

# GRADIENT DESCENT:
# weight = weight - learning_rate * gradient
# If gradient > 0: weight too high → decrease
# If gradient < 0: weight too low → increase

def gradient_descent(start, lr=0.1, steps=20):
    x = start
    for _ in range(steps):
        grad = 2 * x           # derivative of x²
        x = x - lr * grad      # step downhill
    return x  # converges to 0 (minimum)

# CHAIN RULE (= backpropagation!):
# y = f(g(x)) → dy/dx = f'(g(x)) × g'(x)
# This is how gradients flow through layers!

# PARTIAL DERIVATIVES:
# f(x,y) = x² + y²
# ∂f/∂x = 2x, ∂f/∂y = 2y
# In our model: compute ∂loss/∂weight for EVERY weight`,

{fn:'step4_probability.py',fd:'Phase 1 — How the Model Predicts',t:'<span class="lb lb1">P1</span> Step 4: Probability & Softmax',su:'Our story generator outputs probabilities for every possible next word. Softmax converts raw scores to probabilities. Temperature controls creativity.',
code:`# ============================================
# STEP 4: PROBABILITY & SOFTMAX
# ============================================
# Our model outputs raw scores (logits) for each word.
# Softmax converts them to probabilities (sum to 1).
#
# "The cat sat on the ___"
#   mat: 0.35, floor: 0.20, bed: 0.15, roof: 0.10

import numpy as np

def softmax(logits, temperature=1.0):
    scaled = logits / temperature
    shifted = scaled - np.max(scaled)  # numerical stability!
    exp_vals = np.exp(shifted)
    return exp_vals / exp_vals.sum()

# TEMPERATURE controls creativity:
# temp=0.1: [0.99, 0.01, 0.00] (greedy/deterministic)
# temp=1.0: [0.48, 0.18, 0.11] (balanced)
# temp=2.0: [0.32, 0.24, 0.21] (creative/random)

# CROSS-ENTROPY LOSS = -log(p_correct)
# p=0.9 → loss=0.105 (good!)
# p=0.01 → loss=4.605 (terrible!)
# Model trains to MINIMIZE this loss.

# SAMPLING STRATEGIES:
# Greedy: always pick highest prob
# Top-k: only consider top k tokens
# Top-p: only consider tokens summing to p%`,

{fn:'step5_neurons.py',fd:'Phase 2 — Building Blocks',t:'<span class="lb lb2">P2</span> Step 5: Neurons & Activations',su:'A neuron: output = activation(weights·input + bias). Activations add non-linearity. Without them, 100 layers = 1 layer. ReLU → GELU → SwiGLU evolution.',
code:`# ============================================
# STEP 5: NEURONS & ACTIVATIONS
# ============================================
# neuron: output = activation(w·x + b)
# layer: many neurons in parallel (= matrix multiply)
# network: layers stacked together

import numpy as np

# ACTIVATION FUNCTIONS — add non-linearity!
def relu(x):     return np.maximum(0, x)        # simple, fast
def sigmoid(x):  return 1/(1+np.exp(-x))        # squash to (0,1)
def gelu(x):     # used in GPT, BERT
    return 0.5*x*(1+np.tanh(np.sqrt(2/np.pi)*(x+0.044715*x**3)))
def swiglu(x, gate):  # used in LLaMA, PaLM
    return x * sigmoid(gate) * gate

# WHY ACTIVATIONS?
# Without them: Linear(Linear(x)) = still Linear!
# 100 layers = 1 layer. Useless!
# Activations let networks learn CURVES.

# EVOLUTION:
# ReLU (2012): max(0,x). Simple. "Dead neuron" problem.
# GELU (2016): smooth ReLU. Used in GPT-2/3/4, BERT.
# SwiGLU (2020): gated. Used in LLaMA, PaLM, Mistral.

# LOSS FUNCTIONS:
# MSE: for regression. mean((pred - target)²)
# Cross-Entropy: for classification/LLMs. -log(p_correct)

# LAYER = matrix multiply + activation
class Layer:
    def __init__(self, in_dim, out_dim):
        self.W = np.random.randn(in_dim, out_dim) * np.sqrt(2/in_dim)
        self.b = np.zeros(out_dim)
    def forward(self, x):
        return gelu(x @ self.W + self.b)`,

{fn:'step6_attention.py',fd:'Phase 2 — The Key Innovation',t:'<span class="lb lb2">P2</span> Step 6: Attention Mechanism',su:'THE breakthrough. Each word looks at every other word and decides what\'s relevant. Q=query, K=key, V=value. Scaled dot-product + causal mask + multi-head.',
code:`# ============================================
# STEP 6: ATTENTION MECHANISM
# ============================================
# "Attention Is All You Need" (2017)
# For each token, compute how much to attend
# to every other token.
#
# Q (Query): "What am I looking for?"
# K (Key):   "What do I contain?"
# V (Value): "What info do I provide?"
#
# Analogy: Library search
#   Q = your search query
#   K = book titles
#   V = book contents
#   Score = how well query matches each title
#   Output = weighted sum of matching books

import torch, math
import torch.nn as nn

class Attention(nn.Module):
    def __init__(self, embed_dim, head_dim):
        super().__init__()
        self.W_q = nn.Linear(embed_dim, head_dim, bias=False)
        self.W_k = nn.Linear(embed_dim, head_dim, bias=False)
        self.W_v = nn.Linear(embed_dim, head_dim, bias=False)
        self.scale = math.sqrt(head_dim)

    def forward(self, x):
        Q = self.W_q(x)  # (B, S, head_dim)
        K = self.W_k(x)
        V = self.W_v(x)

        # Step 1: Scores = Q @ K^T / sqrt(d)
        scores = Q @ K.transpose(-2,-1) / self.scale

        # Step 2: Causal mask (can't see future!)
        S = x.shape[1]
        mask = torch.triu(torch.ones(S,S), 1).bool()
        scores.masked_fill_(mask, float('-inf'))

        # Step 3: Softmax → attention weights
        weights = torch.softmax(scores, dim=-1)

        # Step 4: Weighted sum of values
        return weights @ V

# MULTI-HEAD: 12 heads in parallel, each 64-dim
# Head 1: subject-verb patterns
# Head 2: adjective-noun patterns
# Head 3: long-range dependencies
# Concat all heads → project back to embed_dim`,

{fn:'step7_block.py',fd:'Phase 2 — The Processing Unit',t:'<span class="lb lb2">P2</span> Step 7: Transformer Block',su:'LayerNorm → Attention → Residual → LayerNorm → FFN → Residual. Stack N of these = a Transformer. GPT-2 has 12, GPT-3 has 96.',
code:`# ============================================
# STEP 7: TRANSFORMER BLOCK
# ============================================
# One block = one "floor" of the factory.
# Stack N blocks = the complete Transformer.

class TransformerBlock(nn.Module):
    def __init__(self, embed_dim, n_heads, ff_dim, dropout=0.1):
        super().__init__()
        self.ln1 = nn.LayerNorm(embed_dim)
        self.attn = MultiHeadAttention(embed_dim, n_heads)
        self.ln2 = nn.LayerNorm(embed_dim)
        self.ffn = nn.Sequential(
            nn.Linear(embed_dim, ff_dim),   # expand
            nn.GELU(),                       # activate
            nn.Linear(ff_dim, embed_dim),   # compress
            nn.Dropout(dropout)
        )

    def forward(self, x):
        # Pre-norm + residual connection
        x = x + self.attn(self.ln1(x))  # communicate
        x = x + self.ffn(self.ln2(x))   # compute
        return x

# LAYER NORM: normalize to mean=0, std=1
# Prevents values from exploding/vanishing.
# Has learned scale (gamma) and shift (beta).

# RESIDUAL CONNECTION: output = f(x) + x
# The "+x" creates a gradient highway.
# d(f(x)+x)/dx = f'(x) + 1
# The "1" means gradients always flow through!

# FFN: expand → activate → compress
# 768 → 3072 → 768 (4x expansion)
# Attention = tokens talk to each other
# FFN = each token thinks independently`,

{fn:'step8_model.py',fd:'Phase 2 — The Complete Model',t:'<span class="lb lb2">P2</span> Step 8: Full Architecture',su:'Token embed + Position embed → N × TransformerBlock → LayerNorm → Linear → logits. This IS a mini-GPT. Our story generator is complete!',
code:`# ============================================
# STEP 8: FULL MODEL — Our Story Generator!
# ============================================
class StoryGenerator(nn.Module):
    def __init__(self, vocab_size, embed_dim, n_heads,
                 n_layers, max_seq, ff_dim):
        super().__init__()
        self.tok_emb = nn.Embedding(vocab_size, embed_dim)
        self.pos_emb = nn.Embedding(max_seq, embed_dim)
        self.blocks = nn.ModuleList([
            TransformerBlock(embed_dim, n_heads, ff_dim)
            for _ in range(n_layers)
        ])
        self.ln_f = nn.LayerNorm(embed_dim)
        self.head = nn.Linear(embed_dim, vocab_size, bias=False)

    def forward(self, idx):
        B, S = idx.shape
        tok = self.tok_emb(idx)
        pos = self.pos_emb(torch.arange(S, device=idx.device))
        x = tok + pos
        for block in self.blocks:
            x = block(x)
        x = self.ln_f(x)
        return self.head(x)  # (B, S, vocab_size)

{fn:'step9_tokenizer.py',fd:'Phase 3 — Text to Numbers',t:'<span class="lb lb3">P3</span> Step 9: Tokenization',su:'Character-level (simple, tiny vocab) → Word-level (short sequences, huge vocab) → BPE (sweet spot, handles any word). GPT uses BPE with ~50K tokens.',
code:`# ============================================
# STEP 9: TOKENIZATION
# ============================================
# Three approaches:
# Character: "cat" → ['c','a','t'] → [3,1,20]
#   Vocab: ~100. Pro: tiny. Con: long sequences.
# Word: "the cat" → ['the','cat'] → [1,42]
#   Vocab: ~100K. Pro: short. Con: can't handle new words.
# BPE: "unhappy" → ['un','happy'] → [348,2569]
#   Vocab: ~50K. Pro: handles anything. Con: slightly longer.

# BPE ALGORITHM:
# 1. Start with individual characters
# 2. Find most frequent adjacent pair
# 3. Merge into new token
# 4. Repeat until vocab_size reached
#
# "the cat the car"
# Step 0: [t,h,e, ,c,a,t, ,t,h,e, ,c,a,r]
# Merge (t,h)→th: [th,e, ,c,a,t, ,th,e, ,c,a,r]
# Merge (th,e)→the: [the, ,c,a,t, ,the, ,c,a,r]
# Merge (c,a)→ca: [the, ,ca,t, ,the, ,ca,r]

class BPETokenizer:
    def __init__(self):
        self.merges = {}
        self.vocab = {}

    def train(self, text, num_merges):
        tokens = list(text)
        for i in range(num_merges):
            pairs = {}
            for j in range(len(tokens)-1):
                pair = (tokens[j], tokens[j+1])
                pairs[pair] = pairs.get(pair, 0) + 1
            if not pairs: break
            best = max(pairs, key=pairs.get)
            new_token = best[0] + best[1]
            self.merges[best] = new_token
            # Merge all occurrences
            new_tokens = []
            j = 0
            while j < len(tokens):
                if j < len(tokens)-1 and (tokens[j],tokens[j+1]) == best:
                    new_tokens.append(new_token)
                    j += 2
                else:
                    new_tokens.append(tokens[j])
                    j += 1
            tokens = new_tokens
        return tokens

# SPECIAL TOKENS:
# <BOS> = beginning of sequence
# <EOS> = end of sequence
# <PAD> = padding for batching
# <UNK> = unknown token (BPE avoids this!)`,

<div class="s"><h3>&#x1F524; Three Types of Tokenization</h3>
<div class="eb"><p><strong>Character-level:</strong> "cat" → ['c','a','t']. Vocab ~100. Simple but sequences are very long (slow).</p></div>
<div class="eb y"><p><strong>Word-level:</strong> "the cat" → ['the','cat']. Vocab ~100K+. Short sequences but can't handle new words like "ChatGPT".</p></div>
<div class="eb g"><p><strong>BPE (Byte Pair Encoding):</strong> "unhappy" → ['un','happy']. Vocab ~50K. The sweet spot! Handles ANY word by breaking into known subwords. Used by GPT-2/3/4, LLaMA, Mistral.</p></div></div>

<div class="s"><h3><span class="bd bd-c">CONCEPT</span> How BPE Works</h3>
<div class="eb"><p><strong>Algorithm:</strong> 1) Start with individual characters. 2) Count all adjacent pairs. 3) Merge the most frequent pair into a new token. 4) Repeat until vocab_size reached.</p></div>
<div class="eb p"><p><strong>Example:</strong> "low lower lowest" → Start: [l,o,w, ,l,o,w,e,r,...] → Merge (l,o)→lo → Merge (lo,w)→low → Now "low" is a single token!</p></div></div>

{fn:'step10_training.py',fd:'Phase 3 — Making It Learn',t:'<span class="lb lb3">P3</span> Step 10: Training Loop',su:'forward → loss → backward → clip → step → zero_grad. AdamW optimizer + cosine LR schedule with warmup. The 5-line loop that trains any model.',
code:`# ============================================
# STEP 10: TRAINING LOOP
# ============================================
# The 5-line loop that trains ANY neural network:

optimizer = torch.optim.AdamW(
    model.parameters(), lr=6e-4,
    betas=(0.9, 0.95), weight_decay=0.1
)

for step in range(total_steps):
    x, y = get_batch(data, batch_size=64, seq_len=128)
    # Target = input shifted by 1 position
    # "The cat sat" → input=[The,cat], target=[cat,sat]

    logits = model(x)                    # 1. Forward
    loss = F.cross_entropy(              # 2. Loss
        logits.view(-1, vocab_size), y.view(-1))
    loss.backward()                      # 3. Backward
    torch.nn.utils.clip_grad_norm_(      # 4. Clip
        model.parameters(), 1.0)
    optimizer.step()                     # 5. Step
    optimizer.zero_grad()                # 6. Zero

# ADAMW: Adam + weight decay
# Tracks m (momentum) and v (variance) per parameter
# Adapts LR per parameter automatically
# Weight decay prevents overfitting

# LR SCHEDULE: warmup + cosine decay
# Warmup: 0 → max_lr over first 2000 steps
# Cosine: max_lr → min_lr over remaining steps
# Why warmup? Random weights need gentle start.

# BACKPROPAGATION:
# loss.backward() computes d(loss)/d(weight) for ALL weights
# Uses chain rule through every layer automatically
# PyTorch builds computation graph and walks it backwards`,

<div class="s"><h3>&#x1F3CB;&#xFE0F; The Training Loop</h3>
<div class="eb o"><p><strong>The LLM recipe:</strong> AdamW (β1=0.9, β2=0.95, wd=0.1) + cosine LR with warmup + gradient clipping (max_norm=1.0). GPT-3, LLaMA, Mistral all use exactly this.</p></div>
<div class="eb"><p><strong>&#x1F373; Cooking Analogy:</strong> Forward pass = taste the dish. Loss = how far from perfect. Backward = figure out which ingredient to adjust. Step = adjust the recipe. Zero_grad = clean the kitchen for next attempt.</p></div>
<div class="eb g"><p><strong>AdamW vs SGD:</strong> SGD uses the same learning rate for all weights. Adam adapts per-parameter: weights with large gradients get smaller steps, weights with small gradients get larger steps. AdamW adds weight decay (prefer smaller weights).</p></div></div>

<div class="s"><h3><span class="bd bd-c">CONCEPT</span> LR Schedule: Warmup + Cosine Decay</h3>
<div class="ia">
<canvas id="lrC" width="400" height="100" style="width:100%;background:var(--code-bg);"></canvas>
<div class="eb y"><p><strong>Why warmup?</strong> Random initial weights → large gradients → instability. Start with tiny LR, ramp up over ~2000 steps. Then cosine decay smoothly to near zero.</p></div>
</div></div>

<div class="s"><h3><span class="bd bd-g">GAME</span> Loss Curve Simulator</h3>
<div class="ia">
<canvas id="lossC" width="400" height="120" style="width:100%;background:var(--code-bg);"></canvas>
<button class="btn bp" onclick="runLoss()">&#x25B6; Train!</button>
<div id="lossI" class="ob">Click Train to watch loss decrease over 120 steps!</div>
</div></div>

<div class="s"><h3><span class="bd bd-c">CONCEPT</span> Backpropagation</h3>
<div class="eb"><p><strong>loss.backward()</strong> walks the computation graph backwards, computing d(loss)/d(weight) for every parameter using the chain rule. PyTorch does this automatically — you never write gradient math by hand!</p></div>
<div class="eb p"><p><strong>Chain rule in action:</strong> For a 12-layer transformer, the gradient for layer 1's weights passes through 11 layers of chain rule multiplications. Residual connections (+x) ensure gradients always flow through (derivative of x+f(x) includes a +1 term).</p></div></div>

<div class="s"><h3><span class="bd bd-q">QUIZ</span> Training Mastery</h3>
<div class="qb" id="10-q1"><div class="qt">&#x1F914; Correct training step order:</div><div class="qo">
<div class="qp" onclick="cq('10-q1',this,true)">forward → loss → backward → clip → step → zero_grad</div>
<div class="qp" onclick="cq('10-q1',this,false)">backward → forward → step</div>
</div><div class="qf" id="10-q1-f"></div></div>
<div class="qb" id="10-q2"><div class="qt">&#x1F914; Why zero_grad()?</div><div class="qo">
<div class="qp" onclick="cq('10-q2',this,true)">PyTorch accumulates gradients by default — must reset each step or they add up!</div>
<div class="qp" onclick="cq('10-q2',this,false)">To free memory</div>
</div><div class="qf" id="10-q2-f"></div></div>
<div class="qb" id="10-q3"><div class="qt">&#x1F914; The target sequence is input shifted by 1: "The cat sat" → input=[The,cat], target=[cat,sat]. Why?</div><div class="qo">
<div class="qp" onclick="cq('10-q3',this,true)">We're training the model to predict the NEXT token at each position</div>
<div class="qp" onclick="cq('10-q3',this,false)">To double the data</div>
</div><div class="qf" id="10-q3-f"></div></div></div>`;

# STEP 11: REGULARIZATION
# ============================================
# Without regularization, the model MEMORIZES

# DROPOUT: randomly zero out 10% of neurons

# During training: randomly kills neurons
# During eval: uses all neurons (scaled)

# Prevents any single weight from dominating

# Train loss ↓ but val loss ↑ = overfitting!

# softmax: subtract max before exp (prevent overflow)
# log_softmax: compute in log space (prevent underflow)
# gradient clipping: prevent NaN from huge gradients

<div class="s"><h3>&#x1F6E1;&#xFE0F; Why Regularization?</h3>
<div class="eb"><p>Without regularization, the model <strong>memorizes</strong> training data instead of learning patterns. It gets 99% on training data but fails on new text. That's <strong>overfitting</strong>.</p></div>
<div class="eb y"><p><strong>&#x1F393; Student Analogy:</strong> A student who memorizes answers word-for-word gets 100% on practice tests but fails the real exam (different questions). Regularization forces the model to understand concepts, not memorize examples.</p></div></div>

<div class="s"><h3><span class="bd bd-c">CONCEPT</span> Four Regularization Techniques</h3>
<div class="eb"><p><strong>1. Dropout (p=0.1):</strong> Randomly zero out 10% of neurons during training. Forces redundancy — no single neuron can be critical. During inference, all neurons are used (scaled by 1-p).</p></div>
<div class="eb p"><p><strong>2. Weight Decay (wd=0.1):</strong> Penalize large weights: weight *= (1 - lr × wd). Prevents any single weight from dominating. Built into AdamW.</p></div>
<div class="eb g"><p><strong>3. Gradient Clipping (max_norm=1.0):</strong> If total gradient norm > 1.0, scale ALL gradients down proportionally. Prevents training explosions from rare bad batches.</p></div>
<div class="eb o"><p><strong>4. Train/Val Split:</strong> Train on 80%, validate on 10%, test on 10%. If train loss ↓ but val loss ↑ → overfitting! Solution: early stopping, more dropout, more data.</p></div></div>

<div class="s"><h3><span class="bd bd-c">CONCEPT</span> Numerical Stability</h3>
<div class="eb r"><p><strong>Softmax overflow:</strong> e^(1000) = infinity! Solution: subtract max before exp. softmax([1000, 999]) = softmax([1, 0]) — same result, no overflow.</p></div>
<div class="eb"><p><strong>Mixed Precision (FP16):</strong> Use half-precision for speed (2x faster, half memory). Keep master weights in FP32 for stability. Standard in all modern LLM training.</p></div></div>

<div class="s"><h3><span class="bd bd-g">GAME</span> Overfitting Detector</h3>
<p>Which scenario shows overfitting?</p>
<div class="ia">
<div class="qb" id="11-q0"><div class="qt">Scenario A: Train loss=0.5, Val loss=0.6<br>Scenario B: Train loss=0.1, Val loss=3.2</div><div class="qo">
<div class="qp" onclick="cq('11-q0',this,false)">A — small gap is normal</div>
<div class="qp" onclick="cq('11-q0',this,true)">B — huge gap! Model memorized training data (0.1) but fails on new data (3.2)</div>
</div><div class="qf" id="11-q0-f"></div></div>
</div></div>

<div class="s"><h3><span class="bd bd-q">QUIZ</span> Regularization Mastery</h3>
<div class="qb" id="11-q1"><div class="qt">&#x1F914; Gradient clipping with max_norm=1.0 means:</div><div class="qo">
<div class="qp" onclick="cq('11-q1',this,true)">If total gradient norm > 1.0, scale ALL gradients down proportionally (not clip individually)</div>
<div class="qp" onclick="cq('11-q1',this,false)">Each individual gradient is capped at 1.0</div>
</div><div class="qf" id="11-q1-f"></div></div>
<div class="qb" id="11-q2"><div class="qt">&#x1F914; Why subtract max(logits) in softmax?</div><div class="qo">
<div class="qp" onclick="cq('11-q2',this,true)">Numerical stability — e^(large number) overflows to infinity. Subtracting max makes the largest value 0.</div>
<div class="qp" onclick="cq('11-q2',this,false)">It changes the probability distribution</div>
</div><div class="qf" id="11-q2-f"></div></div>
<div class="qb" id="11-q3"><div class="qt">&#x1F914; Dropout is applied during training but NOT during inference. Why?</div><div class="qo">
<div class="qp" onclick="cq('11-q3',this,true)">During inference we want the full model capacity. Dropout is only for training regularization.</div>
<div class="qp" onclick="cq('11-q3',this,false)">It would be too slow</div>
</div><div class="qf" id="11-q3-f"></div></div></div>`;rq('11-q0',10);rq('11-q1',10);rq('11-q2',10);rq('11-q3',10);}},

{fn:'step12_evaluation.py',fd:'Phase 3 — Measuring Quality',t:'<span class="lb lb3">P3</span> Step 12: Evaluation',su:'Perplexity = e^(loss). Lower = better. Random guess = vocab_size. Good LLM = 10-30. Plus: train/val/test splits, context window limits.',
code:`# ============================================
# STEP 12: EVALUATION
# ============================================
# How do we know if our story generator is good?

# PERPLEXITY = e^(average_loss)
# Intuition: "how many words is the model choosing between?"
# Random: perplexity = vocab_size (50257) — terrible!
# Good LLM: perplexity 10-30
# Perfect: perplexity 1 (always right)

import math
model.eval()
with torch.no_grad():
    total_loss = 0
    for x, y in val_batches:
        logits = model(x)
        loss = F.cross_entropy(logits.view(-1, V), y.view(-1))
        total_loss += loss.item()
    avg_loss = total_loss / len(val_batches)
    perplexity = math.exp(avg_loss)

# Train: 80% — model learns from this
# Val: 10% — tune hyperparameters
# Test: 10% — final evaluation (never train on this!)

# HumanEval: code generation

{fn:'step13_adv_attention.py',fd:'Phase 4 — RoPE, GQA, KV-Cache, Flash',t:'<span class="lb lb4">P4</span> Step 13: Advanced Attention',su:'RoPE (rotary positions, extrapolates to longer sequences), GQA (shared K,V heads, 50% less memory), KV-Cache (10x faster generation), Flash Attention (memory-efficient).',
code:`# ============================================
# STEP 13: ADVANCED ATTENTION
# ============================================

# ── RoPE (Rotary Position Embeddings) ──
# Instead of ADDING position info, ROTATE Q,K vectors.
# Angle between positions encodes RELATIVE distance.
# Can extrapolate to longer sequences than trained on!
# Used by: LLaMA, Mistral, GPT-NeoX
def apply_rope(x, cos, sin):
    x1, x2 = x[..., ::2], x[..., 1::2]
    return torch.cat([x1*cos - x2*sin, x1*sin + x2*cos], -1)

# ── GQA (Grouped-Query Attention) ──
# Standard: 12 Q heads, 12 K heads, 12 V heads
# MQA: 12 Q heads, 1 K head, 1 V head (50% less!)
# GQA: 12 Q heads, 4 K heads, 4 V heads (middle ground)
# Why? KV-Cache is the memory bottleneck.
# Fewer KV heads = smaller cache = longer sequences!
# Used by: LLaMA-2 70B, Mistral

# ── KV-Cache ──
# During generation, we process one new token at a time.
# Without cache: recompute K,V for ALL previous tokens.
# With cache: store K,V, only compute for new token.
# Speedup: ~10x for long sequences!
class CachedAttention:
    def forward(self, x, cache_k=None, cache_v=None):
        q, k, v = self.qkv(x)
        if cache_k is not None:
            k = torch.cat([cache_k, k], dim=1)
            v = torch.cat([cache_v, v], dim=1)
        # Only new q attends to all k,v
        return output, k, v  # return cache for next step

# ── Flash Attention ──
# Standard attention: O(n²) memory (store full attention matrix)
# Flash Attention: O(n) memory (tile-based computation)
# Computes attention in blocks, never materializes full matrix.
# 2-4x faster, uses 5-20x less memory!
# Used by: every modern LLM framework

# ── Sliding Window Attention ──
# Each token only attends to last W tokens (e.g., W=4096)
# Reduces O(n²) to O(n×W) for very long sequences.
# Used by: Mistral (W=4096)`,

{fn:'step14_generation.py',fd:'Phase 4 — How ChatGPT Writes',t:'<span class="lb lb4">P4</span> Step 14: Generation Strategies',su:'Greedy (always top), Top-k (top k tokens), Top-p/nucleus (tokens summing to p%), Beam search (keep top-k sequences), Speculative decoding (2-3x faster).',
code:`# ============================================
# STEP 14: GENERATION STRATEGIES
# ============================================

# AUTOREGRESSIVE: generate one token at a time
# Each new token is fed back as input for the next.

def generate(model, prompt, max_tokens, strategy='top_p'):
    ids = tokenize(prompt)
    for _ in range(max_tokens):
        logits = model(ids)[:, -1, :]  # last position
        
        if strategy == 'greedy':
            next_id = logits.argmax(-1)
        
        elif strategy == 'top_k':
            top_k = 50
            vals, idx = logits.topk(top_k)
            probs = F.softmax(vals, -1)
            next_id = idx[torch.multinomial(probs, 1)]
        
        elif strategy == 'top_p':  # nucleus sampling
            sorted_logits, sorted_idx = logits.sort(descending=True)
            probs = F.softmax(sorted_logits, -1)
            cumsum = probs.cumsum(-1)
            mask = cumsum - probs > 0.9  # p=0.9
            sorted_logits[mask] = float('-inf')
            probs = F.softmax(sorted_logits, -1)
            next_id = sorted_idx[torch.multinomial(probs, 1)]
        
        ids = torch.cat([ids, next_id.unsqueeze(0)], 1)
    return ids

# BEAM SEARCH: keep top-B sequences at each step
# Deterministic, good for translation/summarization
# B=4: explore 4 paths simultaneously, keep best

# SPECULATIVE DECODING:
# Use a SMALL draft model to generate K tokens fast
# Then verify all K with the LARGE model in one pass
# Accept correct tokens, reject wrong ones
# Speedup: 2-3x because large model processes in parallel!

# REPETITION PENALTY:
# Reduce probability of recently generated tokens
# Prevents: "The cat sat on the the the the..."`,

<div class="s"><h3>&#x270D;&#xFE0F; How ChatGPT Writes</h3>
<div class="eb"><p>LLMs generate text <strong>one token at a time</strong>. At each step, the model outputs probabilities for all 50K+ words, then picks one. The chosen token is fed back as input for the next step. This is called <strong>autoregressive generation</strong>.</p></div></div>

<div class="s"><h3><span class="bd bd-c">CONCEPT</span> Five Sampling Strategies</h3>
<div class="eb"><p><strong>1. Greedy:</strong> Always pick the highest probability token. Deterministic but boring and repetitive. "The cat sat on the the the the..."</p></div>
<div class="eb y"><p><strong>2. Top-k (k=50):</strong> Only consider the top 50 tokens, zero out the rest, then sample. Prevents rare garbage tokens but k is fixed regardless of confidence.</p></div>
<div class="eb g"><p><strong>3. Top-p / Nucleus (p=0.9):</strong> Consider the smallest set of tokens whose probabilities sum to ≥0.9. Adapts automatically — when confident, considers few tokens; when uncertain, considers many. <strong>Used by ChatGPT.</strong></p></div>
<div class="eb p"><p><strong>4. Beam Search (B=4):</strong> Keep top-4 sequences at each step, explore all branches, pick the best complete sequence. Deterministic, good for translation/summarization.</p></div>
<div class="eb r"><p><strong>5. Speculative Decoding:</strong> Use a small fast model to draft K tokens. Then verify all K with the large model in ONE parallel pass. Accept correct tokens, reject wrong ones. <strong>2-3x speedup!</strong> Used in production.</p></div></div>

<div class="s"><h3><span class="bd bd-c">CONCEPT</span> Repetition Penalty</h3>
<div class="eb"><p>Divide the logit of recently generated tokens by a penalty factor (e.g., 1.2). This reduces their probability, preventing loops like "the the the the..."</p></div></div>

<div class="s"><h3><span class="bd bd-q">QUIZ</span> Generation Mastery</h3>
<div class="qb" id="14-q1"><div class="qt">&#x1F914; Top-p=0.9 means:</div><div class="qo">
<div class="qp" onclick="cq('14-q1',this,true)">Consider the smallest set of tokens whose cumulative probability ≥ 0.9. Adapts per step!</div>
<div class="qp" onclick="cq('14-q1',this,false)">Pick from top 90 tokens</div>
</div><div class="qf" id="14-q1-f"></div></div>

<div class="qp" onclick="cq('14-q2',this,true)">The large model verifies K tokens in ONE parallel pass instead of K sequential passes</div>
<div class="qp" onclick="cq('14-q2',this,false)">It uses a smaller model for everything</div>
</div><div class="qf" id="14-q2-f"></div></div>

{fn:'step15_scaling.py',fd:'Phase 4 — Billion-Parameter Models',t:'<span class="lb lb4">P4</span> Step 15: Scaling & Efficiency',su:'MoE (8 experts, activate 2), LoRA (fine-tune 0.1% of params), Quantization (4x smaller), Scaling Laws (tokens = 20× params).',
code:`# ============================================
# STEP 15: SCALING & EFFICIENCY
# ============================================

# ── MoE (Mixture of Experts) ──
# Replace single FFN with N expert FFNs + router
# Router picks top-2 experts per token
# GPT-4: rumored 8×220B = 1.76T total, ~220B active
# Mixtral: 8×7B = 46.7B total, 12.9B active
class MoELayer(nn.Module):
    def __init__(self, n_experts=8, top_k=2):
        self.router = nn.Linear(embed_dim, n_experts)
        self.experts = nn.ModuleList([FFN() for _ in range(n_experts)])
    def forward(self, x):
        scores = self.router(x)
        top_k_idx = scores.topk(self.top_k).indices
        # Only run selected experts!

# ── LoRA (Low-Rank Adaptation) ──
# Fine-tune with 128x fewer parameters!
# Instead of updating W (d×d), add A×B (d×r × r×d)
# r=16: 2×d×16 params instead of d×d
# Original weights FROZEN. Only train A, B.
# Can fine-tune 7B model on a laptop!

# ── Quantization ──
# FP32 (4 bytes) → INT8 (1 byte) → INT4 (0.5 bytes)
# 7B model: 28GB → 7GB → 3.5GB
# Minimal quality loss! (< 1% on benchmarks)
# How: map float range to integer range
# weight_int8 = round(weight * scale)

# ── Scaling Laws (Chinchilla) ──
# Optimal: tokens = 20 × parameters
# 1B model → 20B tokens
# 7B model → 140B tokens
# 70B model → 1.4T tokens
# Loss ~ N^(-0.076) (model size)
# Loss ~ D^(-0.095) (data size)`,

{fn:'step16_alignment.py',fd:'Phase 4 — Making It Helpful & Safe',t:'<span class="lb lb4">P4</span> Step 16: Alignment & Safety',su:'RLHF (3-stage: pretrain → SFT → reward model → PPO), DPO (simpler, no reward model), Constitutional AI, RAG, prompt engineering.',
code:`# ============================================
# STEP 16: ALIGNMENT & SAFETY
# ============================================
# A pretrained LLM can generate text, but it's
# not helpful, harmless, or honest by default.
# Alignment = making it behave well.

# ── RLHF (Reinforcement Learning from Human Feedback) ──
# Stage 1: Pretrain on internet text (next token prediction)
# Stage 2: SFT (Supervised Fine-Tuning) on human demos
# Stage 3: Train reward model on human preferences
# Stage 4: PPO (optimize policy against reward model)
#
# Human ranks: Response A > Response B
# Reward model learns: score(A) > score(B)
# PPO optimizes: generate responses that score high

# ── DPO (Direct Preference Optimization) ──
# Simpler than RLHF! No reward model needed.
# Directly optimize: P(preferred) > P(rejected)
# loss = -log(sigmoid(β * (log_p_preferred - log_p_rejected)))
# Used by: LLaMA-2, Zephyr, many open models

class DPOLoss:
    def __call__(self, policy_preferred, policy_rejected,
                       ref_preferred, ref_rejected, beta=0.1):
        log_ratio_p = policy_preferred - ref_preferred
        log_ratio_r = policy_rejected - ref_rejected
        return -F.logsigmoid(beta * (log_ratio_p - log_ratio_r)).mean()

# ── RAG (Retrieval-Augmented Generation) ──
# Problem: LLMs hallucinate (make up facts)
# Solution: retrieve relevant documents first!
# 1. User asks question
# 2. Search vector database for relevant docs
# 3. Inject docs into prompt as context
# 4. LLM generates answer grounded in real docs

# ── Prompt Engineering ──
# Few-shot: give examples in the prompt
# Chain-of-thought: "Let's think step by step"
# System prompt: set behavior and constraints
# In-context learning: the model learns from examples
#   WITHOUT updating weights!

# ── Safety ──
# Constitutional AI: model critiques its own outputs
# Red teaming: adversarial testing for harmful outputs
# Guardrails: input/output filtering
# Jailbreak prevention: resist prompt injection`,
