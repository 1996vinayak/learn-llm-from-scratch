{fn:'moe.py',fd:'Mixture of Experts',t:'\u{1F9E0} Mixture of Experts',su:'Huge models, fast inference \u2014 used by GPT-4 and Mixtral',
code:`# Mixture of Experts (MoE)
# ========================
# Standard Transformer: Every token goes through
# ALL parameters.
# MoE Transformer: Each token only uses a FEW
# "expert" networks.
#
# How it works:
#   - Replace the single FFN with N experts
#   - A "router" decides which experts each token uses
#   - Typically top-2 out of 8 experts per token
#
# GPT-4: rumored 8x220B MoE = 1.76T total params
#   but only ~220B active per token!
# Mixtral 8x7B: 46.7B total, 12.9B active

class Expert(nn.Module):
    def __init__(self, n_embd, hidden_mult=4):
        super().__init__()
        hidden = n_embd * hidden_mult
        self.w1 = nn.Linear(n_embd, hidden, bias=False)
        self.w2 = nn.Linear(hidden, n_embd, bias=False)

    def forward(self, x):
        return self.w2(F.silu(self.w1(x)))

class MoELayer(nn.Module):
    def __init__(self, n_embd, n_experts=8, top_k=2):
        super().__init__()
        self.n_experts = n_experts
        self.top_k = top_k

        # The router: decides which experts to use
        self.router = nn.Linear(n_embd, n_experts)

        # The experts
        self.experts = nn.ModuleList([
            Expert(n_embd) for _ in range(n_experts)
        ])

    def forward(self, x):
        # Router scores
        router_logits = self.router(x)
        router_probs = F.softmax(router_logits, dim=-1)

        # Select top-k experts
        top_k_probs, top_k_indices = torch.topk(
            router_probs, self.top_k, dim=-1
        )

        # Weighted sum of expert outputs
        output = torch.zeros_like(x)
        for i in range(self.top_k):
            expert_idx = top_k_indices[:, i]
            weight = top_k_probs[:, i]
            for e in range(self.n_experts):
                mask = (expert_idx == e)
                if mask.any():
                    output[mask] += weight[mask].unsqueeze(-1) \\
                        * self.experts[e](x[mask])
        return output`,

{fn:'lora.py',fd:'Low-Rank Adaptation',t:'\u{1F9F7} LoRA \u2014 Low-Rank Adaptation',su:'Fine-tune billion-parameter models on a laptop',
code:`# LoRA - Low-Rank Adaptation
# ===========================
# Problem: Fine-tuning a 7B model requires
# updating ALL 7B parameters.
# That needs ~28GB GPU memory just for weights!
#
# LoRA: Instead of updating full weight W,
# add a small low-rank update: W + A*B
#
# Original: W is (d, d) = d*d parameters
# LoRA: A is (d, r) and B is (r, d)
#       where r << d
#       Total new params: 2*d*r (much smaller!)
#
# Example: d=4096, r=16
#   Full: 4096*4096 = 16.7M params per layer
#   LoRA: 2*4096*16 = 131K params (128x less!)
#
# Original weights are FROZEN.
# Only A and B are trained.

class LoRALinear(nn.Module):
    def __init__(self, original_linear, rank=16,
                 alpha=32):
        super().__init__()
        in_f = original_linear.in_features
        out_f = original_linear.out_features

        # Freeze original weights
        self.original = original_linear
        self.original.weight.requires_grad = False

        # LoRA matrices (tiny!)
        self.lora_A = nn.Parameter(
            torch.randn(in_f, rank) / math.sqrt(rank)
        )
        self.lora_B = nn.Parameter(
            torch.zeros(rank, out_f)
        )
        self.scaling = alpha / rank

    def forward(self, x):
        # Original + low-rank update
        original_out = self.original(x)
        lora_out = (x @ self.lora_A @ self.lora_B) \\
                   * self.scaling
        return original_out + lora_out`,

// 3: Quantization
{fn:'quantization.py',fd:'Shrink models 4x',t:'\u{1F4E6} Quantization',su:'Compress models from 28GB to 3.5GB with minimal quality loss',
code:`# Quantization - Shrink Models 4x
# ================================
# Normal: FP32 (32 bits per parameter)
# Quantized: INT8 (8 bits) or INT4 (4 bits)
#
# A 7B model:
#   FP32: 28 GB
#   FP16: 14 GB
#   INT8:  7 GB
#   INT4:  3.5 GB  <-- fits on a laptop!
#
# How it works (simplified):
#   1. Find the range of weights: [min, max]
#   2. Map that range to integers:
#      [0, 255] for INT8
#      [0, 15]  for INT4
#   3. Store the scale factor to convert back

def quantize_tensor(tensor, bits=8):
    qmin = 0
    qmax = 2**bits - 1

    # Find range
    min_val = tensor.min()
    max_val = tensor.max()

    # Compute scale and zero point
    scale = (max_val - min_val) / (qmax - qmin)
    zero_point = qmin - min_val / scale

    # Quantize: float -> int
    quantized = torch.clamp(
        torch.round(tensor / scale + zero_point),
        qmin, qmax
    ).to(torch.uint8)

    return quantized, scale, zero_point

def dequantize_tensor(quantized, scale, zero_point):
    # Dequantize: int -> float (approximate)
    return (quantized.float() - zero_point) * scale

# Quality loss is surprisingly small!
# INT8: ~0.1% accuracy drop
# INT4: ~1-2% accuracy drop`,

// 4: Scaling Laws
{fn:'scaling_laws.py',fd:'Chinchilla optimal training',t:'\u{1F4C8} Scaling Laws',su:'The Chinchilla recipe: how much data does your model need?',
code:`# Scaling Laws (Chinchilla)
# =========================
# Key question: Given a compute budget, how
# should you split it between model size
# and training data?
#
# Chinchilla finding (2022):
#   Optimal: tokens = 20 * parameters
#
#   1B model  -> train on 20B tokens
#   7B model  -> train on 140B tokens
#   70B model -> train on 1.4T tokens
#
# Before Chinchilla, models were too big
# for their data:
#   GPT-3 (175B) trained on only 300B tokens
#   Should have been: 175B * 20 = 3.5T tokens!
#
# Loss scales as a power law:
#   L(N) ~ N^(-0.076)  (model size)
#   L(D) ~ D^(-0.095)  (data size)
#   L(C) ~ C^(-0.050)  (compute)

def chinchilla_optimal(compute_flops):
    # N_opt ~ C^0.5, D_opt ~ C^0.5
    # Simplified: tokens = 20 * params
    # C ~ 6 * N * D (approximate FLOPs)
    N = (compute_flops / 120) ** 0.5
    D = 20 * N
    return N, D

def predict_loss(params, tokens):
    A, alpha = 406.4, 0.34
    B, beta = 410.7, 0.28
    E = 1.69
    loss = (A / params**alpha) \\
         + (B / tokens**beta) + E
    return loss

# GPT-3:      175B params, 300B tokens (under!)
# Chinchilla: 70B params, 1.4T tokens (optimal)
# LLaMA:      65B params, 1.4T tokens (over!)
# LLaMA-2:    70B params, 2T tokens (over!)`,

// 5: Speculative Decoding
{fn:'speculative_decoding.py',fd:'2-3x faster generation',t:'\u26A1 Speculative Decoding',su:'Use a small draft model to speed up generation 2-3x',
code:`# Speculative Decoding - 2-3x Faster!
# =====================================
# Problem: LLM generation is slow because
# it's sequential (one token at a time,
# each needs a full forward pass).
#
# Idea: Use a SMALL fast model to "draft"
# several tokens, then verify them all at
# once with the BIG model.
#
# Steps:
#   1. Small model generates K draft tokens
#   2. Big model verifies all K in ONE pass
#   3. Accept tokens that match
#   4. Continue from last accepted token
#
# Why it works:
#   - Small model is often correct (easy tokens)
#   - Big model can verify K tokens as fast
#     as generating 1
#   - Net result: 2-3x speedup!
#
# Without speculative decoding:
#   "The"     -> 100ms (big model)
#   "little"  -> 100ms (big model)
#   "cat"     -> 100ms (big model)
#   Total: 300ms for 3 tokens
#
# With speculative decoding (K=3):
#   Draft "The little cat" -> 10ms (small)
#   Verify all 3 at once   -> 100ms (big)
#   All 3 accepted!
#   Total: 110ms for 3 tokens (2.7x faster!)
#
# If draft is wrong:
#   Draft "The big dog"    -> 10ms (small)
#   Verify: "The" OK, "big" WRONG
#   Accept "The", regenerate from there
#   Still faster than one-at-a-time!`,

<div class="eb b"><p><strong>Key Insight:</strong> The big model can verify K tokens in the same time it takes to generate 1 token. This is because verification is a single forward pass over K tokens (parallel), while generation is K sequential forward passes.</p></div></div>

// 6: DPO
{fn:'dpo.py',fd:'Direct Preference Optimization',t:'\u{1F3AF} DPO \u2014 Direct Preference Optimization',su:'Simpler alignment than RLHF \u2014 no reward model needed',
code:`# DPO - Direct Preference Optimization
# =====================================
# RLHF (Level 3) has 3 steps:
#   1. Collect human preferences
#   2. Train a reward model
#   3. Use RL (PPO) to optimize
#
# DPO simplifies this to 1 step:
#   1. Collect human preferences
#   2. Directly optimize the LLM!
#   (No reward model, no RL!)
#
# The DPO loss:
#   L = -log(sigmoid(beta * (
#       log_prob_chosen - log_prob_rejected
#   )))
#
# Intuition: Make the model MORE likely to
# produce the preferred response and LESS
# likely to produce the rejected one.

def dpo_loss(model_chosen_logprobs,
             model_rejected_logprobs,
             ref_chosen_logprobs,
             ref_rejected_logprobs,
             beta=0.1):
    chosen_rewards = beta * (
        model_chosen_logprobs
        - ref_chosen_logprobs
    )
    rejected_rewards = beta * (
        model_rejected_logprobs
        - ref_rejected_logprobs
    )

    loss = -F.logsigmoid(
        chosen_rewards - rejected_rewards
    ).mean()
    return loss

# RLHF: preferences -> reward model -> RL
# DPO:  preferences -> direct optimization
#
# DPO is simpler, more stable, and often
# works just as well!
# Used by: LLaMA-2, Zephyr, many open-source`,

<div class="eb r"><p><strong>Why DPO is better:</strong> RLHF requires training 3 models (SFT, reward, PPO policy). DPO only needs the preference data and the model itself. Simpler, more stable, fewer hyperparameters.</p></div></div>

<div style="display:flex;align-items:center;gap:6px;margin:8px 0;flex-wrap:wrap;">
<div style="padding:8px 12px;background:var(--bg4);border-radius:8px;border:2px solid var(--green);font-size:11px;text-align:center;"><strong>Step 1</strong><br>Collect<br>Preferences</div>

// ═══ GAME FUNCTIONS ═══

// MoE Router Simulator
const moeTokenList=['The','cat','sat','on','a','warm','sunny','day'];
const moeExpertNames=['Math','Logic','Grammar','Vocab','Style','Facts','Code','Safety'];
const moeRouting={'The':[2,3],'cat':[3,5],'sat':[2,0],'on':[2,3],'a':[2,3],'warm':[3,4],'sunny':[3,5],'day':[3,5]};
function initMoE(){
  const td=document.getElementById('moeTokens');
  td.innerHTML='';
  moeTokenList.forEach(t=>{
    const chip=document.createElement('span');
    chip.className='token-chip';
    chip.textContent=t;
    chip.onclick=function(){selectMoEToken(t,this);};
    td.appendChild(chip);
  });
  const ed=document.getElementById('moeExperts');
  ed.innerHTML='';
  for(let i=0;i<8;i++){
    const box=document.createElement('div');
    box.className='expert-box';
    box.id='moe-expert-'+i;
    box.innerHTML='E'+i+'<br><span style="font-size:8px;">'+moeExpertNames[i]+'</span>';
    ed.appendChild(box);
  }
}
function selectMoEToken(token,el){
  document.querySelectorAll('.token-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  const active=moeRouting[token]||[0,1];
  for(let i=0;i<8;i++){
    const box=document.getElementById('moe-expert-'+i);
    box.classList.toggle('active',active.includes(i));
  }
  const info=document.getElementById('moeInfo');
  info.style.display='block';
  info.innerHTML=`Token "<strong>${token}</strong>" \u2192 Router activates <strong>Expert ${active[0]} (${moeExpertNames[active[0]]})</strong> and <strong>Expert ${active[1]} (${moeExpertNames[active[1]]})</strong><br><span style="color:var(--dim);">Only 2 of 8 experts active = 25% compute used!</span>`;
}

// LoRA Parameter Calculator
function updateLoRA(){
  const d=parseInt(document.getElementById('loraD').value);
  const r=parseInt(document.getElementById('loraR').value);
  document.getElementById('loraDV').textContent=d;
  document.getElementById('loraRV').textContent=r;
  const full=d*d;
  const lora=2*d*r;
  const ratio=(full/lora).toFixed(1);
  const pct=(lora/full*100).toFixed(2);
  function fmt(v){if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return v;}
  document.getElementById('loraFull').textContent=fmt(full);
  document.getElementById('loraSmall').textContent=fmt(lora);
  document.getElementById('loraRatio').textContent=ratio+'x fewer parameters with LoRA!';
  const barPct=Math.min(100,pct*5);
  document.getElementById('loraBarFill').style.width=barPct+'%';
  document.getElementById('loraBarLabel').textContent='LoRA is '+pct+'% of full fine-tuning parameters';
}

// Quantization Simulator
function updateQuant(){
  const raw=parseInt(document.getElementById('quantSlider').value)/100;
  const val=raw;
  document.getElementById('quantVal').textContent=val.toFixed(2);
  const minR=-3.15,maxR=3.15;
  // INT8
  const scale8=(maxR-minR)/255;
  const zp8=Math.round(-minR/scale8);
  const q8=Math.max(0,Math.min(255,Math.round(val/scale8+zp8)));
  const dq8=(q8-zp8)*scale8;
  const err8=Math.abs(val-dq8);
  // INT4
  const scale4=(maxR-minR)/15;
  const zp4=Math.round(-minR/scale4);
  const q4=Math.max(0,Math.min(15,Math.round(val/scale4+zp4)));
  const dq4=(q4-zp4)*scale4;
  const err4=Math.abs(val-dq4);
  document.getElementById('quantOrig').textContent=val.toFixed(5);
  document.getElementById('quantI8').textContent=q8;
  document.getElementById('quantI8e').textContent='error: '+err8.toFixed(5);
  document.getElementById('quantI4').textContent=q4;
  document.getElementById('quantI4e').textContent='error: '+err4.toFixed(5);
  document.getElementById('quantDequant').innerHTML=
    '<strong>Dequantized values:</strong>\n'+
    'INT8: '+q8+' \u2192 '+dq8.toFixed(5)+' (error: <span style="color:var(--blue);">'+err8.toFixed(5)+'</span>)\n'+
    'INT4: '+q4+' \u2192 '+dq4.toFixed(5)+' (error: <span style="color:var(--purple);">'+err4.toFixed(5)+'</span>)\n'+
    '<span style="color:var(--dim);">INT4 error is ~'+(err4>0&&err8>0?(err4/err8).toFixed(1):'?')+'x larger than INT8</span>';
}

// Chinchilla Calculator
function updateChin(){
  const n=parseInt(document.getElementById('chinSlider').value);
  document.getElementById('chinModel').textContent=n+'B';
  document.getElementById('chinParams').textContent=n+'B';
  const tokens=n*20;
  const flops=6*n*1e9*tokens*1e9;
  function fmtT(v){if(v>=1000)return(v/1000).toFixed(1)+'T';return v+'B';}
  function fmtF(v){if(v>=1e24)return(v/1e24).toFixed(1)+'e24';if(v>=1e21)return(v/1e21).toFixed(1)+'e21';if(v>=1e18)return(v/1e18).toFixed(1)+'e18';return v.toExponential(1);}
  document.getElementById('chinTokens').textContent=fmtT(tokens);
  document.getElementById('chinFlops').textContent=fmtF(flops);
}

// Speculative Decoding Race
const raceTokens=['The','little','cat','sat','on','the','warm','sunny','windowsill','and','purred','softly'];
let raceInterval=null,raceRunning=false;
function resetRace(){
  raceRunning=false;
  if(raceInterval)clearInterval(raceInterval);
  raceInterval=null;
  const nb=document.getElementById('raceNormal');
  const sb=document.getElementById('raceSpec');
  nb.style.width='0%';nb.textContent='0%';
  sb.style.width='0%';sb.textContent='0%';
  document.getElementById('raceNormalTokens').textContent='';
  document.getElementById('raceSpecTokens').textContent='';
  document.getElementById('raceResult').textContent='';
  const log=document.getElementById('raceLog');
  log.style.display='none';log.innerHTML='';
}
function startRace(){
  if(raceRunning)return;
  resetRace();
  raceRunning=true;
  const total=raceTokens.length;
  let nIdx=0,sIdx=0,tick=0;
  let nTokens=[],sTokens=[];
  let specPhase='draft',specDraftCount=0;
  const log=document.getElementById('raceLog');
  log.style.display='block';
  function addLog(msg){log.innerHTML+=msg+'\n';log.scrollTop=log.scrollHeight;}
  raceInterval=setInterval(()=>{
    tick++;
    // Normal: one token every 3 ticks (slow)
    if(tick%3===0&&nIdx<total){
      nTokens.push(raceTokens[nIdx]);
      nIdx++;
      const pct=Math.round(nIdx/total*100);
      document.getElementById('raceNormal').style.width=pct+'%';
      document.getElementById('raceNormal').textContent=pct+'%';
      document.getElementById('raceNormalTokens').textContent=nTokens.join(' ');
      addLog('<span style="color:var(--red);">[Normal]</span> Generated: "'+raceTokens[nIdx-1]+'" ('+nIdx+'/'+total+')');
    }
    // Speculative: draft 3 in 1 tick, verify in 2 ticks
    if(sIdx<total){
      if(specPhase==='draft'){
        const draftCount=Math.min(3,total-sIdx);
        specDraftCount=draftCount;
        addLog('<span style="color:var(--green);">[Spec]</span> Drafting '+draftCount+' tokens...');
        specPhase='verify';
      }else if(specPhase==='verify'){
        // Accept all drafted tokens (simplified)
        for(let i=0;i<specDraftCount&&sIdx<total;i++){
          sTokens.push(raceTokens[sIdx]);
          sIdx++;
        }
        const pct=Math.round(sIdx/total*100);
        document.getElementById('raceSpec').style.width=pct+'%';
        document.getElementById('raceSpec').textContent=pct+'%';
        document.getElementById('raceSpecTokens').textContent=sTokens.join(' ');
        addLog('<span style="color:var(--green);">[Spec]</span> Verified & accepted '+specDraftCount+' tokens! ('+sIdx+'/'+total+')');
        specPhase='draft';
      }
    }
    // Check if done
    if(nIdx>=total&&sIdx>=total){
      clearInterval(raceInterval);
      raceRunning=false;
      document.getElementById('raceResult').innerHTML='\u{1F3C6} Speculative decoding finished first! <span style="color:var(--green);">~2.5x faster</span>';
    }else if(sIdx>=total&&nIdx<total){
      const pct=Math.round(sIdx/total*100);
      document.getElementById('raceSpec').style.width=pct+'%';
      document.getElementById('raceSpec').textContent='DONE!';
      if(!document.getElementById('raceResult').textContent){
        document.getElementById('raceResult').innerHTML='\u26A1 Speculative finished! Normal still at '+Math.round(nIdx/total*100)+'%';
      }
    }
  },200);
}

// DPO Calculator
function updateDPO(){
  const beta=parseInt(document.getElementById('dpoBeta').value)/10;
  const pC=parseInt(document.getElementById('dpoChosen').value)/100;
  const pR=parseInt(document.getElementById('dpoRejected').value)/100;
  document.getElementById('dpoBetaV').textContent=beta.toFixed(1);
  document.getElementById('dpoChosenV').textContent=pC.toFixed(2);
  document.getElementById('dpoRejectedV').textContent=pR.toFixed(2);
  const logC=Math.log(pC);
  const logR=Math.log(pR);
  const diff=beta*(logC-logR);
  const sigmoid=1/(1+Math.exp(-diff));
  const loss=-Math.log(sigmoid);
  const res=document.getElementById('dpoResult');
  const lossColor=loss<0.5?'var(--green)':loss<1?'var(--yellow)':'var(--red)';
  res.innerHTML=`<span style="color:${lossColor};">DPO Loss: ${loss.toFixed(3)}</span><br><span style="font-size:11px;color:var(--dim);">${pC>pR?'\u2705 Model prefers chosen (good!)':'\u274C Model prefers rejected (needs training!)'} | \u03C3(${diff.toFixed(2)}) = ${sigmoid.toFixed(3)}</span>`;
}

// INIT
go(0);
</script>
